<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #3a3830; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --nav-h: 80px; --delete: #441111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: calc(var(--nav-h) + 40px); opacity: 0; transition: opacity 0.3s; }
        .page.active { display: flex; }
        .page.shown { opacity: 1; }

        .page-header { text-align: center; padding: 60px 24px 30px; border-bottom: 1px solid var(--dim); }
        .page-header h1 { font-size: 13px; letter-spacing: 0.5em; text-transform: uppercase; color: var(--accent); font-weight: 300; }
        .section-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim2); text-align: center; padding: 30px 20px 15px; }

        /* Nav Highlighting */
        #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); display: flex; justify-content: center; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(21, 21, 30, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.2); border-radius: 40px; display: flex; padding: 5px; }
        .nav-btn { width: 68px; height: 52px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; }

        /* Reading UI */
        .mode-toggle { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .mode-btn { background: none; border: 1px solid var(--dim); color: var(--dim2); padding: 8px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 4px; }
        .mode-btn.active { border-color: var(--accent); color: var(--accent); }

        .reel-container { display: flex; justify-content: center; gap: 12px; margin: 40px 0; }
        .slot { width: 85px; height: 115px; background: var(--card); border: 1px solid var(--dim); border-radius: 6px; overflow: hidden; }
        .reel-unit { height: 115px; display: flex; align-items: center; justify-content: center; font-size: 44px; }

        .rune-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; max-width: 400px; margin: 0 auto; }
        .rune-btn { background: var(--card); border: 1px solid var(--dim); border-radius: 6px; padding: 15px 5px; text-align: center; cursor: pointer; }
        .rune-btn.selected { border-color: var(--accent); background: rgba(201,169,110,0.1); }
        .rune-btn span { display: block; font-size: 24px; margin-bottom: 5px; }
        .rune-btn label { font-size: 9px; text-transform: uppercase; color: var(--dim2); }

        /* Result Cards */
        .result-runes { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .result-rune-card { background: var(--card); border: 1px solid var(--dim); width: 90px; padding: 20px 0; border-radius: 8px; text-align: center; }
        .result-rune-card .glyph { font-size: 36px; display: block; color: var(--fg); }
        .result-rune-card .name { font-size: 9px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; margin-top: 8px; }

        /* Stats & History */
        .top-card { background: var(--card); border: 1px solid var(--dim); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 20px; margin: 0 16px 12px; }
        .stat-table { padding: 0 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .stat-row { background: var(--card); padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 12px; }

        .history-item { position: relative; background: var(--delete); overflow: hidden; border-bottom: 1px solid var(--dim); }
        .history-content { background: var(--bg); padding: 24px; position: relative; z-index: 2; transition: transform 0.4s; }
        .delete-reveal { position: absolute; right: 0; top: 0; bottom: 0; width: 85px; background: var(--delete); color: #ff8888; border: none; font-size: 10px; text-transform: uppercase; z-index: 1; }

        .action-btn { width: 100%; background: none; border: 1px solid var(--accent); color: var(--accent); padding: 18px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 12px; margin-top: 20px; cursor: pointer; }
        
        /* Guide Content */
        .guide-entry { border-bottom: 1px solid var(--dim); padding: 24px 0; cursor: pointer; }
        .lore-box { display: none; padding-top: 15px; font-size: 16px; line-height: 1.6; color: var(--fg2); font-style: italic; }
        .lore-box.open { display: block; }
    </style>
</head>
<body>

<div class="page" id="page-home">
    <div class="page-header"><h1 id="home-date"></h1></div>
    <div style="text-align: center; padding: 50px 24px;">
        <div id="rotd-g" style="font-size: 100px; margin-bottom: 10px;"></div>
        <div id="rotd-n" style="font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4em;"></div>
        <div id="rotd-m" style="font-style: italic; color: var(--dim2); margin-top: 10px;"></div>
    </div>
    <div class="section-label">Consult the Oracle</div>
    <div class="top-card" onclick="navTo('reading'); switchMode('draw')">
        <div style="font-size: 30px;">ᚱ</div>
        <div><div style="text-transform: uppercase; color: var(--accent); font-size: 14px;">Draw Staves</div><div style="font-size: 11px; color: var(--dim2);">Guided by the Norns</div></div>
    </div>
    <div class="top-card" onclick="navTo('reading'); switchMode('manual')">
        <div style="font-size: 30px;">ᚦ</div>
        <div><div style="text-transform: uppercase; color: var(--accent); font-size: 14px;">Manual Selection</div><div style="font-size: 11px; color: var(--dim2);">Chosen with intent</div></div>
    </div>
</div>

<div class="page" id="page-reading">
    <div class="page-header"><h1>The Reading</h1></div>
    <div class="mode-toggle" id="read-modes">
        <button class="mode-btn active" id="m-draw" onclick="switchMode('draw')">Draw</button>
        <button class="mode-btn" id="m-manual" onclick="switchMode('manual')">Manual</button>
    </div>

    <div id="area-draw" style="padding: 0 20px;">
        <div class="reel-container">
            <div class="slot"><div class="reel" id="r0"></div></div>
            <div class="slot"><div class="reel" id="r1"></div></div>
            <div class="slot"><div class="reel" id="r2"></div></div>
        </div>
        <button class="action-btn" onclick="startCast()">Cast the Runes</button>
    </div>

    <div id="area-manual" style="display:none;">
        <div class="rune-grid" id="manual-grid"></div>
        <div style="padding: 0 20px;"><button class="action-btn" id="manual-submit" onclick="submitManual()" style="opacity:0.3; pointer-events:none;">Select 3 Runes</button></div>
    </div>

    <div id="reading-reveal" style="display:none; padding: 40px 24px; text-align: center;">
        <div id="reveal-visuals" class="result-runes"></div>
        <div id="read-text" style="font-size: 20px; line-height: 1.8; font-style: italic; color: var(--fg2); margin-bottom: 30px;"></div>
        <button class="mode-btn" onclick="location.reload()">New Reading</button>
    </div>
</div>

<div class="page" id="page-history">
    <div class="page-header"><h1>Insights</h1></div>
    <div class="section-label">Most Frequent</div>
    <div id="top-insights"></div>
    <div class="section-label">Full Stave Count</div>
    <div id="full-stats" class="stat-table"></div>
    <div class="section-label">Past Readings</div>
    <div id="journal-list"></div>
</div>

<div class="page" id="page-library">
    <div class="page-header"><h1>Stave Guide</h1></div>
    <div id="lib-list" style="padding: 0 24px;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚠ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛉ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth, abundance, new beginnings', l:'Fehu represents movable wealth and the creative fire that sparks action. It signifies abundance and the responsibility that comes with success.'},
        {g:'ᚢ',n:'Uruz',m:'Strength, vitality, primal power', l:'The wild ox. It represents primal strength, untamed potential, and the raw energy of the earth before it is harnessed.'},
        {g:'ᚦ',n:'Thurisaz',m:'Force, challenge, protection', l:'The thorn or the giant. It is a reactive force of defense and the necessary conflict that precedes spiritual growth.'},
        {g:'ᚨ',n:'Ansuz',m:'Wisdom, communication, divine breath', l:'The mouth of the divine. It represents signals, messages, and the immense power of the spoken word and ancestral wisdom.'},
        {g:'ᚱ',n:'Raidho',m:'Journey, movement, right action', l:'The wheel. It signifies rationality, justice, and the rhythm of the journey through life and travel.'},
        {g:'ᚲ',n:'Kenaz',m:'Torch, knowledge, creative fire', l:'The beacon. It represents enlightenment, skill, and the controlled fire of the artist or craftsperson.'},
        {g:'ᚷ',n:'Gebo',m:'Gift, generosity, partnership', l:'A connection between people. It signifies honor, exchange, and the vital balance of giving and receiving.'},
        {g:'ᚹ',n:'Wunjo',m:'Joy, harmony, fulfilment', l:'The banner of victory. It represents contentment, fellowship, and the removal of sorrows through alignment.'},
        {g:'ᚺ',n:'Hagalaz',m:'Hail, disruption, transformation', l:'Destructive weather outside your control. It represents forces that clear the way for a new, stronger structure.'},
        {g:'ᚾ',n:'Naudhiz',m:'Need, constraint, endurance', l:'The friction of necessity. Hardship that provides the spark for innovation and survival.'},
        {g:'ᛁ',n:'Isa',m:'Ice, stillness, patience', l:'Freezing. A period of stasis where nothing seems to move, requiring inner focus, concentration, and waiting.'},
        {g:'ᛃ',n:'Jera',m:'Harvest, cycles, reward', l:'The year. The natural and just outcome of effort over time and the beauty of seasonal cycles.'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance, continuity, the Yew', l:'The Yew tree. Connection between life and death, longevity, and the vertical axis of the soul.'},
        {g:'ᛈ',n:'Perthro',m:'Fate, mystery, hidden laws', l:'The dice cup. Represents chance, hidden knowledge, and the laws of probability that govern human fate.'},
        {g:'ᛉ',n:'Algiz',m:'Protection, instinct, guidance', l:'The elk or swan. Higher spiritual protection and the act of following the pure instinct of the soul.'},
        {g:'ᛊ',n:'Sowilo',m:'Sun, victory, clarity', l:'Solar power. Vitality, success, and the clear light that reveals the path forward and burns away doubt.'},
        {g:'ᛏ',n:'Tiwaz',m:'Justice, courage, sacrifice', l:'The spiritual warrior. Integrity, self-sacrifice for the greater good, and victory through law and order.'},
        {g:'ᛒ',n:'Berkano',m:'Growth, nurturing, new life', l:'The Birch tree. Rebirth, fertility, and the nurturing energy of a mother or a garden in bloom.'},
        {g:'ᛖ',n:'Ehwaz',m:'Trust, partnership, progress', l:'The horse. The harmonious relationship between two entities that creates rapid and steady movement.'},
        {g:'ᛗ',n:'Mannaz',m:'Humanity, self, community', l:'The individual within the collective. Self-realization and our deep connection to the human race and mind.'},
        {g:'ᛚ',n:'Laguz',m:'Water, flow, intuition', l:'The deep ocean. Represents emotions, the collective unconscious, and the fluid nature of reality.'},
        {g:'ᛜ',n:'Ingwaz',m:'Fertility, potential, inner rest', l:'The seed. Internalized energy that is stored up before a massive, explosive release of growth.'},
        {g:'ᛞ',n:'Dagaz',m:'Dawn, breakthrough, awakening', l:'Daylight. A radical change of perspective and the moment of absolute awakening to the truth.'},
        {g:'ᛟ',n:'Othala',m:'Heritage, home, protection', l:'Ancestral land. What we inherit from the past and what we build to leave behind for future generations.'},
        {g:'O',n:'Wyrd (Blank)',m:'The Unknown, Fate', l:'The Blank Rune. It signifies fate yet to be written, the cosmic void, and the absolute power of the unknown.'}
    ];

    let manualSelected = [];

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'shown'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const target = document.getElementById('page-' + id);
        target.classList.add('active');
        document.querySelector(`.nav-btn[data-id="${id}"]`).classList.add('active');
        
        setTimeout(() => target.classList.add('shown'), 50);
        if(id === 'history') renderHistory();
        if(id === 'library') buildLibrary();
    }

    function switchMode(mode) {
        document.getElementById('area-draw').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('area-manual').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('m-draw').className = 'mode-btn ' + (mode === 'draw' ? 'active' : '');
        document.getElementById('m-manual').className = 'mode-btn ' + (mode === 'manual' ? 'active' : '');
        if(mode === 'manual') buildManualGrid();
    }

    function startCast() {
        const picks = [];
        for(let i=0; i<3; i++) {
            const r = document.getElementById('r'+i);
            r.innerHTML = '';
            for(let j=0; j<20; j++) {
                const d = document.createElement('div'); d.className = 'reel-unit';
                d.textContent = RUNES[Math.floor(Math.random()*25)].g; r.appendChild(d);
            }
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            const last = document.createElement('div'); last.className = 'reel-unit';
            last.textContent = win.g; r.appendChild(last);
            r.style.transition = 'none'; r.style.transform = 'translateY(0)';
            setTimeout(() => {
                r.style.transition = `transform ${2 + (i*0.5)}s cubic-bezier(0.1, 0, 0.1, 1)`;
                r.style.transform = `translateY(-${20 * 115}px)`;
            }, 50);
        }
        setTimeout(() => {
            finishReading(picks, `${picks[0].m}, through ${picks[1].m.toLowerCase()}, leads to ${picks[2].m.toLowerCase()}.`);
        }, 3500);
    }

    function buildManualGrid() {
        const grid = document.getElementById('manual-grid'); grid.innerHTML = ''; manualSelected = [];
        RUNES.forEach(r => {
            const btn = document.createElement('div'); btn.className = 'rune-btn';
            btn.innerHTML = `<span>${r.g}</span><label>${r.n}</label>`;
            btn.onclick = () => {
                if(btn.classList.contains('selected')) {
                    btn.classList.remove('selected');
                    manualSelected = manualSelected.filter(x => x.n !== r.n);
                } else if(manualSelected.length < 3) {
                    btn.classList.add('selected'); manualSelected.push(r);
                }
                const b = document.getElementById('manual-submit');
                b.textContent = manualSelected.length === 3 ? 'Interpret' : `${manualSelected.length}/3 Selected`;
                b.style.opacity = manualSelected.length === 3 ? '1' : '0.3';
                b.style.pointerEvents = manualSelected.length === 3 ? 'all' : 'none';
            };
            grid.appendChild(btn);
        });
    }

    function submitManual() {
        finishReading(manualSelected, `${manualSelected[0].m}, paired with ${manualSelected[1].m.toLowerCase()}, culminates in ${manualSelected[2].m.toLowerCase()}.`);
    }

    function finishReading(runes, text) {
        document.getElementById('area-draw').style.display = 'none';
        document.getElementById('area-manual').style.display = 'none';
        document.getElementById('read-modes').style.display = 'none';
        
        const visualCont = document.getElementById('reveal-visuals');
        visualCont.innerHTML = '';
        runes.forEach(r => {
            const div = document.createElement('div'); div.className = 'result-rune-card';
            div.innerHTML = `<span class="glyph">${r.g}</span><span class="name">${r.n}</span>`;
            visualCont.appendChild(div);
        });

        document.getElementById('read-text').textContent = text;
        document.getElementById('reading-reveal').style.display = 'block';
        
        let h = JSON.parse(localStorage.getItem('rune_history') || '[]');
        h.unshift({ id: Date.now(), runes, text, date: new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}) });
        localStorage.setItem('rune_history', JSON.stringify(h.slice(0, 50)));
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('rune_history') || '[]');
        const counts = {};
        h.forEach(x => x.runes.forEach(r => counts[r.n] = (counts[r.n] || 0) + 1));
        
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 3);
        const topCont = document.getElementById('top-insights');
        topCont.innerHTML = '';
        sorted.forEach(([name, count]) => {
            const r = RUNES.find(x => x.n === name);
            const div = document.createElement('div'); div.className = 'top-card';
            div.innerHTML = `<div style="font-size:30px; width:40px;">${r.g}</div><div><div style="text-transform: uppercase; color: var(--accent); font-size: 14px;">${r.n}</div><div style="font-size:11px; color: var(--dim2);">${count} Draws · ${r.m}</div></div>`;
            topCont.appendChild(div);
        });

        const fullCont = document.getElementById('full-stats');
        fullCont.innerHTML = '';
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'stat-row';
            div.innerHTML = `<span>${r.g} ${r.n}</span><span>${counts[r.n] || 0}</span>`;
            fullCont.appendChild(div);
        });

        const jCont = document.getElementById('journal-list');
        jCont.innerHTML = '';
        h.forEach(item => {
            const wrap = document.createElement('div'); wrap.className = 'history-item';
            wrap.innerHTML = `
                <button class="delete-reveal" onclick="deleteItem(${item.id})">Delete</button>
                <div class="history-content">
                    <div style="font-size: 10px; color: var(--dim2); margin-bottom: 8px;">${item.date}</div>
                    <div style="font-size: 20px; letter-spacing: 12px; margin-bottom: 12px;">${item.runes.map(r => r.g).join('')}</div>
                    <div style="color: var(--fg2); font-size: 15px;">${item.text}</div>
                </div>`;
            
            let startX;
            const content = wrap.querySelector('.history-content');
            wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; content.style.transition = 'none'; }, {passive:true});
            wrap.addEventListener('touchmove', e => {
                let diff = startX - e.touches[0].clientX;
                if(diff > 0) content.style.transform = `translateX(-${Math.min(diff, 90)}px)`;
            }, {passive:true});
            wrap.addEventListener('touchend', e => {
                content.style.transition = 'transform 0.4s';
                if(startX - e.changedTouches[0].clientX > 45) content.style.transform = 'translateX(-85px)';
                else content.style.transform = 'translateX(0)';
            });
            jCont.appendChild(wrap);
        });
    }

    function deleteItem(id) {
        let h = JSON.parse(localStorage.getItem('rune_history') || '[]');
        h = h.filter(x => x.id !== id);
        localStorage.setItem('rune_history', JSON.stringify(h));
        renderHistory();
    }

    function buildLibrary() {
        const cont = document.getElementById('lib-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-entry';
            div.innerHTML = `<div style="display:flex; align-items:center; gap:20px;"><div style="font-size:36px; width:40px;">${r.g}</div><div><div style="color:var(--accent); text-transform:uppercase; font-size:14px;">${r.n}</div><div style="font-size:11px; color:var(--dim2);">${r.m}</div></div></div><div class="lore-box" id="lore-${r.n}">${r.l}</div>`;
            div.onclick = () => document.getElementById('lore-'+r.n).classList.toggle('open');
            cont.appendChild(div);
        });
    }

    const rotd = RUNES[Math.floor(Math.random()*24)];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    document.getElementById('home-date').textContent = new Date().toLocaleDateString('en-GB', {weekday: 'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
