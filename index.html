    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* ── iOS Safari colour fixes ── */
    button, a {
        -webkit-appearance: none; appearance: none;
        color: inherit; -webkit-text-fill-color: inherit;
        font-family: 'Cormorant Garamond', serif;
    }

    body {
        background: var(--bg); color: var(--fg);
        font-family: 'Cormorant Garamond', serif;
        overscroll-behavior: none; overflow-x: hidden;
        -webkit-text-fill-color: var(--fg);
    }

    /* Navigation */
    #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-pill { background: rgba(26,26,36,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    .nav-btn { width: 65px; height: 55px; background: none; border: none; color: var(--dim2); -webkit-text-fill-color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
    .nav-btn.active { color: var(--accent); -webkit-text-fill-color: var(--accent); }
    .nav-btn .icon { font-size: 20px; margin-bottom: 2px; color: inherit; -webkit-text-fill-color: inherit; }
    .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; color: inherit; -webkit-text-fill-color: inherit; }

    .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 160px; opacity: 0; }
    .page.active { display: flex; opacity: 1; animation: fadeIn 0.5s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* Home */
    .home-hero { text-align: center; padding: 60px 24px 40px; }
    .date-display { font-size: 11px; letter-spacing: 0.5em; color: var(--fg); -webkit-text-fill-color: var(--fg); text-transform: uppercase; margin-bottom: 50px; opacity: 0.8; }
    .rotd-glyph { font-size: 110px; color: var(--fg); -webkit-text-fill-color: var(--fg); margin-bottom: 15px; text-shadow: 0 0 30px rgba(201,169,110,0.2); }
    .rotd-name { font-size: 18px; color: var(--accent); -webkit-text-fill-color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 8px; }
    .rotd-meaning { font-size: 14px; font-style: italic; color: var(--dim2); -webkit-text-fill-color: var(--dim2); margin-bottom: 40px; }

    .action-card { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin: 0 20px 15px; padding: 30px 25px; cursor: pointer; transition: transform 0.2s; }
    .action-card:active { transform: scale(0.97); }
    .action-title { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; color: var(--accent); -webkit-text-fill-color: var(--accent); margin-bottom: 4px; }
    .action-sub { font-size: 11px; color: var(--dim2); -webkit-text-fill-color: var(--dim2); font-style: italic; }

    /* Reader */
    .reel-container { display: flex; justify-content: center; gap: 15px; margin: 40px 0; height: 130px; }
    .slot { width: 95px; height: 130px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; position: relative; }
    .reel { transition-property: transform; transition-timing-function: cubic-bezier(0.15, 0, 0.05, 1); }
    .reel-unit { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; color: var(--fg); -webkit-text-fill-color: var(--fg); }

    .manual-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
    .manual-item { background: var(--dim); border: 1px solid transparent; border-radius: 10px; padding: 18px 5px; text-align: center; transition: 0.3s; font-size: 24px; color: var(--fg); -webkit-text-fill-color: var(--fg); cursor: pointer; }
    .manual-item.selected { border-color: var(--accent); background: rgba(201,169,110,0.15); }

    /* ── FORGE ── */
    .forge-container {
        position: relative; width: 300px; height: 300px;
        margin: 20px auto;
    }
    .forge-container svg { width: 100%; height: 100%; }

    /* Forge picker */
    .forge-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 20px; }
    .forge-pick-btn {
        background: var(--dim); padding: 10px; border-radius: 8px;
        text-align: center; font-size: 20px; cursor: pointer;
        border: 1px solid transparent; transition: border-color 0.2s, background 0.2s;
        color: var(--fg); -webkit-text-fill-color: var(--fg);
    }
    .forge-pick-btn.chosen { border-color: var(--accent); background: rgba(201,169,110,0.12); }

    /* Stats / History */
    .talisman-card { background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
    .talisman-power { font-size: 14px; font-style: italic; line-height: 1.6; color: var(--fg2); -webkit-text-fill-color: var(--fg2); }
    .stats-section { padding: 0 20px; margin-bottom: 30px; }
    .stat-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim2); -webkit-text-fill-color: var(--dim2); margin-bottom: 15px; display: block; }
    .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 40px; }
    .grid-stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    .history-item { position: relative; width: 100%; overflow: hidden; background: var(--bg); border-bottom: 1px solid var(--dim); }
    .history-content { position: relative; z-index: 10; background: var(--bg); padding: 25px 20px; transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    .history-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; background: var(--red-dim); color: #ff9999; -webkit-text-fill-color: #ff9999; display: flex; align-items: center; justify-content: center; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; z-index: 1; cursor: pointer; }

    /* Guide */
    .guide-item { border-bottom: 1px solid var(--dim); padding: 25px 20px; }
    .guide-header { display: flex; align-items: center; gap: 25px; cursor: pointer; }
    .guide-desc { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; color: var(--fg2); -webkit-text-fill-color: var(--fg2); line-height: 1.7; font-size: 15px; }
    .guide-item.open .guide-desc { max-height: 600px; margin-top: 20px; }

    /* History swipe */
    .history-item {
        position: relative; overflow: hidden;
        background: var(--bg); border-bottom: 1px solid var(--dim);
        touch-action: pan-y;
    }
    .history-delete-bg {
        position: absolute; right: 0; top: 0; bottom: 0; width: 100%;
        background: #5c1a1a;
        display: flex; align-items: center; justify-content: flex-end;
        padding-right: 28px;
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em;
        color: #ff9999; -webkit-text-fill-color: #ff9999;
    }
    .history-content {
        position: relative; z-index: 2; background: var(--bg);
        padding: 22px 20px; cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        will-change: transform;
    }
    .history-item.swiped .history-content { transform: translateX(-90px); }

    /* Full-screen detail modal */
    .detail-modal {
        position: fixed; inset: 0; z-index: 5000;
        background: rgba(13,13,18,0.97);
        display: flex; flex-direction: column;
        padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
        animation: fadeIn 0.25s forwards;
        overflow-y: auto;
    }
    .detail-modal-close {
        position: sticky; top: 0; z-index: 10;
        display: flex; justify-content: flex-end;
        padding: 16px 20px;
    }
    .detail-modal-close button {
        background: rgba(255,255,255,0.07); border: none;
        color: var(--fg2); -webkit-text-fill-color: var(--fg2);
        font-size: 20px; width: 40px; height: 40px;
        border-radius: 50%; cursor: pointer; display: flex;
        align-items: center; justify-content: center;
    }

    .btn-main {
        width: calc(100% - 40px); background: none;
        border: 1px solid var(--accent); color: var(--accent); -webkit-text-fill-color: var(--accent);
        padding: 22px; text-transform: uppercase; letter-spacing: 0.4em;
        font-size: 11px; margin: 20px; cursor: pointer; border-radius: 4px;
        font-family: 'Cormorant Garamond', serif;
    }
    .btn-main:disabled { opacity: 0.2; pointer-events: none; }
    .btn-danger { border-color: var(--red-dim); color: #ff9999; -webkit-text-fill-color: #ff9999; margin-top: 40px; }
    .btn-subtle { border: none; color: var(--dim2); -webkit-text-fill-color: var(--dim2); text-decoration: underline; font-size: 9px; margin-top: -10px; }

    .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); -webkit-text-fill-color: var(--bg); padding: 12px 25px; border-radius: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; z-index: 3000; opacity: 0; transition: 0.4s; pointer-events: none; }

    /* Reading result rune display */
    .reveal-rune { font-size: 50px; color: var(--fg); -webkit-text-fill-color: var(--fg); }
    .reveal-name { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); -webkit-text-fill-color: var(--accent); margin-top: 4px; text-align: center; }

    /* ── FORGE ── */
    .forge-container {
        position: relative; width: 300px; height: 300px;
        margin: 20px auto; border-radius: 50%; overflow: hidden;
        background: #0d0d12;
        border: 1px solid rgba(201,169,110,0.15);
        box-shadow: 0 0 40px rgba(201,169,110,0.06), inset 0 0 30px rgba(0,0,0,0.5);
    }
    #forge-canvas-el {
        width: 100%; height: 100%; display: block; border-radius: 50%;
    }
    #forge-placeholder-text {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
        color: rgba(138,128,112,0.35); pointer-events: none;
    }
    .forge-pick-btn {
        background: var(--dim); padding: 10px; border-radius: 8px;
        text-align: center; font-size: 20px; cursor: pointer;
        border: 1px solid transparent; transition: border-color 0.2s, background 0.2s;
        color: var(--fg); -webkit-text-fill-color: var(--fg);
    }
    .forge-pick-btn.chosen { border-color: var(--accent); background: rgba(201,169,110,0.12); }
    .btn-recast {
        border-color: rgba(201,169,110,0.35); color: var(--dim2); -webkit-text-fill-color: var(--dim2);

        border-color: var(--accent); color: var(--accent); -webkit-text-fill-color: var(--accent);
    }
</style>

// ── State ─────────────────────────────────────────────────────────────────────
let forgeSet  = [];
let manualSet = [];
let readingActive = false;   // TRUE once a reading result is showing
let currentReadMode = 'draw';
let stats     = JSON.parse(localStorage.getItem('rune_stats') || '{}');
let history   = JSON.parse(localStorage.getItem('rune_hist')  || '[]');
let talismans = JSON.parse(localStorage.getItem('rune_tali')  || '[]');

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
    const now = new Date();
    document.getElementById('date-now').textContent =
        now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();

    // Rune of the day — deterministic by calendar date
    const rotdIdx = (now.getFullYear()*10000 + (now.getMonth()+1)*100 + now.getDate()) % 24; // exclude Wyrd
    const rotd = RUNES[rotdIdx];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    // Show today's prediction for the rune of the day
    const rotdPreds = rotd.predict || [];
    const rotdSeed = now.getFullYear()*10000 + (now.getMonth()+1)*100 + now.getDate();
    const rotdPred = rotdPreds.length > 0 ? rotdPreds[rotdSeed % rotdPreds.length] : '';
    const rotdMsgEl = document.getElementById('rotd-msg');
    if (rotdMsgEl) rotdMsgEl.textContent = rotdPred;

    navTo('home');
})();

// ── Navigation ────────────────────────────────────────────────────────────────
function navTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.querySelector(`[data-id="${id}"]`).classList.add('active');

    if (id === 'reading') {
        // ★ KEY FIX: only reset reading if no reading is currently in progress
        if (!readingActive) {
            setReadMode(currentReadMode);
        } else {
            // Make sure the reveal is shown and input UIs are hidden
            document.getElementById('draw-ui').style.display   = 'none';
            document.getElementById('manual-ui').style.display = 'none';
            document.getElementById('reveal-ui').style.display = 'block';
        }
    }
    if (id === 'forge')   initForge();
    if (id === 'history') renderStats();
    if (id === 'library') renderGuide();
}

// ── Reading: mode setup ───────────────────────────────────────────────────────
function setReadMode(mode) {
    currentReadMode = mode;
    readingActive   = false;

    document.getElementById('draw-ui').style.display   = mode === 'draw'   ? 'block' : 'none';
    document.getElementById('manual-ui').style.display = mode === 'manual' ? 'block' : 'none';
    document.getElementById('reveal-ui').style.display = 'none';

    if (mode === 'draw') {
        document.getElementById('cast-btn').disabled = false;
        const wrap = document.getElementById('reel-wrap');
        wrap.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const slot = document.createElement('div'); slot.className = 'slot';
            const reel = document.createElement('div'); reel.className = 'reel'; reel.id = `r${i}`;
            reel.style.transitionDuration = (3.2 + i * 0.6) + 's';
            reel.style.transitionDelay    = (i * 0.15) + 's';
            for (let j = 0; j < 45; j++) {
                const unit = document.createElement('div'); unit.className = 'reel-unit';
                unit.textContent = RUNES[Math.floor(Math.random() * 25)].g;
                reel.appendChild(unit);
            }
            slot.appendChild(reel); wrap.appendChild(slot);
        }
    } else {
        const grid = document.getElementById('manual-grid');
        grid.innerHTML = '';
        manualSet = [];
        RUNES.forEach(r => {
            const item = document.createElement('div'); item.className = 'manual-item';
            item.textContent = r.g;
            item.onclick = () => {
                if (manualSet.includes(r)) {
                    manualSet = manualSet.filter(x => x !== r);
                    item.classList.remove('selected');
                } else if (manualSet.length < 3) {
                    manualSet.push(r); item.classList.add('selected');
                }
                const btn = document.getElementById('manual-submit');
                btn.disabled = manualSet.length !== 3;
                btn.textContent = manualSet.length === 3 ? 'Read the Staves' : `Select ${3 - manualSet.length} More`;
            };
            grid.appendChild(item);
        });
    }
}

// ── Reading: cast ─────────────────────────────────────────────────────────────
function startCast() {
    document.getElementById('cast-btn').disabled = true;
    const picks = [];
    for (let i = 0; i < 3; i++) {
        const win = RUNES[Math.floor(Math.random() * 25)];
        picks.push(win);
        const r = document.getElementById('r' + i);
        r.lastChild.textContent = win.g;
        r.style.transform = `translateY(-${44 * 130}px)`;
    }
    setTimeout(() => processReading(picks), 4600);
}

function submitManual() { processReading(manualSet); }

function processReading(runes) {
    readingActive = true;

    document.getElementById('draw-ui').style.display   = 'none';
    document.getElementById('manual-ui').style.display = 'none';

    const container = document.getElementById('reveal-glyphs');
    container.innerHTML = '';
    runes.forEach(r => {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:6px;';
        const glyph = document.createElement('div'); glyph.className = 'reveal-rune'; glyph.textContent = r.g;
        const name  = document.createElement('div'); name.className  = 'reveal-name';  name.textContent  = r.n;
        wrap.appendChild(glyph); wrap.appendChild(name);
        container.appendChild(wrap);
        stats[r.n] = (stats[r.n] || 0) + 1;
    });
    localStorage.setItem('rune_stats', JSON.stringify(stats));

    // Build reading from structured predict/warn fields
    // Positions: Past · Present · Future
    const positions = ['Past', 'Present', 'Future'];
    const labels    = ['What has shaped you', 'What is active now', 'What is coming'];

    // Pick a deterministic-but-varied prediction index per rune per day
    const today = new Date();
    const seed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();

    const parts = runes.map((r, i) => {
        const preds = r.predict || [`${r.m} is present.`];
        const idx = (seed + i * 7 + (r.n.charCodeAt(0) || 0)) % preds.length;
        return { r, pos: positions[i], label: labels[i], prediction: preds[idx] };
    });

    // Warning comes from the middle rune (most active)
    const warnRune = runes[1];
    const warnText = warnRune.warn || '';

    // Build HTML reading
    const html = parts.map(p => `
        <div style="margin-bottom:28px; text-align:left; border-left:2px solid rgba(201,169,110,0.25); padding-left:16px;">
            <div style="font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--accent); -webkit-text-fill-color:var(--accent); margin-bottom:4px;">${p.pos} — ${p.label}</div>
            <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.2em; color:var(--dim2); -webkit-text-fill-color:var(--dim2); margin-bottom:8px;">${p.r.n} · ${p.r.m}</div>
            <div style="font-size:17px; font-style:italic; line-height:1.7; color:var(--fg); -webkit-text-fill-color:var(--fg);">${p.prediction}</div>
        </div>`).join('');

    const warnHtml = warnText ? `
        <div style="margin-top:8px; padding:14px 16px; background:rgba(201,169,110,0.06); border-radius:8px; border:1px solid rgba(201,169,110,0.12);">
            <div style="font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--dim2); -webkit-text-fill-color:var(--dim2); margin-bottom:6px;">Heed</div>
            <div style="font-size:15px; font-style:italic; line-height:1.6; color:var(--fg2); -webkit-text-fill-color:var(--fg2);">${warnText}</div>
        </div>` : '';

    const revealDiv = document.getElementById('reveal-text');
    revealDiv.innerHTML = html + warnHtml;

    const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}).toUpperCase();
    const textStr = parts.map(p => `${p.pos}: ${p.prediction}`).join(' ');
    history.unshift({ date: dateStr, names: runes.map(r => r.n), glyphs: runes.map(r => r.g).join(' · '), text: textStr });
    localStorage.setItem('rune_hist', JSON.stringify(history.slice(0, 30)));

    document.getElementById('reveal-ui').style.display = 'block';
}

function resetReader() {
    readingActive = false;
    setReadMode(currentReadMode);
    document.getElementById('cast-btn').disabled = false;
}

// ── Forge ─────────────────────────────────────────────────────────────────────
// Approach: draw runes as large Unicode text on a Canvas.
// No pixel reading (avoids iOS Safari canvas taint errors).
// Each rune is drawn upright or mirrored, centred on the same point.
// Rethrow cycles through mirror combinations for variety.
// XOR-style compositing done via globalCompositeOperation.

let forgeMirrors  = [];
let forgeTransforms = [];

const FORGE_SIZE = 300;
const FORGE_FS   = 220;
const FORGE_FONT = `${FORGE_FS}px "Segoe UI Historic","Segoe UI Symbol","Noto Sans Runic",serif`;

// Known visual centre offsets per rune (y offset as fraction of font size).
// Runic glyphs sit differently relative to the font baseline.
// We use a fixed upward nudge to visually centre them.
const RUNE_Y_NUDGE = -0.08; // most runes sit slightly above centre

function drawRune(ctx, glyph, x, y, scale, mirror) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, mirror ? -1 : 1);
    if (mirror) {
        // horizontal mirror
        ctx.scale(-1, 1);
        ctx.scale(1, -1); // undo vertical flip
    }
    ctx.scale(scale, scale);
    ctx.font = `${FORGE_FS}px "Segoe UI Historic","Segoe UI Symbol","Noto Sans Runic",serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(glyph, 0, FORGE_FS * RUNE_Y_NUDGE);
    ctx.restore();
}

function compositeForge() {
    const cv = document.getElementById('forge-canvas-el');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const cx = FORGE_SIZE / 2, cy = FORGE_SIZE / 2;
    const count = forgeSet.length;
    const SCALE = 0.82;
    const BASE_Y = -FORGE_SIZE * 0.03;

    ctx.clearRect(0, 0, FORGE_SIZE, FORGE_SIZE);

    // Background
    ctx.fillStyle = '#0d0d12';
    ctx.beginPath();
    ctx.arc(cx, cy, cx, 0, Math.PI * 2);
    ctx.fill();

    // Inner glow
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, cx * 0.85);
    grd.addColorStop(0,   'rgba(201,169,110,0.10)');
    grd.addColorStop(0.5, 'rgba(201,169,110,0.04)');
    grd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, cx, 0, Math.PI * 2);
    ctx.fill();

    if (count === 0) return;

    // Position offsets — runes nudged slightly apart so they
    // sit beside each other rather than perfectly stacked
    const nudge = FORGE_SIZE * 0.07;
    const offsets = {
        1: [[0, 0]],
        2: [[-nudge * 0.5, 0], [nudge * 0.5, 0]],
        3: [[0, -nudge * 0.4], [-nudge * 0.65, nudge * 0.45], [nudge * 0.65, nudge * 0.45]],
        4: [[-nudge*0.5,-nudge*0.4],[nudge*0.5,-nudge*0.4],[-nudge*0.5,nudge*0.45],[nudge*0.5,nudge*0.45]],
    };
    const pos = offsets[Math.min(count, 4)] || offsets[4];

    function drawGlyph(r, i, colour, strokeW) {
        const mirror = forgeMirrors[i] ?? false;
        const [ox, oy] = pos[i] ?? [0, 0];
        ctx.save();
        ctx.translate(cx + ox, cy + BASE_Y + oy);
        ctx.scale(SCALE, SCALE);
        if (mirror) ctx.scale(-1, 1);
        ctx.font = FORGE_FONT;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (strokeW) {
            ctx.strokeStyle = colour;
            ctx.lineWidth = strokeW;
            ctx.lineJoin = 'round';
            ctx.strokeText(r.g, 0, FORGE_FS * RUNE_Y_NUDGE);
        } else {
            ctx.fillStyle = colour;
            ctx.fillText(r.g, 0, FORGE_FS * RUNE_Y_NUDGE);
        }
        ctx.restore();
    }

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, cx - 2, 0, Math.PI * 2);
    ctx.clip();

    // Pass 1: dark separator stroke under everything
    // This creates a thin dark halo around each glyph so where
    // two strokes cross there's a visible separation line —
    // the eye reads it as one stroke passing in front of the other
    forgeSet.forEach((r, i) => drawGlyph(r, i, '#0d0d12', 9));

    // Pass 2: gold fill — all runes on top, fully visible
    forgeSet.forEach((r, i) => drawGlyph(r, i, '#c9a96e', null));

    ctx.restore();

    // Vignette
    const vig = ctx.createRadialGradient(cx, cy, cx * 0.52, cx, cy, cx);
    vig.addColorStop(0,    'rgba(0,0,0,0)');
    vig.addColorStop(0.75, 'rgba(13,13,18,0.20)');
    vig.addColorStop(1,    'rgba(13,13,18,1)');
    ctx.fillStyle = vig;
    ctx.beginPath();
    ctx.arc(cx, cy, cx, 0, Math.PI * 2);
    ctx.fill();
}

function smartAlignAngles() {
    // No pixel analysis — just try all mirror combos and pick the one
    // that will produce the most varied composition. Since all runes
    // are centred on the same point, mirroring alternating runes creates
    // the bind rune appearance (branches point in different directions).
    const count = forgeSet.length;

    // Default: alternate mirrors for natural variety
    forgeMirrors = forgeSet.map((_, i) => i % 2 === 1);
    compositeForge();
}


function initForge() {
    const p = document.getElementById('forge-picker');
    if (p.children.length > 0) { renderTalismans(); return; }
    RUNES.forEach(r => {
        const b = document.createElement('div');
        b.className = 'forge-pick-btn';
        b.textContent = r.g;
        b.dataset.rune = r.n;
        b.onclick = () => {
            if (forgeSet.find(x => x.n === r.n)) {
                forgeSet = forgeSet.filter(x => x.n !== r.n);
                forgeMirrors = forgeMirrors.slice(0, forgeSet.length);
                b.classList.remove('chosen');
            } else if (forgeSet.length < 4) {
                forgeSet.push(r);
                forgeMirrors.push(forgeSet.length % 2 === 0);
                b.classList.add('chosen');
            }
            updateForge();
        };
        p.appendChild(b);
    });
    renderTalismans();
}

function updateForge() {
    const placeholder = document.getElementById('forge-placeholder-text');
    document.getElementById('bind-btn').disabled   = forgeSet.length < 2;
    document.getElementById('recast-btn').disabled = forgeSet.length < 2;

    if (forgeSet.length === 0) {
        placeholder.style.display = 'flex';
        compositeForge();
        return;
    }
    placeholder.style.display = 'none';
    compositeForge();
}


function recastForge() {
    if (forgeSet.length < 2) return;
    const c = document.getElementById('forge-canvas');
    c.style.transition = 'opacity 0.1s';
    c.style.opacity = '0.15';
    setTimeout(() => {
        // Randomise mirrors and which rune is "primary" by shuffling order
        forgeMirrors = forgeSet.map(() => Math.random() > 0.5);
        // Rotate forgeSet order so a different rune gets drawn first (is primary)
        const shift = 1 + Math.floor(Math.random() * (forgeSet.length - 1));
        forgeSet = [...forgeSet.slice(shift), ...forgeSet.slice(0, shift)];
        forgeMirrors = [...forgeMirrors.slice(shift), ...forgeMirrors.slice(0, shift)];
        compositeForge();
        c.style.opacity = '1';
    }, 120);
}

function bindTalisman() {
    if (forgeSet.length < 2) return;
    const glyphs = forgeSet.map(r => r.g).join('');
    const names  = forgeSet.map(r => r.n);
    const meanings = forgeSet.map(r => r.m.toLowerCase());
    // Build a talisman description from the power fields
    const powers = forgeSet.map(r => r.power || `The power of ${r.m.toLowerCase()}.`);
    const incantation = powers.length === 1
        ? powers[0]
        : `A talisman of ${names.join(' and ')}: ${powers.map((p,i) => p.replace(/\.$/, '')).join('. ')}. Carry this seal as your protection and your intent.`;

    // Redraw onto a fresh canvas that has never had getImageData called on it
    // — guarantees toDataURL works on iOS Safari
    let snap = null;
    try {
        const fresh = document.createElement('canvas');
        fresh.width = fresh.height = 300;
        const fCtx = fresh.getContext('2d');
        const cx = 150, cy = 150, S = 300;
        const SCALE = 0.82, BASE_Y = -S * 0.03;
        const nudge = S * 0.07;
        const count = forgeSet.length;
        const offsets = {
            1:[[0,0]], 2:[[-nudge*0.5,0],[nudge*0.5,0]],
            3:[[0,-nudge*0.4],[-nudge*0.65,nudge*0.45],[nudge*0.65,nudge*0.45]],
            4:[[-nudge*0.5,-nudge*0.4],[nudge*0.5,-nudge*0.4],[-nudge*0.5,nudge*0.45],[nudge*0.5,nudge*0.45]],
        };
        const pos = offsets[Math.min(count,4)] || offsets[4];

        fCtx.fillStyle = '#0d0d12';
        fCtx.beginPath(); fCtx.arc(cx,cy,cx,0,Math.PI*2); fCtx.fill();

        function fDraw(r, i, colour, strokeW) {
            const mirror = forgeMirrors[i] ?? false;
            const [ox,oy] = pos[i] ?? [0,0];
            fCtx.save();
            fCtx.translate(cx+ox, cy+BASE_Y+oy);
            fCtx.scale(SCALE, SCALE);
            if (mirror) fCtx.scale(-1,1);
            fCtx.font = FORGE_FONT; fCtx.textAlign='center'; fCtx.textBaseline='middle';
            if (strokeW) {
                fCtx.strokeStyle=colour; fCtx.lineWidth=strokeW; fCtx.lineJoin='round';
                fCtx.strokeText(r.g, 0, FORGE_FS*RUNE_Y_NUDGE);
            } else {
                fCtx.fillStyle=colour; fCtx.fillText(r.g, 0, FORGE_FS*RUNE_Y_NUDGE);
            }
            fCtx.restore();
        }

        fCtx.save();
        fCtx.beginPath(); fCtx.arc(cx,cy,cx-2,0,Math.PI*2); fCtx.clip();
        forgeSet.forEach((r,i) => fDraw(r,i,'#0d0d12',9));
        forgeSet.forEach((r,i) => fDraw(r,i,'#c9a96e',null));
        fCtx.restore();

        const vig = fCtx.createRadialGradient(cx,cy,cx*0.52,cx,cy,cx);
        vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(0.75,'rgba(13,13,18,0.2)');
        vig.addColorStop(1,'rgba(13,13,18,1)');
        fCtx.fillStyle=vig; fCtx.beginPath(); fCtx.arc(cx,cy,cx,0,Math.PI*2); fCtx.fill();

        snap = fresh.toDataURL('image/png');
    } catch(e) {
        console.warn('Canvas snapshot failed:', e);
        snap = null;
    }

    talismans.unshift({ glyphs, incantation, snap, mirrors: [...forgeMirrors] });
    localStorage.setItem('rune_tali', JSON.stringify(talismans.slice(0, 15)));
    showToast('Talisman Bound');

    forgeSet = [];
    forgeMirrors = [];
    document.querySelectorAll('.forge-pick-btn.chosen').forEach(b => b.classList.remove('chosen'));
    updateForge();
    renderTalismans();
}

// ── Stats & History ───────────────────────────────────────────────────────────
function renderStats() {
    const census = document.getElementById('full-rune-stats');
    census.innerHTML = '';
    RUNES.forEach(r => {
        const count = stats[r.n] || 0;
        const box = document.createElement('div'); box.className = 'grid-stat-box';
        box.innerHTML = `
            <span style="font-size:22px;">${r.g}</span>
            <span style="font-size:9px; opacity:0.4; text-transform:uppercase; letter-spacing:0.1em;">${r.n}</span>
            <span style="color:var(--accent); -webkit-text-fill-color:var(--accent); font-weight:bold;">${count}</span>`;
        census.appendChild(box);
    });

    const hList = document.getElementById('history-list');
    hList.innerHTML = '';
    if (history.length === 0) {
        hList.innerHTML = '<p style="font-size:13px;color:var(--dim2);-webkit-text-fill-color:var(--dim2);font-style:italic;padding:20px 0;">No readings yet.</p>';
        return;
    }

    history.forEach((h, idx) => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="history-delete-bg">Delete</div>
            <div class="history-content">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                    <div style="font-size:10px;color:var(--accent);-webkit-text-fill-color:var(--accent);letter-spacing:0.2em;">${h.date}</div>
                    <div style="font-size:22px;letter-spacing:4px;">${h.glyphs}</div>
                </div>
                <div style="font-size:14px;font-style:italic;color:var(--fg2);-webkit-text-fill-color:var(--fg2);line-height:1.5;opacity:0.8;">${(h.text || '').split('.')[0]}.</div>
            </div>`;

        // ── Swipe to delete ────────────────────────────────────────────────
        const content = item.querySelector('.history-content');
        let startX = 0, startY = 0, currentX = 0, dragging = false, swiped = false;

        content.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            currentX = 0;
            dragging = true;
            content.style.transition = 'none';
        }, {passive: true});

        content.addEventListener('touchmove', e => {
            if (!dragging) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            // Only track horizontal swipes
            if (Math.abs(dy) > Math.abs(dx) && Math.abs(currentX) < 5) return;
            currentX = dx;
            if (dx < 0) {
                // Swipe left: slide content to reveal delete
                const travel = Math.min(Math.abs(dx), window.innerWidth * 0.85);
                content.style.transform = `translateX(${-travel}px)`;
            } else if (swiped && dx > 0) {
                // Swipe right to close when already open
                const travel = Math.max(0, 90 - dx);
                content.style.transform = `translateX(-${travel}px)`;
            }
        }, {passive: true});

        content.addEventListener('touchend', e => {
            dragging = false;
            content.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
            const travel = Math.abs(currentX);

            if (currentX < 0) {
                if (travel > window.innerWidth * 0.5) {
                    // Swiped more than halfway — delete it
                    content.style.transform = `translateX(-${window.innerWidth}px)`;
                    item.style.transition = 'max-height 0.35s ease, opacity 0.35s ease';
                    item.style.overflow = 'hidden';
                    setTimeout(() => {
                        item.style.maxHeight = item.offsetHeight + 'px';
                        requestAnimationFrame(() => {
                            item.style.maxHeight = '0';
                            item.style.opacity = '0';
                        });
                        setTimeout(() => deleteHistory(idx), 350);
                    }, 200);
                } else if (travel > 40) {
                    // Partial swipe — snap open to show delete
                    content.style.transform = 'translateX(-90px)';
                    swiped = true;
                } else {
                    content.style.transform = 'translateX(0)';
                    swiped = false;
                }
            } else if (swiped) {
                content.style.transform = 'translateX(0)';
                swiped = false;
            }
        });

        // Tap the delete bg to confirm delete when swiped open
        item.querySelector('.history-delete-bg').addEventListener('click', () => {
            content.style.transition = 'transform 0.2s ease';
            content.style.transform = `translateX(-${window.innerWidth}px)`;
            setTimeout(() => deleteHistory(idx), 220);
        });

        // Tap content to open detail — only if not mid-swipe
        content.addEventListener('click', e => {
            if (swiped) {
                content.style.transform = 'translateX(0)';
                content.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
                swiped = false;
                return;
            }
            openReadingDetail(h);
        });

        hList.appendChild(item);
    });
}

function deleteHistory(idx) {
    const item = history[idx];
    if (item && item.names) item.names.forEach(n => { if (stats[n] > 0) stats[n]--; });
    history.splice(idx, 1);
    localStorage.setItem('rune_hist',  JSON.stringify(history));
    localStorage.setItem('rune_stats', JSON.stringify(stats));
    renderStats();
}

function purgeHistory() {
    if (confirm('Purge all records? This will reset your census counts and history.')) {
        history = []; stats = {};
        localStorage.removeItem('rune_hist');
        localStorage.removeItem('rune_stats');
        renderStats();
        showToast('Records Purged');
    }
}

// ── Detail modals ─────────────────────────────────────────────────────────────
function openReadingDetail(h) {
    const modal = document.getElementById('detail-modal');
    // Rebuild the rune objects from stored names
    const runes = (h.names || []).map(n => RUNES.find(r => r.n === n)).filter(Boolean);
    const positions = ['Past', 'Present', 'Future'];

    const runeHTML = runes.map((r, i) => `
        <div style="margin-bottom:30px;text-align:left;border-left:2px solid rgba(201,169,110,0.3);padding-left:18px;">
            <div style="font-size:9px;letter-spacing:0.35em;text-transform:uppercase;color:var(--accent);-webkit-text-fill-color:var(--accent);margin-bottom:6px;">${positions[i] || 'Rune ' + (i+1)}</div>
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
                <span style="font-size:52px;color:var(--fg);-webkit-text-fill-color:var(--fg);">${r.g}</span>
                <div>
                    <div style="font-size:18px;letter-spacing:0.15em;text-transform:uppercase;">${r.n}</div>
                    <div style="font-size:12px;color:var(--dim2);-webkit-text-fill-color:var(--dim2);font-style:italic;">${r.m}</div>
                </div>
            </div>
            <div style="font-size:16px;font-style:italic;line-height:1.7;color:var(--fg);-webkit-text-fill-color:var(--fg);">${r.predict ? r.predict[0] : r.l}</div>
            ${r.warn ? `<div style="margin-top:12px;font-size:13px;color:var(--dim2);-webkit-text-fill-color:var(--dim2);font-style:italic;"><span style="color:var(--accent);-webkit-text-fill-color:var(--accent);">Heed — </span>${r.warn}</div>` : ''}
        </div>`).join('');

    modal.innerHTML = `
        <div class="detail-modal">
            <div class="detail-modal-close"><button onclick="closeModal()">✕</button></div>
            <div style="padding:0 24px 40px;">
                <div style="font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--dim2);-webkit-text-fill-color:var(--dim2);margin-bottom:6px;">${h.date}</div>
                <div style="font-size:28px;letter-spacing:8px;margin-bottom:30px;">${h.glyphs}</div>
                ${runeHTML}
            </div>
        </div>`;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function openTalismanDetail(idx) {
    const t = talismans[idx];
    if (!t) return;
    const modal = document.getElementById('detail-modal');

    const preview = t.snap && t.snap.startsWith('data:')
        ? `<img src="${t.snap}" style="width:180px;height:180px;border-radius:50%;display:block;margin:0 auto 30px;box-shadow:0 0 40px rgba(201,169,110,0.2);">`
        : `<div style="font-size:60px;letter-spacing:-8px;text-align:center;margin-bottom:30px;">${t.glyphs || ''}</div>`;

    modal.innerHTML = `
        <div class="detail-modal">
            <div class="detail-modal-close"><button onclick="closeModal()">✕</button></div>
            <div style="padding:0 24px 40px;text-align:center;">
                ${preview}
                <div style="font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--accent);-webkit-text-fill-color:var(--accent);margin-bottom:20px;">Talisman of ${t.glyphs || ''}</div>
                <div style="font-size:17px;font-style:italic;line-height:1.8;color:var(--fg);-webkit-text-fill-color:var(--fg);text-align:left;padding:20px;background:rgba(201,169,110,0.05);border-radius:12px;border:1px solid rgba(201,169,110,0.1);">${t.incantation}</div>
                <div style="margin-top:24px;text-align:right;">
                    <span style="font-size:9px;color:#ff9999;-webkit-text-fill-color:#ff9999;cursor:pointer;letter-spacing:0.2em;text-transform:uppercase;" onclick="closeModal();deleteTalisman(${idx})">Unbind</span>
                </div>
            </div>
        </div>`;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    const modal = document.getElementById('detail-modal');
    modal.style.display = 'none';
    modal.innerHTML = '';
    document.body.style.overflow = '';
}

// Close modal on background tap
document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-modal')) closeModal();
});

function renderTalismans() {
    const list = document.getElementById('talisman-list');
    list.innerHTML = '';
    if (talismans.length === 0) {
        list.innerHTML = '<p style="font-size:13px;color:var(--dim2);-webkit-text-fill-color:var(--dim2);font-style:italic;text-align:center;padding:20px 0;">No talismans bound yet</p>';
        return;
    }
    talismans.forEach((t, idx) => {
        const card = document.createElement('div');
        card.className = 'talisman-card';
        card.style.cursor = 'pointer';
        const preview = t.snap && t.snap.startsWith('data:')
            ? `<img src="${t.snap}" style="width:70px;height:70px;border-radius:50%;display:block;float:right;margin-left:15px;">`
            : `<div style="font-size:28px;letter-spacing:-4px;float:right;margin-left:15px;">${t.glyphs || ''}</div>`;
        card.innerHTML = `
            ${preview}
            <div style="font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);-webkit-text-fill-color:var(--accent);margin-bottom:8px;">Talisman</div>
            <div class="talisman-power" style="font-size:13px;">${(t.incantation || '').substring(0, 90)}${t.incantation && t.incantation.length > 90 ? '…' : ''}</div>
            <div style="clear:both;"></div>`;
        card.onclick = () => openTalismanDetail(idx);
        list.appendChild(card);
    });
}

function deleteTalisman(idx) {
    talismans.splice(idx, 1);
    localStorage.setItem('rune_tali', JSON.stringify(talismans));
    renderTalismans();
}

// ── Stave Guide ───────────────────────────────────────────────────────────────
function renderGuide() {
    const cont = document.getElementById('guide-list');
    if (cont.innerHTML) return;
    RUNES.forEach(r => {
        const div = document.createElement('div'); div.className = 'guide-item';
        div.innerHTML = `
            <div class="guide-header" onclick="this.parentElement.classList.toggle('open')">
                <span style="font-size:40px; color:var(--accent); -webkit-text-fill-color:var(--accent);">${r.g}</span>
                <div>
                    <div style="text-transform:uppercase; letter-spacing:3px; font-size:16px;">${r.n}</div>
                    <div style="font-size:12px; color:var(--dim2); -webkit-text-fill-color:var(--dim2);">${r.m}</div>
                </div>
            </div>
            <div class="guide-desc">
                <p style="margin-bottom:14px;">${r.l}</p>
                ${r.warn ? `<p style="margin-bottom:8px;"><span style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);-webkit-text-fill-color:var(--accent);">Heed — </span>${r.warn}</p>` : ''}
                ${r.power ? `<p style="padding:10px 12px;background:rgba(201,169,110,0.06);border-radius:6px;border:1px solid rgba(201,169,110,0.12);"><span style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);-webkit-text-fill-color:var(--accent);">In the Forge — </span>${r.power}</p>` : ''}
            </div>`;
        cont.appendChild(div);
    });
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2500);
}
</script>
