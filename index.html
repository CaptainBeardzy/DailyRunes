<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --gold-fade: linear-gradient(to bottom, #c9a96e, #8a6d3b);
            --red-dim: #551a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; overflow-x: hidden; }

        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(26, 26, 36, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .nav-btn { width: 65px; height: 55px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 160px; opacity: 0; transition: opacity 0.4s; }
        .page.active { display: flex; opacity: 1; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .home-hero { text-align: center; padding: 60px 24px 40px; }
        .rotd-glyph { font-size: 110px; color: var(--fg); margin-bottom: 15px; }

        .action-card { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin: 0 20px 15px; padding: 30px 25px; cursor: pointer; }
        
        .reel-container { display: flex; justify-content: center; gap: 15px; margin: 40px 0; height: 130px; }
        .slot { width: 95px; height: 130px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; }
        .reel { transition: transform 3.2s cubic-bezier(0.15, 0, 0.05, 1); }
        .reel-unit { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; color: var(--fg); }

        /* Forge - Advanced Merged Sigil Container */
        .forge-vessel { width: 320px; height: 320px; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); margin: 20px auto; border: 1px solid var(--dim); border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.9); }
        .sigil-canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1.5); height: 100px; width: 100px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .merged-rune { position: absolute; font-size: 120px; color: var(--accent); opacity: 0.6; mix-blend-mode: plus-lighter; transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); filter: drop-shadow(0 0 5px rgba(201,169,110,0.4)); }
        
        /* Stats & History */
        .summary-card { background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 15px; padding: 25px; margin: 0 20px 20px; border-left: 3px solid var(--accent); }

        .history-item { position: relative; width: 100%; overflow: hidden; background: var(--bg); border-bottom: 1px solid var(--dim); }
        .history-content { position: relative; z-index: 10; background: var(--bg); padding: 25px 20px; transition: transform 0.3s; }
        .history-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; background: var(--red-dim); color: #ff9999; display: flex; align-items: center; justify-content: center; font-size: 11px; text-transform: uppercase; z-index: 1; }

        .guide-item { border-bottom: 1px solid var(--dim); padding: 25px 20px; }
        .guide-desc { max-height: 0; overflow: hidden; transition: max-height 0.4s; color: var(--fg2); line-height: 1.7; }
        .guide-item.open .guide-desc { max-height: 500px; margin-top: 15px; }

        .btn-main { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 20px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; margin: 20px; cursor: pointer; transition: 0.3s; }
        .btn-main:active { background: rgba(201,169,110,0.1); }
    </style>
</head>
<body>

<div class="page" id="page-home">
    <div class="home-hero">
        <div id="date-now" style="font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 60px;"></div>
        <div class="rotd-glyph" id="rotd-g">ᛗ</div>
        <div id="rotd-n" style="font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 10px;">MANNAZ</div>
        <div id="rotd-m" style="font-size: 14px; font-style: italic; color: var(--dim2);">Self, community, and the human soul</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('draw')">
        <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px; color:var(--accent)">Draw Staves</div>
        <div style="font-size:11px; color:var(--dim2); font-style:italic;">Let the Norns guide your hand</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('manual')">
        <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px; color:var(--accent)">Manual Selection</div>
        <div style="font-size:11px; color:var(--dim2); font-style:italic;">Choose with conscious intent</div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:40px;">The Oracle</h2>
        <div id="draw-ui">
            <div class="reel-container" id="reel-wrap"></div>
            <button class="btn-main" id="cast-btn" onclick="startCast()">Cast the Runes</button>
        </div>
        <div id="manual-ui" style="display:none;">
            <div id="manual-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:20px;"></div>
            <button class="btn-main" id="manual-submit" onclick="submitManual()" disabled>Select 3 Staves</button>
        </div>
        <div id="reveal-ui" style="display:none;">
            <div id="reveal-glyphs" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;"></div>
            <div id="reveal-text" style="font-size:18px; font-style:italic; line-height:1.8; color:var(--fg2); padding:0 20px; margin-bottom:40px;"></div>
            <button class="btn-main" onclick="location.reload()">Reset Session</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">Bindrune Forge</h2>
        
        <div class="forge-vessel">
            <div class="sigil-canvas" id="forge-canvas"></div>
        </div>

        <div id="forge-picker" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px; padding:20px;"></div>
        <button class="btn-main" id="save-forge" onclick="saveBindrune()" disabled>Finalize Bindrune</button>
        <button class="btn-main" style="margin-top:-10px; border:none; color:var(--dim2); text-decoration:underline; font-size:9px;" onclick="resetForge()">Reset Forge</button>
        <div id="library-forge" style="padding:20px;"></div>
    </div>
</div>

<div class="page" id="page-history">
    <div style="padding-top:60px;">
        <div class="summary-card">
            <div id="stat-ach-title" style="font-size:18px; color:var(--fg);">The Seeker</div>
            <div style="font-size:12px; color:var(--dim2); margin-top:5px;">Cast your first reading to begin</div>
        </div>
        <div id="stat-top" style="padding:0 20px;"></div>
        <div id="history-list" style="margin-top:20px;"></div>
    </div>
</div>

<div class="page" id="page-library">
    <div id="guide-list" style="padding:60px 0;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btnactive" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    // PRESERVED RUNES LORE - NO COMPRESSION
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth',l:'Creative fire and abundance. Movable wealth and creative flow.', type: 'angular'}, {g:'ᚢ',n:'Uruz',m:'Strength',l:'Primal power and physical health. The untamed force of the ox.', type: 'vertical'},
        {g:'ᚦ',n:'Thurisaz',m:'Force',l:'Reactive defense and necessary conflict. The thorn or the giant.', type: 'point'}, {g:'ᚨ',n:'Ansuz',m:'Wisdom',l:'Divine breath and communication. Ancestral consciousness and wisdom.', type: 'angular'},
        {g:'ᚱ',n:'Raidho',m:'Journey',l:'Rational action and personal rhythm. Justice and the wheel.', type: 'vertical'}, {g:'ᚲ',n:'Kenaz',m:'Clarity',l:'Knowledge and skill. Controlled fire of transformation.', type: 'angular'},
        {g:'ᚷ',n:'Gebo',m:'Exchange',l:'Balance and generosity. Sacral bond between individuals.', type: 'cross'}, {g:'ᚹ',n:'Wunjo',m:'Harmony',l:' Contentment and fulfillment. Joy from alignment with the all.', type: 'point'},
        {g:'ᚺ',n:'Hagalaz',m:'Crisis',l:'Hailstone. Disruptive force that clears the path for the new.', type: 'cross'}, {g:'ᚾ',n:'Naudhiz',m:'Need',l:'Innovation through resistance. The need-fire of survival.', type: 'cross'},
        {g:'ᛁ',n:'Isa',m:'Stillness',l:'Concentration and waiting. Stasis required for internal focus.', type: 'vertical'}, {g:'ᛃ',n:'Jera',m:'Harvest',l:'Cycles of reward. Natural timing and effort over time.', type: 'angular'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance',l:'longevity and continuity. The axis between life and death.', type: 'vertical'}, {g:'ᛈ',n:'Perthro',m:'Destiny',l:'Chance and mystery. Laws of probability and cosmic laws.', type: 'angular'},
        {g:'ᛉ',n:'Algiz',m:'Guard',l:'Protection and guidance. Lower instinct aligned with higher intuition.', type: 'vertical'}, {g:'ᛊ',n:'Sowilo',m:'Success',l:'Vitality and clear path. Sunlight burns away doubt.', type: 'angular'},
        {g:'ᛏ',n:'Tiwaz',m:'Honor',l:'Integrity and courage. Leadership and the spear of justice.', type: 'vertical'}, {g:'ᛒ',n:'Berkano',m:'Renewal',l:'Fertility and healing. Nurturing energy of rebirth.', type: 'vertical'},
        {g:'ᛖ',n:'Ehwaz',m:'Trust',l:'Synergy and cooperation. Trust between distinct forces.', type: 'vertical'}, {g:'ᛗ',n:'Mannaz',m:'Identity',l:'Humanity and shared fate. Realization of the self.', type: 'vertical'},
        {g:'ᛚ',n:'Laguz',m:'Intuition',l:'Flow of deep waters. Subconscious, emotional depth.', type: 'vertical'}, {g:'ᛜ',n:'Incubation',m:'Ingwaz',l:'Seed Containing potential. Rest before expansion.', type: 'cross'},
        {g:'ᛞ',n:'Dagaz',m:'Awakening',l:'Light of dawn. Transformation through breakthrough.', type: 'cross'}, {g:'ᛟ',n:'Legacy',m:'Heritage',l:'Ancestral land. Permanent foundations we leave behind.', type: 'angular'},
        {g:'◯',n:'Wyrd',m:'Unknown',l:'The void. destiny yet unwritten by the Norns.', type: 'special'}
    ];

    let forgeSet = [];
    let stats = JSON.parse(localStorage.getItem('rune_stats') || '{}');
    let history = JSON.parse(localStorage.getItem('rune_hist') || '[]');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelector(`[data-id="${id}"]`).classList.add('active');
        if(id === 'history') { renderStats(); }
        if(id === 'forge') renderForge();
        if(id === 'library') renderGuide();
    }

    /* READING ENGINE - ROULETTE */
    function setReadMode(mode) {
        document.getElementById('draw-ui').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('manual-ui').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('reveal-ui').style.display = 'none';
        if(mode === 'draw') {
            const wrap = document.getElementById('reel-wrap'); wrap.innerHTML = '';
            for(let i=0; i<3; i++) {
                const slot = document.createElement('div'); slot.className = 'slot';
                const reel = document.createElement('div'); reel.className = 'reel'; reel.id = `r${i}`;
                for(let j=0; j<40; j++) {
                    const unit = document.createElement('div'); unit.className = 'reel-unit';
                    unit.textContent = RUNES[Math.floor(Math.random()*25)].g; r.appendChild(unit);
                }
                slot.appendChild(reel); wrap.appendChild(slot);
            }
        }
    }

    function startCast() {
        document.getElementById('cast-btn').disabled = true;
        const picks = [];
        for(let i=0; i<3; i++) {
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            const r = document.getElementById('r'+i);
            r.lastChild.textContent = win.g; 
            r.style.transform = `translateY(-${39 * 130}px)`;
        }
        setTimeout(() => displayReveal(picks), 3200);
    }

    function displayReveal(runes) {
        document.getElementById('draw-ui').style.display = 'none';
        const v = document.getElementById('reveal-glyphs'); v.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '45px'; d.textContent = r.g; v.appendChild(d);
            stats[r.n] = (stats[r.n] || 0) + 1;
        });
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        const textStr = `${runes[0].m}, through the challenge of ${runes[1].m.toLowerCase()}, leads to ${runes[2].m.toLowerCase()}.`;
        document.getElementById('reveal-text').textContent = textStr;
        document.getElementById('reveal-ui').style.display = 'block';
    }

    /* FORGE - ADVANCED SIGIL MERGING ENGINE */
    function renderForge() {
        const p = document.getElementById('forge-picker'); if(p.children.length > 0) return;
        RUNES.forEach(r => {
            const b = document.createElement('div'); b.style.cssText = "background:var(--dim); padding:10px; border-radius:8px; width:45px; text-align:center; font-size:20px; cursor:pointer;";
            b.textContent = r.g;
            b.onclick = () => {
                if(forgeSet.includes(r)) { forgeSet = forgeSet.filter(x=>x!==r); b.style.borderColor = 'transparent'; }
                else if(forgeSet.length < 4) { forgeSet.push(r); b.style.borderColor = 'var(--accent)'; b.style.borderStyle = 'solid'; b.style.borderWidth = '1px'; }
                updateForgeVessel();
            };
            p.appendChild(b);
        });
        updateForgeLib();
    }

    function updateForgeVessel() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeSet.forEach((r, i) => {
            const el = document.createElement('div'); el.className = 'merged-rune'; el.textContent = r.g;
            
            // MAGNETIC SNAP ENGINE: شناسایی نوع شکل و تراز کردن آن
            // ۱. عمودی‌ها به محور مرکزی متصل می‌شوند
            if(r.type === 'vertical') { el.style.transform = `translateX(-50%) scale(${1 + (i*0.1)})`; el.style.left = "50%"; }
            // ۲. کراس‌ها تراز می‌شوند
            else if(r.type === 'cross') { el.style.transform = `translate(-50%, -50%) scale(0.9)`; el.style.left = "50%"; el.style.top = "50%"; }
            // ۳. زاویه‌دارها و نقاط به محور مرکزی متصل شده و کمی افست می‌شوند تا به نظر برسد از همان stave استفاده می‌کنند
            else if(r.type === 'angular' || r.type === 'point') { 
                const offset = (i - (forgeSet.length/2 - 0.5)) * 10;
                el.style.transform = `scale(1) translateX(-50%) translateY(${offset}px)`; 
                el.style.left = "50%";
            }
            // ۴. ویژه (Blank)
            else { el.style.transform = `translate(-50%, -50%) scale(0.6)`; el.style.left = "50%"; el.style.top = "50%"; }

            // افزایش شفافیت برای لایه‌بندی glowing
            el.style.opacity = 0.5 + (i * 0.15);
            cv.appendChild(el);
        });
        document.getElementById('save-forge').disabled = forgeSet.length < 2;
    }

    function resetForge() { forgeSet = []; updateForgeVessel(); const picker = document.getElementById('forge-picker'); picker.innerHTML = ''; renderForge(); }

    function saveBindrune() {
        if(forgeSet.length < 2) return;
        let lib = JSON.parse(localStorage.getItem('rune_lib') || '[]');
        const spell = forgeSet.map(r => r.m).join(' + ') + ' bound.';
        // Capture the exact layout from the forge vessel
        lib.unshift({ html: document.getElementById('forge-canvas').innerHTML, spell });
        localStorage.setItem('rune_lib', JSON.stringify(lib.slice(0, 10)));
        resetForge(); updateForgeLib();
    }

    function updateForgeLib() {
        const lib = JSON.parse(localStorage.getItem('rune_lib') || '[]');
        const body = document.getElementById('library-forge'); body.innerHTML = '';
        lib.forEach(item => {
            body.innerHTML += `<div style="padding:15px 0; border-bottom:1px solid var(--dim);">
                <div class="sigil-preview" style="height:50px; position:relative; overflow:hidden; margin-bottom:10px;">${item.html}</div>
                <div style="font-size:12px; font-style:italic; opacity:0.7;">${item.spell}</div>
            </div>`;
        });
        // Scale down the previews for the library list
        document.querySelectorAll('.sigil-preview .merged-rune').forEach(el => el.style.fontSize = "60px");
    }

    /* STATS & HISTORY census */
    function renderStats() {
        constCensus = document.getElementById('full-rune-stats');Census.innerHTML = '';
        RUNES.forEach(r => {
            Census.innerHTML += `<div class="grid-stat-box"><span>${r.g}</span><span style="font-size:10px; opacity:0.4">${r.n}</span><span style="color:var(--accent); font-weight:bold;">${stats[r.n] || 0}</span></div>`;
        });

        const sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]).slice(0,3);
        const top3Div = document.getElementById('stat-top'); top3Div.innerHTML = sorted.length ? '<div class="summary-card"><div style="font-size:10px; text-transform:uppercase; color:var(--dim2); margin-bottom:10px;">Frequency Leaders</div></div>' : '';
        sorted.forEach(([name, count]) => {
            const r = RUNES.find(rx => rx.n === name);
            top3Div.firstElementChild.innerHTML += `<div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;"><span style="font-size:24px; color:var(--accent)">${r.g}</span><div><div style="text-transform:uppercase; font-size:13px;">${name}</div><div style="font-size:11px; color:var(--dim2);">${r.m} •rawn ${count} times</div></div></div>`;
        });

        const hList = document.getElementById('history-list'); hList.innerHTML = '';
        history.forEach((h, idx) => {
            const item = document.createElement('div'); item.className = 'history-item';
            item.innerHTML = `<div class="history-delete" onclick="deleteHistory(${idx})">Delete</div>
                <div class="history-content">
                    <div style="font-size:10px; color:var(--accent); margin-bottom:4px;">${h.date}</div>
                    <div style="font-size:20px; letter-spacing:4px; margin-bottom:4px;">${h.glyphs}</div>
                    <div style="font-size:12px; font-style:italic; opacity:0.7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${h.text}</div>
                </div>`;
            
            let startX = 0; const content = item.querySelector('.history-content');
            content.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            content.addEventListener('touchmove', e => {
                let diff = e.touches[0].clientX - startX;
                if(diff < 0 && diff > -100) content.style.transform = `translateX(${diff}px)`;
            });
            content.addEventListener('touchend', e => {
                let diff = e.touches[0].clientX - startX;
                content.style.transform = diff < -50 ? 'translateX(-100px)' : 'translateX(0)';
            });
            hList.appendChild(item);
        });
    }

    function deleteHistory(idx) { history.splice(idx,1); localStorage.setItem('rune_hist', JSON.stringify(history)); renderStats(); }

    /* GUIDE */
    function renderGuide() {
        const cont = document.getElementById('guide-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-item';
            div.innerHTML = `
                <div class="guide-header" onclick="this.parentElement.classList.toggle('open')">
                    <span style="font-size:40px; color:var(--accent)">${r.g}</span>
                    <div><div style="text-transform:uppercase; letter-spacing:3px; font-size:16px;">${r.n}</div><div style="font-size:12px; color:var(--dim2);">${r.m}</div></div>
                </div>
                <div class="guide-desc">${r.l}</div>`;
            cont.appendChild(div);
        });
    }

    navTo('home');
</script>
</body>
</html>
