<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Rune Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0d0d12;
  --fg:#ede9e0;
  --accent:#c9a96e;
  --dim:#3a3830;
  --dim2:#8a8070;
  --card:#15151e;
  --fg2:#b8b4aa;
  --nav-h:80px;
}

button, a {
  -webkit-appearance:none; appearance:none;
  color:inherit; -webkit-text-fill-color:inherit;
  font-family:'Cormorant Garamond', Georgia, serif;
}
a { text-decoration:none; }

html, body {
  background:var(--bg); color:var(--fg);
  font-family:'Cormorant Garamond', Georgia, serif;
  min-height:100dvh; overscroll-behavior:none;
}

.page {
  display:none; flex-direction:column;
  min-height:100dvh; padding-bottom:calc(var(--nav-h) + 20px);
  opacity:0; transition:opacity 0.25s;
}
.page.active { display:flex; }
.page.shown  { opacity:1; }

.page-header {
  text-align:center; padding:48px 24px 28px;
  border-bottom:1px solid var(--dim);
}
.page-header h1 {
  font-size:13px; letter-spacing:0.45em; text-transform:uppercase;
  color:var(--accent); -webkit-text-fill-color:var(--accent); font-weight:300; margin-bottom:8px;
}
.page-header .sub {
  font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:var(--dim2); -webkit-text-fill-color:var(--dim2);
}

.section-label {
  font-size:11px; letter-spacing:0.4em; text-transform:uppercase;
  color:var(--dim2); -webkit-text-fill-color:var(--dim2); text-align:center; padding:24px 24px 14px;
}

/* INSIGHTS & HISTORY */
.insights-container { display: flex; flex-direction: column; gap: 12px; padding: 0 16px 20px; }
.top-rune-card {
  background: var(--card); border: 1px solid var(--dim); border-radius: 12px;
  padding: 16px; display: flex; align-items: center; gap: 20px;
  transition: transform 0.2s, border-color 0.2s; cursor: pointer;
}
.top-rune-card:active { transform: scale(0.98); border-color: var(--accent); }
.top-rune-glyph { font-size: 42px; color: var(--fg); flex-shrink: 0; width: 45px; text-align: center; }
.top-rune-info { flex: 1; }
.top-rune-name { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.top-rune-desc { font-size: 13px; color: var(--dim2); font-style: italic; line-height: 1.4; }
.top-rune-count { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

.history-item { position: relative; overflow: hidden; background: #441111; border-bottom: 1px solid var(--dim); }
.history-content {
  padding: 20px; background: var(--bg); position: relative; z-index: 2;
  transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1);
}
.delete-reveal-btn {
  position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
  background: #441111; color: #ff8888; border: none;
  font-family: 'Cormorant Garamond', serif; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase; z-index: 1;
}

/* ANIMATIONS */
@keyframes highlight-pulse {
  0% { background: var(--card); }
  50% { background: rgba(201, 169, 110, 0.15); }
  100% { background: var(--card); }
}
.highlighted-rune { animation: highlight-pulse 2s ease-out 2; border-color: var(--accent) !important; }

/* NAVIGATION */
#nav {
  position:fixed; bottom:0; left:0; right:0;
  height:var(--nav-h); z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-pill {
  display:flex; align-items:center;
  background:rgba(21,21,30,0.72);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(201,169,110,0.18);
  border-radius:40px; padding:6px 6px; gap:2px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
}
.nav-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; width:65px; height:54px; border:none; background:none;
  cursor:pointer; border-radius:32px; position:relative;
  transition:background 0.2s;
}
.nav-btn.nav-active { background:rgba(201,169,110,0.14); }
.nav-rune { font-size:20px; color:var(--dim2); transition: color 0.2s, transform 0.2s; }
.nav-btn.nav-active .nav-rune { color:var(--accent); transform:scale(1.1); }
.nav-label { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim2); }
.nav-btn.nav-active .nav-label { color:var(--accent); }

/* DRAW / PICKER UI */
#nav-reading-picker {
  position:fixed; bottom:calc(var(--nav-h) + 10px); left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(21,21,30,0.88); backdrop-filter:blur(24px);
  border:1px solid rgba(201,169,110,0.2); border-radius:20px;
  padding:10px 8px; display:flex; gap:6px; opacity:0; pointer-events:none;
  transition:opacity 0.2s, transform 0.2s; z-index:99;
}
#nav-reading-picker.open { opacity:1; pointer-events:all; transform:translateX(-50%) translateY(0); }
.picker-btn {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:10px 16px; border:none; border-radius:14px; background:rgba(255,255,255,0.04);
}

/* HOME */
.home-hero { display:flex; flex-direction:column; align-items:center; padding:52px 24px 36px; text-align:center; border-bottom:1px solid var(--dim); }
.home-date { font-size:12px; letter-spacing:0.35em; text-transform:uppercase; color:var(--dim2); margin-bottom:36px; }
.rotd-glyph { font-size:96px; line-height:1; color:var(--fg); margin-bottom:16px; }
.rotd-name { font-size:22px; letter-spacing:0.3em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; font-weight:300; }
.rotd-keywords { font-size:15px; color:var(--dim2); font-style:italic; margin-bottom:22px; line-height:1.5; }

/* REELS */
.draw-slots { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:28px; }
.draw-slot-window { width:80px; height:90px; overflow:hidden; position:relative; border:1px solid var(--dim); border-radius:4px; background:var(--card); }
.draw-slot-reel { display:flex; flex-direction:column; align-items:center; }
.reel-item { width:80px; height:90px; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--fg); opacity:0.7; }
.reel-item.center { opacity:1; }

/* GRID & READING */
.rune-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:14px; max-width:460px; margin:0 auto; }
.rune-btn { background:var(--card); border:1px solid var(--dim); border-radius:5px; padding:11px 4px 8px; display:flex; flex-direction:column; align-items:center; gap:5px; }
.rune-btn.selected { border-color:var(--accent); background:#1e1c10; }
.reading-card { border:1px solid var(--dim); background:var(--card); padding:28px 24px; width:100%; margin-top:10px; }
.reading-text { font-size:19px; font-style:italic; font-weight:300; line-height:1.75; color:var(--fg2); text-align:center; }

.stave-entry { display:flex; gap:18px; padding:18px 0; border-bottom:1px solid var(--dim); cursor:pointer; }
.stave-glyph { font-size:38px; color:var(--fg); }
.stave-meaning { font-size:15px; color:var(--fg2); line-height:1.7; display:none; padding-top:10px; }
.stave-meaning.open { display:block; }

#cv { display:none; }
</style>
</head>
<body>

<div class="page" id="page-home">
  <div class="home-hero">
    <div class="home-date" id="home-date"></div>
    <div class="rotd-glyph" id="rotd-glyph"></div>
    <div class="rotd-name" id="rotd-name"></div>
    <div class="rotd-keywords" id="rotd-keywords"></div>
    <button class="rotd-link" onclick="jumpToRune(rotd.n)" style="border:1px solid var(--dim); padding:8px 16px; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;">View Stave →</button>
  </div>
  <div class="section-label">Begin Reading</div>
  <div style="padding:0 16px; display:flex; flex-direction:column; gap:12px;">
    <button class="top-rune-card" onclick="navTo('reading','draw')">
      <div class="top-rune-glyph">ᚠ</div>
      <div class="top-rune-info"><div class="top-rune-name">Draw Staves</div><div class="top-rune-desc">Let the Norns guide your hand</div></div>
    </button>
    <button class="top-rune-card" onclick="navTo('reading','manual')">
      <div class="top-rune-glyph">ᛟ</div>
      <div class="top-rune-info"><div class="top-rune-name">Manual Selection</div><div class="top-rune-desc">Choose with intention</div></div>
    </button>
  </div>
</div>

<div class="page" id="page-reading">
  <div class="page-header"><h1>Reading</h1><div class="sub" id="reading-date"></div></div>
  
  <div id="draw-mode" style="display:flex; flex-direction:column; align-items:center; padding:20px;">
    <div class="draw-slots">
      <div class="draw-slot"><div class="draw-slot-window" id="dw0"><div class="draw-slot-reel" id="dr0"></div></div><div class="section-label" id="dn0" style="padding:10px 0;"></div></div>
      <div class="draw-slot"><div class="draw-slot-window" id="dw1"><div class="draw-slot-reel" id="dr1"></div></div><div class="section-label" id="dn1" style="padding:10px 0;"></div></div>
      <div class="draw-slot"><div class="draw-slot-window" id="dw2"><div class="draw-slot-reel" id="dr2"></div></div><div class="section-label" id="dn2" style="padding:10px 0;"></div></div>
    </div>
    <button id="spin-btn" onclick="spinSlots()" style="width:100%; border:1px solid var(--accent); padding:16px; color:var(--accent); text-transform:uppercase; letter-spacing:0.3em;">Cast the Runes</button>
  </div>

  <div id="manual-mode" style="display:none;">
    <div class="rune-grid" id="grid"></div>
    <button onclick="clearAll()" style="display:block; margin:0 auto; color:var(--dim2); font-size:11px; text-transform:uppercase;">Clear</button>
  </div>

  <div id="reading-wrap" style="display:none; padding:16px;">
    <div class="reading-card"><div class="reading-text" id="reading-text"></div></div>
    <button onclick="generate()" style="width:100%; margin-top:12px; border:1px solid var(--accent); padding:12px; color:var(--accent); font-size:12px; letter-spacing:0.2em;">GENERATE WALLPAPER</button>
  </div>
  <div id="status" class="section-label"></div>
  <div id="result" style="display:none; padding:16px; text-align:center;">
    <img id="out-img" style="width:100%; border:1px solid var(--dim); margin-bottom:10px;">
    <a id="dl-btn" download="reading.jpg" style="color:var(--accent); font-size:12px; border:1px solid var(--accent); padding:8px 20px;">SAVE TO GALLERY</a>
  </div>
</div>

<div class="page" id="page-history">
  <div class="page-header"><h1>Insights</h1><div class="sub">Your Personal Journey</div></div>
  <div id="top-insights" class="insights-container"></div>
  <div class="section-label">Past Readings</div>
  <div id="history-list"></div>
</div>

<div class="page" id="page-library">
  <div class="page-header"><h1>Stave Guide</h1><div class="sub">Elder Futhark</div></div>
  <div id="stave-guide-body" style="padding:0 16px;"></div>
</div>

<div id="nav">
  <div class="nav-pill">
    <button class="nav-btn" onclick="navTo('home')"><span class="nav-rune">ᚹ</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="onNavReading()"><span class="nav-rune">ᚠ</span><span class="nav-label">Read</span></button>
    <button class="nav-btn" onclick="navTo('history')"><span class="nav-rune">ᚻ</span><span class="nav-label">Stats</span></button>
    <button class="nav-btn" onclick="navTo('library')"><span class="nav-rune">ᛉ</span><span class="nav-label">Guide</span></button>
  </div>
</div>

<div id="nav-reading-picker">
  <button class="picker-btn" onclick="navTo('reading','draw')">Draw</button>
  <button class="picker-btn" onclick="navTo('reading','manual')">Select</button>
</div>

<canvas id="cv"></canvas>

<script>
// SOUND ENGINE
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTick() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.05);
}

function playChime() {
  const now = audioCtx.currentTime;
  [440, 880, 1320].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(f, now + (i * 0.1));
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.1, now + (i * 0.1) + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 1);
  });
}

const RUNES = [
  {g:'ᚠ',n:'Fehu',    m:'Wealth, abundance, new beginnings'},
  {g:'ᚢ',n:'Uruz',    m:'Strength, vitality, primal power'},
  {g:'ᚦ',n:'Thurisaz',m:"Force, challenge, Thor's protection"},
  {g:'ᚨ',n:'Ansuz',   m:'Wisdom, communication, divine breath'},
  {g:'ᚱ',n:'Raidho',  m:'Journey, movement, right action'},
  {g:'ᚲ',n:'Kenaz',   m:'Torch, knowledge, creative fire'},
  {g:'ᚷ',n:'Gebo',    m:'Gift, generosity, partnership'},
  {g:'ᚹ',n:'Wunjo',   m:'Joy, harmony, fulfilment'},
  {g:'ᚺ',n:'Hagalaz', m:'Hail, disruption, transformation'},
  {g:'ᚾ',n:'Naudhiz', m:'Need, constraint, endurance'},
  {g:'ᛁ',n:'Isa',     m:'Ice, stillness, patience'},
  {g:'ᛃ',n:'Jera',    m:'Harvest, cycles, reward in time'},
  {g:'ᛇ',n:'Eihwaz',  m:'Yew tree, endurance, continuity'},
  {g:'ᛈ',n:'Perthro', m:'Fate, mystery, hidden things'},
  {g:'ᛉ',n:'Algiz',   m:'Protection, instinct, higher guidance'},
  {g:'ᛊ',n:'Sowilo',  m:'Sun, victory, clarity, vital energy'},
  {g:'ᛏ',n:'Tiwaz',   m:'Justice, courage, sacrifice'},
  {g:'ᛒ',n:'Berkano', m:'Birch, growth, nurturing, new life'},
  {g:'ᛖ',n:'Ehwaz',   m:'Horse, partnership, trust, progress'},
  {g:'ᛗ',n:'Mannaz',  m:'Humanity, self, community'},
  {g:'ᛚ',n:'Laguz',   m:'Water, flow, intuition, the deep'},
  {g:'ᛜ',n:'Ingwaz',  m:'Fertility, potential, inner work'},
  {g:'ᛞ',n:'Dagaz',   m:'Dawn, breakthrough, transformation'},
  {g:'ᛟ',n:'Othala',  m:'Heritage, home, what you protect'},
  {g:'○',n:'Blank',   m:'The unknowable, pure potential, fate'},
];

const PHRASES = {
  Fehu:[['What you have built is the ground beneath your feet.'],['Wealth of spirit is within reach today.'],['Generosity given freely will find its way back.']],
  Uruz:[['Raw strength has forged who you are.'],['Today asks for vigour.'],['A deep resilience is growing.']],
  Thurisaz:[['A past trial has sharpened your edge.'],['Something is pushing back; be clear.'],['The thorns ahead guard something worth reaching.']],
  Ansuz:[['A truth spoken has set things in motion.'],['Listen as much as you speak today.'],['Understanding is coming; give it space.']],
  Raidho:[['Movement made has brought you to this place.'],['The path is yours to set today.'],['The road ahead opens when you walk it.']],
  Kenaz:[['A spark of knowing guides you still.'],['Creative fire is available.'],['Light is coming—an insight, a way through.']],
  Gebo:[['Something freely given continues to return.'],['Give and receive in equal measure today.'],['Balance will find its right form.']],
  Wunjo:[['Fulfilment was found before.'],['Joy is not far; look for small harmonies.'],['What you worked for will settle into good.']],
  Hagalaz:[['A disruption cleared necessary ground.'],['Something is shifting—let it.'],['What follows will be more honest.']],
  Naudhiz:[['Constraint taught you what is necessary.'],['Work with what you have.'],['Endurance is being asked of you.']],
  Isa:[['A period of waiting did its work.'],['This is a day for stillness.'],['Stillness ahead is preparation.']],
  Jera:[['Effort has been quietly accumulating.'],['Cycles cannot be hurried.'],['The harvest is closer than it seems.']],
  Eihwaz:[['You have survived deep endurance.'],['Stand firm; the pressure is not permanent.'],['You have more staying power than you think.']],
  Perthro:[['Something hidden was at work.'],['Trust the unseen process.'],['Fate is doing work you cannot yet see.']],
  Algiz:[['Something held you safe.'],['Trust your instincts today.'],['Protection is available in what lies ahead.']],
  Sowilo:[['The energy you brought is not forgotten.'],['Move with the vital energy today.'],['Clarity is coming, cutting through confusion.']],
  Tiwaz:[['A past act of integrity continues to matter.'],['Act with honour today.'],['What you do with integrity now will stand.']],
  Berkano:[['Something tender has taken root.'],['Tend what is new and vulnerable.'],['A beginning is ahead—small but real.']],
  Ehwaz:[['Trust placed in another has made this possible.'],['Work in tandem today.'],['The road ahead is smoother when shared.']],
  Mannaz:[['Community has been your ground.'],['Reflect honestly on yourself today.'],['Self-knowledge is the work of this moment.']],
  Laguz:[['A current you trusted has guided you.'],['Follow feeling over logic today.'],['Something is flowing toward you—let it.']],
  Ingwaz:[['Quiet inner work has prepared you.'],['Do not rush what gestates inside.'],['What you have incubated is close to form.']],
  Dagaz:[['A breakthrough changed the light you see by.'],['Today stands at a turning point.'],['What felt stuck is about to shift.']],
  Othala:[['Your past gave you something worth holding.'],['Return to what truly belongs to you.'],['Home is being established.']],
  Blank:[['The unknowable has been at work.'],['Not everything can be mapped.'],['The future belongs to possibility.']]
};

let selected = [];
let rotd = RUNES[Math.floor(Math.random() * 24)];

function navTo(page, mode) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'shown'));
  const target = document.getElementById('page-' + page);
  target.classList.add('active');
  setTimeout(() => target.classList.add('shown'), 50);
  if(page === 'library') buildStaveGuide();
  if(page === 'history') { renderHistory(); updateStats(); }
  if(page === 'reading' && mode) switchMode(mode);
}

function onNavReading() {
  const p = document.getElementById('nav-reading-picker');
  p.classList.toggle('open');
}

function switchMode(mode) {
  document.getElementById('nav-reading-picker').classList.remove('open');
  document.getElementById('draw-mode').style.display = mode === 'draw' ? 'flex' : 'none';
  document.getElementById('manual-mode').style.display = mode === 'manual' ? 'block' : 'none';
  if(mode === 'draw') initDrawSlots();
}

function initDrawSlots(){
  for(let i=0; i<3; i++){
    document.getElementById('dr'+i).innerHTML = '<div class="reel-item center">—</div>';
    document.getElementById('dn'+i).textContent = "";
  }
}

function spinSlots(){
  const picks = [...RUNES].sort(() => 0.5 - Math.random()).slice(0, 3);
  selected = picks;
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;

  for(let i=0; i<3; i++){
    const reel = document.getElementById('dr'+i);
    reel.innerHTML = "";
    for(let j=0; j<20; j++) {
      const div = document.createElement('div');
      div.className = 'reel-item';
      div.textContent = RUNES[Math.floor(Math.random()*25)].g;
      reel.appendChild(div);
    }
    const end = document.createElement('div');
    end.className = 'reel-item center';
    end.textContent = picks[i].g;
    reel.appendChild(end);
    
    reel.style.transition = `transform ${1.5 + i}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
    reel.style.transform = `translateY(-${20 * 90}px)`;

    // Sound Ticks during spin
    const interval = setInterval(playTick, 100);
    setTimeout(() => {
        clearInterval(interval);
        document.getElementById('dn'+i).textContent = picks[i].n;
        if(i === 2) { 
            btn.disabled = false; 
            showReading(); 
            playChime();
        }
    }, (1.5 + i) * 1000);
  }
}

function showReading(){
  const summary = `${PHRASES[selected[0].n][0]} ${PHRASES[selected[1].n][1]} ${PHRASES[selected[2].n][2]}`;
  document.getElementById('reading-text').textContent = summary;
  document.getElementById('reading-wrap').style.display = 'block';
  saveReading(selected, summary);
}

function saveReading(runes, text) {
  let history = JSON.parse(localStorage.getItem('rune_history') || '[]');
  history.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}),
    runes: runes.map(r => ({g: r.g, n: r.n})),
    text: text
  });
  localStorage.setItem('rune_history', JSON.stringify(history.slice(0, 50)));
}

function updateStats() {
  const history = JSON.parse(localStorage.getItem('rune_history') || '[]');
  const counts = {};
  history.forEach(h => h.runes.forEach(r => counts[r.n] = (counts[r.n] || 0) + 1));
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 3);
  
  const container = document.getElementById('top-insights');
  container.innerHTML = sorted.length ? '<div class="section-label">Most Frequent Guides</div>' : "";
  
  sorted.forEach(([name, count]) => {
    const r = RUNES.find(x => x.n === name);
    const div = document.createElement('div');
    div.className = 'top-rune-card';
    div.onclick = () => jumpToRune(name);
    div.innerHTML = `<div class="top-rune-glyph">${r.g}</div><div class="top-rune-info"><div class="top-rune-name">${r.n}</div><div class="top-rune-desc">${r.m}</div><div class="top-rune-count">Drawn ${count} times</div></div>`;
    container.appendChild(div);
  });
}

function jumpToRune(name) {
  navTo('library');
  setTimeout(() => {
    const target = document.getElementById('row-' + name);
    if(target) {
      target.scrollIntoView({behavior:'smooth', block:'center'});
      target.classList.add('highlighted-rune');
      setTimeout(() => target.classList.remove('highlighted-rune'), 4000);
      const lore = document.getElementById('lore-' + name);
      if(!lore.classList.contains('open')) toggleLore(name);
    }
  }, 400);
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const history = JSON.parse(localStorage.getItem('rune_history') || '[]');
  list.innerHTML = history.length ? "" : '<div class="status">No history yet.</div>';

  history.forEach(item => {
    const container = document.createElement('div');
    container.className = 'history-item';
    container.innerHTML = `
      <button class="delete-reveal-btn" onclick="deleteHistory(${item.id})">Delete</button>
      <div class="history-content">
        <div class="home-date" style="margin-bottom:8px; font-size:10px;">${item.date}</div>
        <div class="top-rune-name" style="font-size:12px; margin-bottom:10px;">
          ${item.runes.map(r => `<span onclick="event.stopPropagation(); jumpToRune('${r.n}')">${r.g}</span>`).join(' · ')}
        </div>
        <div class="top-rune-desc" style="color:var(--fg2);">${item.text}</div>
      </div>
    `;

    let startX;
    const content = container.querySelector('.history-content');
    container.addEventListener('touchstart', e => { startX = e.touches[0].clientX; content.style.transition = 'none'; }, {passive:true});
    container.addEventListener('touchmove', e => {
      let diff = startX - e.touches[0].clientX;
      if(diff > 0) content.style.transform = `translateX(-${Math.min(diff, 85)}px)`;
    }, {passive:true});
    container.addEventListener('touchend', e => {
      content.style.transition = 'transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1)';
      if(startX - e.changedTouches[0].clientX > 45) content.style.transform = 'translateX(-80px)';
      else content.style.transform = 'translateX(0)';
    });
    list.appendChild(container);
  });
}

function deleteHistory(id) {
  let history = JSON.parse(localStorage.getItem('rune_history') || '[]');
  history = history.filter(x => x.id !== id);
  localStorage.setItem('rune_history', JSON.stringify(history));
  renderHistory(); updateStats();
}

function buildStaveGuide() {
  const b = document.getElementById('stave-guide-body');
  if(b.innerHTML !== "") return;
  RUNES.forEach(r => {
    const div = document.createElement('div');
    div.className = 'stave-entry'; div.id = 'row-' + r.n;
    div.innerHTML = `<div class="stave-glyph">${r.g}</div><div style="flex:1"><div class="top-rune-name">${r.n}</div><div class="top-rune-desc">${r.m}</div><div class="stave-meaning" id="lore-${r.n}">The deeper wisdom of ${r.n} centers on ${r.m.toLowerCase()}. It invites you to consider how this energy manifests in your current path.</div></div>`;
    div.onclick = () => toggleLore(r.n);
    b.appendChild(div);
  });
}

function toggleLore(name) {
  document.getElementById('lore-'+name).classList.toggle('open');
}

// Wallpaper Gen
async function generate() {
  const status = document.getElementById('status');
  status.textContent = "Etching your wallpaper...";
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  cv.width = 1170; cv.height = 2532; // Mobile res
  ctx.fillStyle = '#0d0d12'; ctx.fillRect(0,0,1170,2532);
  ctx.fillStyle = '#c9a96e'; ctx.font = '100px serif'; ctx.textAlign = 'center';
  ctx.fillText(selected.map(r=>r.g).join('  '), 585, 1100);
  ctx.fillStyle = '#8a8070'; ctx.font = 'italic 40px serif';
  const words = document.getElementById('reading-text').textContent.split(' ');
  let line = '', y = 1300;
  words.forEach(w => {
    if(ctx.measureText(line + w).width > 900) { ctx.fillText(line, 585, y); line = w + ' '; y += 60; }
    else line += w + ' ';
  });
  ctx.fillText(line, 585, y);
  document.getElementById('out-img').src = cv.toDataURL();
  document.getElementById('result').style.display = 'block';
  status.textContent = "";
}

document.getElementById('rotd-glyph').textContent = rotd.g;
document.getElementById('rotd-name').textContent = rotd.n;
document.getElementById('rotd-keywords').textContent = rotd.m;
document.getElementById('home-date').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
navTo('home');
</script>
