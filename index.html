<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #3a3830; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --nav-h: 80px; --delete: #441111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 120px; opacity: 0; transition: opacity 0.3s; }
        .page.active { display: flex; }
        .page.shown { opacity: 1; }

        /* Notification Toast */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; width: 80%; pointer-events: none; }
        .toast { background: var(--accent); color: var(--bg); padding: 12px 20px; border-radius: 40px; text-align: center; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; opacity: 0; transition: 0.4s; }

        /* Nav & Notification Dots */
        #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); display: flex; justify-content: center; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(21, 21, 30, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.2); border-radius: 40px; display: flex; padding: 5px; position: relative; }
        .nav-btn { width: 60px; height: 52px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .nav-btn.active { color: var(--accent); }
        .dot { position: absolute; top: 8px; right: 15px; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: none; }
        .nav-btn .txt { font-size: 7px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

        /* Bindrune Forge - Advanced */
        .forge-canvas { width: 280px; height: 280px; background: var(--card); margin: 20px auto; border: 1px solid var(--dim); border-radius: 12px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .forge-rune { position: absolute; font-size: 140px; color: var(--accent); opacity: 0.7; mix-blend-mode: plus-lighter; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        
        /* Stats Collapsible Modules */
        .module { margin: 0 16px 12px; border: 1px solid var(--dim); border-radius: 12px; background: var(--card); overflow: hidden; }
        .module-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .module-header h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent); }
        .module-content { max-height: 0; transition: max-height 0.5s ease-out; overflow: hidden; }
        .module.open .module-content { max-height: 1000px; padding: 0 16px 16px; }

        .achieve-item { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; opacity: 0.3; }
        .achieve-item.unlocked { opacity: 1; border-left: 2px solid var(--accent); }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .action-btn { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 18px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; margin: 20px; cursor: pointer; }
        .forge-btn { background: var(--card); border: 1px solid var(--dim); padding: 8px; font-size: 18px; border-radius: 4px; color: var(--fg2); width: 45px; }
        .forge-btn.active { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="page" id="page-home">
    <div style="text-align: center; padding: 80px 24px 40px;">
        <h1 id="home-date" style="font-size: 10px; letter-spacing: 0.5em; color: var(--dim2); margin-bottom: 40px;"></h1>
        <div id="rotd-g" style="font-size: 100px; margin-bottom: 10px; color: var(--accent);"></div>
        <div id="rotd-n" style="font-size: 16px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4em;"></div>
        <div id="rotd-m" style="font-style: italic; color: var(--dim2); margin-top: 10px;"></div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 20px; text-align: center;">
        <div id="read-toggle" style="display:flex; justify-content:center; gap:30px; margin-bottom:40px;">
            <span onclick="switchReadMode('draw')" id="tab-draw" style="font-size:11px; letter-spacing:2px; color:var(--accent)">DRAW</span>
            <span onclick="switchReadMode('manual')" id="tab-manual" style="font-size:11px; letter-spacing:2px; color:var(--dim2)">MANUAL</span>
        </div>
        <div id="area-draw">
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:30px;">
                <div class="slot"><div class="reel" id="r0"></div></div>
                <div class="slot"><div class="reel" id="r1"></div></div>
                <div class="slot"><div class="reel" id="r2"></div></div>
            </div>
            <button class="action-btn" onclick="startCast()">Cast Runes</button>
        </div>
        <div id="area-manual" style="display:none;">
            <div id="manual-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px;"></div>
            <button class="action-btn" id="manual-submit" onclick="submitManual()" style="opacity:0.3; pointer-events:none;">Select 3</button>
        </div>
        <div id="reading-reveal" style="display:none;">
            <div id="reveal-visuals" style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;"></div>
            <div id="read-text" style="font-size:18px; font-style:italic; line-height:1.6; color:var(--fg2);"></div>
            <button class="action-btn" onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div class="forge-canvas" id="forge-canvas"></div>
    <div id="forge-pickers" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; padding:0 20px;"></div>
    <button class="action-btn" onclick="finalizeBindrune()">Save to Talisman Library</button>
    <div class="module">
        <div class="module-header" onclick="toggleModule(this)">
            <h3>Talisman Library</h3>
            <span style="font-size:10px;">▼</span>
        </div>
        <div class="module-content" id="forge-library"></div>
    </div>
</div>

<div class="page" id="page-history">
    <div class="module open">
        <div class="module-header" onclick="toggleModule(this)">
            <h3>Achievements</h3>
            <span style="font-size:10px;">▼</span>
        </div>
        <div class="module-content" id="achieve-list"></div>
    </div>
    <div class="module">
        <div class="module-header" onclick="toggleModule(this)">
            <h3>Stave Statistics</h3>
            <span style="font-size:10px;">▼</span>
        </div>
        <div class="module-content" id="stat-counts"></div>
    </div>
</div>

<div class="page" id="page-library"><div id="lib-list"></div></div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')">
            <div class="dot" id="achieve-dot"></div>
            <span class="txt">Stats</span>
        </button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth',l:'Creative fire and abundance.', type:'vertical'},
        {g:'ᚢ',n:'Uruz',m:'Strength',l:'Primal power of the ox.', type:'vertical'},
        {g:'ᚦ',n:'Thurisaz',m:'Force',l:'The thorn of protection.', type:'point'},
        {g:'ᚨ',n:'Ansuz',m:'Wisdom',l:'Divine communication.', type:'angle'},
        {g:'ᚱ',n:'Raidho',m:'Journey',l:'The wheel of travel.', type:'angle'},
        {g:'ᚲ',n:'Kenaz',m:'Torch',l:'Controlled fire of knowledge.', type:'angle'},
        {g:'ᚷ',n:'Gebo',m:'Gift',l:'Balance in exchange.', type:'cross'},
        {g:'ᚹ',n:'Wunjo',m:'Joy',l:'Harmony and fulfillment.', type:'point'},
        {g:'ᚺ',n:'Hagalaz',m:'Hail',l:'Necessary disruption.', type:'cross'},
        {g:'ᚾ',n:'Naudhiz',m:'Need',l:'Innovation through friction.', type:'cross'},
        {g:'ᛁ',n:'Isa',m:'Ice',l:'Stillness and clarity.', type:'vertical'},
        {g:'ᛃ',n:'Jera',m:'Harvest',l:'Cycles of reward.', type:'angle'},
        {g:'ᛇ',n:'Eihwaz',m:'Yew',l:'Endurance and continuity.', type:'vertical'},
        {g:'ᛈ',n:'Perthro',m:'Fate',l:'Laws of probability.', type:'angle'},
        {g:'ᛉ',n:'Algiz',m:'Protection',l:'Spiritual guidance.', type:'vertical'},
        {g:'ᛊ',n:'Sowilo',m:'Sun',l:'Vitality and victory.', type:'angle'},
        {g:'ᛏ',n:'Tiwaz',m:'Justice',l:'Sacrifice for the right.', type:'vertical'},
        {g:'ᛒ',n:'Berkano',m:'Growth',l:'Nurturing rebirth.', type:'vertical'},
        {g:'ᛖ',n:'Ehwaz',m:'Trust',l:'Progress through partnership.', type:'vertical'},
        {g:'ᛗ',n:'Mannaz',m:'Self',l:'Identity in community.', type:'vertical'},
        {g:'ᛚ',n:'Laguz',m:'Flow',l:'Intuition and water.', type:'vertical'},
        {g:'ᛜ',n:'Ingwaz',m:'Potential',l:'Rest before release.', type:'cross'},
        {g:'ᛞ',n:'Dagaz',m:'Dawn',l:'Breakthrough awakening.', type:'cross'},
        {g:'ᛟ',n:'Othala',m:'Heritage',l:'Ancestral home.', type:'angle'},
        {g:'O',n:'Wyrd',m:'Unknown',l:'Fate yet to be written.', type:'circle'}
    ];

    let forgeLayers = [];
    let statsCount = JSON.parse(localStorage.getItem('rune_stats') || '{}');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'shown'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const target = document.getElementById('page-' + id);
        target.classList.add('active');
        document.querySelector(`.nav-btn[data-id="${id}"]`).classList.add('active');
        setTimeout(() => target.classList.add('shown'), 50);

        if(id === 'history') {
            renderStats();
            document.getElementById('achieve-dot').style.display = 'none';
            incrementAchieve('StatTrack');
        }
        if(id === 'forge') initForge();
        if(id === 'library') buildLibrary();
    }

    function toggleModule(el) { el.parentElement.classList.toggle('open'); }

    function showToast(msg) {
        const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.style.opacity = '1', 50);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
    }

    /* Smart Forge Logic */
    function initForge() {
        const p = document.getElementById('forge-pickers'); if(p.children.length > 0) return;
        RUNES.forEach(r => {
            const b = document.createElement('button'); b.className = 'forge-btn'; b.textContent = r.g;
            b.onclick = () => {
                if(forgeLayers.includes(r)) { forgeLayers = forgeLayers.filter(x => x!==r); b.classList.remove('active'); }
                else if(forgeLayers.length < 3) { forgeLayers.push(r); b.classList.add('active'); }
                updateForge();
            };
            p.appendChild(b);
        });
        renderForgeLibrary();
    }

    function updateForge() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeLayers.forEach((r, i) => {
            const el = document.createElement('div'); el.className = 'forge-rune'; el.textContent = r.g;
            // Smart Stacking Logic: Align verticals on top of each other, offset angles
            if(r.type === 'vertical') el.style.transform = `scale(1.2)`;
            if(r.type === 'cross') el.style.transform = `scale(0.8) translateY(5px)`;
            if(r.type === 'angle') el.style.transform = `translate(${i*5}px, ${i*-5}px) rotate(${i*5}deg)`;
            cv.appendChild(el);
        });
    }

    function finalizeBindrune() {
        if(forgeLayers.length < 2) return;
        let lib = JSON.parse(localStorage.getItem('forge_lib') || '[]');
        const spell = forgeLayers.map(r => r.m).join(' and ') + ' bound for intent.';
        lib.unshift({ glyphs: forgeLayers.map(r => r.g).join(''), spell });
        localStorage.setItem('forge_lib', JSON.stringify(lib.slice(0, 10)));
        showToast("Talisman Bound");
        incrementAchieve('Blacksmith');
        renderForgeLibrary();
    }

    function renderForgeLibrary() {
        const lib = JSON.parse(localStorage.getItem('forge_lib') || '[]');
        const cont = document.getElementById('forge-library'); cont.innerHTML = '';
        lib.forEach(item => {
            const d = document.createElement('div'); d.style.padding = '12px 0'; d.style.borderBottom = '1px solid var(--dim)';
            d.innerHTML = `<div style="font-size:24px; color:var(--accent); letter-spacing:-8px;">${item.glyphs}</div><div style="font-size:13px; font-style:italic; color:var(--fg2);">${item.spell}</div>`;
            cont.appendChild(d);
        });
    }

    /* Stats & Achievements */
    function incrementAchieve(id) {
        let u = JSON.parse(localStorage.getItem('achieve_unlocked') || '[]');
        let tracker = JSON.parse(localStorage.getItem('achieve_track') || '{}');
        tracker[id] = (tracker[id] || 0) + 1;
        localStorage.setItem('achieve_track', JSON.stringify(tracker));

        let shouldUnlock = false;
        if(id === 'StatTrack' && tracker[id] >= 5) shouldUnlock = true;
        if(id === 'Blacksmith' || id === 'FirstDraw') shouldUnlock = true;

        if(shouldUnlock && !u.includes(id)) {
            u.push(id); localStorage.setItem('achieve_unlocked', JSON.stringify(u));
            showToast("New Achievement Unlocked");
            document.getElementById('achieve-dot').style.display = 'block';
        }
    }

    function renderStats() {
        const u = JSON.parse(localStorage.getItem('achieve_unlocked') || '[]');
        const aList = document.getElementById('achieve-list'); aList.innerHTML = '';
        const achievements = [
            {id:'FirstDraw', n:'The Seeker', d:'Cast your first oracle.'},
            {id:'StatTrack', n:'The Observer', d:'Studied your patterns 5 times.'},
            {id:'Blacksmith', n:'Forge-Master', d:'Crafted a bindrune talisman.'}
        ];
        achievements.forEach(a => {
            const isU = u.includes(a.id);
            const div = document.createElement('div'); div.className = `achieve-item ${isU ? 'unlocked' : ''}`;
            div.innerHTML = `<div><div style="font-size:14px; color:var(--accent)">${a.n}</div><div style="font-size:10px; color:var(--dim2)">${a.d}</div></div>`;
            aList.appendChild(div);
        });

        const sList = document.getElementById('stat-counts'); sList.innerHTML = '';
        const sorted = Object.entries(statsCount).sort((a,b) => b[1]-a[1]);
        RUNES.forEach(r => {
            const row = document.createElement('div'); row.className = 'stat-row';
            row.innerHTML = `<span>${r.g} ${r.n}</span><span style="color:var(--accent)">${statsCount[r.n] || 0}</span>`;
            sList.appendChild(row);
        });
    }

    /* Reading Engine */
    function startCast() {
        const picks = [];
        for(let i=0; i<3; i++) {
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            statsCount[win.n] = (statsCount[win.n] || 0) + 1;
        }
        localStorage.setItem('rune_stats', JSON.stringify(statsCount));
        finishReading(picks);
    }

    function finishReading(runes) {
        document.getElementById('area-draw').style.display = 'none';
        const v = document.getElementById('reveal-visuals'); v.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '40px'; d.textContent = r.g; v.appendChild(d);
        });
        document.getElementById('read-text').textContent = `${runes[0].m}, through ${runes[1].m.toLowerCase()}, leads to ${runes[2].m.toLowerCase()}.`;
        document.getElementById('reading-reveal').style.display = 'block';
        incrementAchieve('FirstDraw');
    }

    function buildLibrary() {
        const cont = document.getElementById('lib-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-entry';
            div.innerHTML = `<div style="display:flex; align-items:center; gap:20px;"><div style="font-size:36px; color:var(--accent)">${r.g}</div><div><div style="text-transform:uppercase; font-size:13px;">${r.n}</div><div style="font-size:11px; color:var(--dim2);">${r.m}</div></div></div><div class="lore-box" id="lore-${r.n}">${r.l}</div>`;
            div.onclick = () => document.getElementById('lore-'+r.n).classList.toggle('open');
            cont.appendChild(div);
        });
    }

    const rotd = RUNES[Math.floor(Math.random()*24)];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    document.getElementById('home-date').textContent = new Date().toLocaleDateString('en-GB', {weekday: 'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
