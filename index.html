<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bindrune Forge & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --gold-light: #fefaf0; --gold-dark: #7a5e2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg); color: var(--fg);
            font-family: 'Cormorant Garamond', serif;
            overscroll-behavior: none; overflow-x: hidden;
        }

        /* --- Navigation --- */
        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(26,26,36,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .nav-btn { width: 65px; height: 55px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; }

        .page { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 140px; }
        .page.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Home/Hero --- */
        .home-hero { text-align: center; padding: 60px 24px 40px; }
        .date-display { font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 50px; opacity: 0.7; }
        .rotd-glyph { font-size: 110px; margin-bottom: 15px; text-shadow: 0 0 30px rgba(201,169,110,0.2); }
        .rotd-name { font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 8px; }

        .action-card { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin: 0 20px 15px; padding: 30px 25px; cursor: pointer; }
        .action-title { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
        .action-sub { font-size: 11px; color: var(--dim2); font-style: italic; }

        /* --- Oracle Roulette Draw --- */
        .reel-container { display: flex; justify-content: center; gap: 12px; margin: 40px 0; height: 130px; }
        .slot { width: 90px; height: 130px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; position: relative; }
        .reel { position: absolute; top: 0; left: 0; width: 100%; transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .reel-unit { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; }

        /* --- Forge Engine Styling --- */
        .forge-main-container { position: relative; width: 320px; height: 320px; margin: 20px auto; border-radius: 50%; overflow: hidden; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); border: 1px solid rgba(201,169,110,0.2); }
        #forge-canvas-el { width: 100%; height: 100%; display: block; filter: drop-shadow(0 0 10px rgba(201,169,110,0.1)); }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .rune-btn { background: var(--dim); border: 1px solid transparent; border-radius: 10px; padding: 15px 5px; text-align: center; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .rune-btn.active { border-color: var(--accent); background: rgba(201,169,110,0.1); }

        /* --- Guide/Descriptions --- */
        .guide-item { border-bottom: 1px solid var(--dim); padding: 25px 20px; }
        .guide-header { display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .guide-content { max-height: 0; overflow: hidden; transition: 0.4s ease; color: var(--fg2); font-size: 15px; }
        .guide-item.open .guide-content { max-height: 400px; margin-top: 15px; }

        .btn-gold { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 20px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; margin: 20px; cursor: pointer; border-radius: 4px; }
        .btn-gold:disabled { opacity: 0.3; cursor: default; }

        .history-card { background: var(--dim); border-radius: 15px; padding: 20px; margin: 0 20px 15px; }
    </style>
</head>
<body>

<div id="page-home" class="page active">
    <div class="home-hero">
        <div class="date-display" id="date-now"></div>
        <div class="rotd-glyph" id="rotd-g"></div>
        <div class="rotd-name" id="rotd-n"></div>
        <div id="rotd-m" style="font-style:italic; opacity:0.6;"></div>
    </div>
    <div class="action-card" onclick="navTo('read')">
        <div class="action-title">Cast the Oracle</div>
        <div class="action-sub">Draw three staves from the well of Wyrd</div>
    </div>
    <div class="action-card" onclick="navTo('forge')">
        <div class="action-title">Forge Bindrune</div>
        <div class="action-sub">Combine runes into a shared-stave talisman</div>
    </div>
</div>

<div id="page-read" class="page">
    <div style="padding: 60px 20px; text-align:center;">
        <h2 class="date-display">The Oracle</h2>
        <div class="reel-container" id="reel-wrap"></div>
        <div id="read-result" style="display:none; margin-bottom:30px;">
            <div id="read-text" style="font-size:18px; line-height:1.6; font-style:italic; color:var(--fg2);"></div>
        </div>
        <button class="btn-gold" id="cast-btn" onclick="startCast()">Cast the Runes</button>
    </div>
</div>

<div id="page-forge" class="page">
    <div style="padding: 60px 20px; text-align:center;">
        <h2 class="date-display">Bindrune Forge</h2>
        <div class="forge-main-container">
            <canvas id="forge-canvas-el" width="600" height="600"></canvas>
        </div>
        <button class="btn-gold" style="margin:10px 20px; padding:12px;" onclick="recastForge()">✧ Rethrow the Bones</button>
        <div class="grid" id="forge-grid"></div>
        <button class="btn-gold" id="bind-btn" onclick="saveTalisman()" disabled>Bind to Library</button>
        <div id="talisman-library" style="padding:20px; text-align:left;"></div>
    </div>
</div>

<div id="page-history" class="page">
    <div style="padding: 60px 0;">
        <h2 class="date-display" style="text-align:center;">History & Stats</h2>
        <div id="history-list"></div>
    </div>
</div>

<div id="page-guide" class="page">
    <div id="guide-list" style="padding: 60px 0;"></div>
</div>

<nav id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" onclick="navTo('read')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" onclick="navTo('guide')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</nav>

<script>
const RUNES = [
    {g:'ᚠ',n:'Fehu',m:'Wealth',d:'Mobile property, creative fire, and the power of circulation.'},
    {g:'ᚢ',n:'Uruz',m:'Vitality',d:'The primal ox. Physical strength, health, and raw persistence.'},
    {g:'ᚦ',n:'Thurisaz',m:'Force',d:'The thorn or giant. Reactive power, defense, and conflict.'},
    {g:'ᚨ',n:'Ansuz',m:'Insight',l:'Breath of the divine. Communication, wisdom, and the mind.'},
    {g:'ᚱ',n:'Raidho',m:'Direction',d:'The wagon. Journeys, rhythm, and the law of the right path.'},
    {g:'ᚲ',n:'Kenaz',m:'Clarity',d:'The torch. Technical knowledge, controlled fire, and revelation.'},
    {g:'ᚷ',n:'Gebo',m:'Exchange',d:'The gift. Partnerships, balance, and the sacred trade.'},
    {g:'ᚹ',n:'Wunjo',m:'Harmony',d:'The flag. Joy, perfect alignment, and the absence of friction.'},
    {g:'ᚺ',n:'Hagalaz',m:'Evolution',d:'The hail. Sudden disruption, crisis, and necessary change.'},
    {g:'ᚾ',n:'Naudhiz',m:'Resilience',d:'The need. Innovation born from restriction and friction.'},
    {g:'ᛁ',n:'Isa',m:'Stillness',d:'The ice. Concentration, stasis, and internal focus.'},
    {g:'ᛃ',n:'Jera',m:'Cycles',d:'The year. Harvest, natural growth, and the rewards of time.'},
    {g:'ᛇ',n:'Eihwaz',m:'Endurance',d:'The yew tree. Continuity, death and rebirth, and protection.'},
    {g:'ᛈ',n:'Perthro',m:'Destiny',d:'The dice cup. Hidden laws, probability, and secrets.'},
    {g:'ᛉ',n:'Algiz',m:'Guard',d:'The elk. Instinctive protection and spiritual defense.'},
    {g:'ᛊ',n:'Sowilo',m:'Success',d:'The sun. Victory, burning energy, and total clarity.'},
    {g:'ᛏ',n:'Tiwaz',m:'Honor',d:'The spear. Justice, sacrifice for the group, and victory through law.'},
    {g:'ᛒ',n:'Berkano',m:'Growth',d:'The birch. Nurturing, birth, and the blossoming of ideas.'},
    {g:'ᛖ',n:'Ehwaz',m:'Synergy',d:'The horse. Progress through trust, partnership, and movement.'},
    {g:'ᛗ',n:'Mannaz',m:'Identity',d:'The human. Social ties, consciousness, and self-realization.'},
    {g:'ᛚ',n:'Laguz',m:'Intuition',d:'The water. The flow of life, emotions, and the subconscious.'},
    {g:'ᛜ',n:'Ingwaz',m:'Potential',d:'The seed. Gestation of power before breakthrough.'},
    {g:'ᛞ',n:'Dagaz',m:'Awakening',d:'The day. Radical shift, enlightenment, and the dawn.'},
    {g:'ᛟ',n:'Othala',m:'Legacy',d:'The ancestral home. Foundations, inheritance, and fixed property.'},
    {g:' ',n:'Wyrd',m:'The Unknown',d:'The blank rune. Destiny unwritten, the void, and the absolute.'}
];

let forgeSet = [], forgeMirrors = [];
let historyData = JSON.parse(localStorage.getItem('rune_history') || '[]');
let talismans = JSON.parse(localStorage.getItem('talisman_lib') || '[]');

window.onload = () => {
    const d = new Date();
    document.getElementById('date-now').innerText = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    const rotd = RUNES[d.getDate() % RUNES.length];
    document.getElementById('rotd-g').innerText = rotd.g;
    document.getElementById('rotd-n').innerText = rotd.n;
    document.getElementById('rotd-m').innerText = rotd.m;
    initGrids();
    initRoulette();
};

function navTo(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.innerText.toLowerCase().includes(id));
    if(btn) btn.classList.add('active');
    if(id === 'history') renderHistory();
}

function initGrids() {
    const fg = document.getElementById('forge-grid');
    const gl = document.getElementById('guide-list');
    RUNES.forEach(r => {
        // Forge Grid
        const b = document.createElement('div'); b.className = 'rune-btn'; b.innerText = r.g;
        b.onclick = () => {
            if(forgeSet.find(x=>x.n===r.n)) { forgeSet = forgeSet.filter(x=>x.n!==r.n); b.classList.remove('active'); }
            else if(forgeSet.length < 4) { forgeSet.push(r); b.classList.add('active'); }
            document.getElementById('bind-btn').disabled = forgeSet.length < 2;
            recastForge();
        };
        fg.appendChild(b);
        // Guide List
        const gi = document.createElement('div'); gi.className = 'guide-item';
        gi.innerHTML = `<div class="guide-header" onclick="this.parentElement.classList.toggle('open')">
            <span style="font-size:30px; color:var(--accent);">${r.g}</span>
            <div><b style="text-transform:uppercase;">${r.n}</b><br><small>${r.m}</small></div>
        </div><div class="guide-content">${r.d}</div>`;
        gl.appendChild(gi);
    });
}

// --- Oracle Logic ---
function initRoulette() {
    const wrap = document.getElementById('reel-wrap'); wrap.innerHTML = '';
    for(let i=0; i<3; i++) {
        const slot = document.createElement('div'); slot.className = 'slot';
        const reel = document.createElement('div'); reel.className = 'reel'; reel.id = 'reel-'+i;
        for(let j=0; j<40; j++) {
            const u = document.createElement('div'); u.className = 'reel-unit';
            u.innerText = RUNES[Math.floor(Math.random()*RUNES.length)].g;
            reel.appendChild(u);
        }
        slot.appendChild(reel); wrap.appendChild(slot);
    }
}

function startCast() {
    document.getElementById('cast-btn').disabled = true;
    document.getElementById('read-result').style.display = 'none';
    const picks = [];
    for(let i=0; i<3; i++) {
        const r = RUNES[Math.floor(Math.random()*RUNES.length)]; picks.push(r);
        const el = document.getElementById('reel-'+i);
        el.lastChild.innerText = r.g;
        el.style.transform = `translateY(-${39 * 130}px)`;
    }
    setTimeout(() => {
        const txt = `The staves of ${picks[0].n}, ${picks[1].n}, and ${picks[2].n} have fallen. ${picks[0].m} guides your current path, ${picks[1].m} represents the challenge, and ${picks[2].m} is the potential outcome.`;
        document.getElementById('read-text').innerText = txt;
        document.getElementById('read-result').style.display = 'block';
        document.getElementById('cast-btn').disabled = false;
        historyData.unshift({ date: new Date().toLocaleDateString(), text: txt, glyphs: picks.map(p=>p.g).join(' ') });
        localStorage.setItem('rune_history', JSON.stringify(historyData.slice(0, 20)));
    }, 3800);
}

// --- Forge Engine ---
function recastForge() {
    forgeMirrors = forgeSet.map(() => Math.random() > 0.5);
    forgeSet = forgeSet.sort(() => Math.random() - 0.5);
    drawForge();
}

function drawForge() {
    const cv = document.getElementById('forge-canvas-el'), ctx = cv.getContext('2d');
    const cx = 300, cy = 300, count = forgeSet.length;
    ctx.clearRect(0,0,600,600);
    if(count === 0) return;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = "bold 320px serif";
    
    forgeSet.forEach((r, i) => {
        const mirror = forgeMirrors[i], yOff = (i - (count-1)/2)*40, s = 0.85 - (i*0.06);
        ctx.save(); ctx.translate(cx, cy + yOff); ctx.scale(mirror ? -s : s, s);
        if(i > 0) { ctx.globalCompositeOperation = 'destination-out'; ctx.strokeStyle = 'black'; ctx.lineWidth = 20; ctx.strokeText(r.g, 0, 0); }
        ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = '#c9a96e'; ctx.fillText(r.g, 0, 0); ctx.restore();
    });

    ctx.save(); ctx.globalCompositeOperation = 'source-atop';
    const g = ctx.createLinearGradient(0,100,0,500); g.addColorStop(0,'#fefaf0'); g.addColorStop(0.5,'#c9a96e'); g.addColorStop(1,'#7a5e2d');
    ctx.fillStyle = g; ctx.fillRect(0,0,600,600); ctx.restore();
}

function saveTalisman() {
    const img = document.getElementById('forge-canvas-el').toDataURL();
    talismans.unshift({ img, date: new Date().toLocaleDateString(), runes: forgeSet.map(r=>r.n).join(' & ') });
    localStorage.setItem('talisman_lib', JSON.stringify(talismans.slice(0,10)));
    renderTalismans();
}

function renderTalismans() {
    const lib = document.getElementById('talisman-library'); lib.innerHTML = '<h3 class="date-display">Library</h3>';
    talismans.forEach(t => {
        lib.innerHTML += `<div class="history-card" style="text-align:center;"><img src="${t.img}" style="width:120px;"><br><small>${t.runes} - ${t.date}</small></div>`;
    });
}

function renderHistory() {
    const h = document.getElementById('history-list'); h.innerHTML = '';
    historyData.forEach(item => {
        h.innerHTML += `<div class="history-card">
            <div style="font-size:24px; color:var(--accent); margin-bottom:10px;">${item.glyphs}</div>
            <div style="font-size:14px; color:var(--fg2); line-height:1.4;">${item.text}</div>
            <div style="font-size:10px; opacity:0.4; margin-top:10px;">${item.date}</div>
        </div>`;
    });
}
</script>
</body>
</html>
