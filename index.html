<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --gold-fade: linear-gradient(to bottom, #c9a96e, #8a6d3b);
            --red-dim: #551a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; overflow-x: hidden; }

        /* Navigation */
        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(26, 26, 36, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .nav-btn { width: 65px; height: 55px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 160px; opacity: 0; }
        .page.active { display: flex; opacity: 1; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Home */
        .home-hero { text-align: center; padding: 60px 24px 40px; }
        .date-display { font-size: 11px; letter-spacing: 0.5em; color: var(--fg); text-transform: uppercase; margin-bottom: 50px; opacity: 0.8; }
        .rotd-glyph { font-size: 110px; color: var(--fg); margin-bottom: 15px; text-shadow: 0 0 30px rgba(201,169,110,0.2); }
        .rotd-name { font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 8px; }
        .rotd-meaning { font-size: 14px; font-style: italic; color: var(--dim2); margin-bottom: 40px; }

        .action-card { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin: 0 20px 15px; padding: 30px 25px; cursor: pointer; transition: transform 0.2s; }
        .action-card:active { transform: scale(0.97); }
        .action-title { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; color: var(--accent); margin-bottom: 4px; }

        /* Reader Roulette */
        .reel-container { display: flex; justify-content: center; gap: 15px; margin: 40px 0; height: 130px; }
        .slot { width: 95px; height: 130px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; position: relative; }
        .reel { transition-property: transform; transition-timing-function: cubic-bezier(0.15, 0, 0.05, 1); }
        .reel-unit { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; color: var(--fg); }

        /* Manual Grid */
        .manual-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .manual-item { background: var(--dim); border: 1px solid transparent; border-radius: 10px; padding: 18px 5px; text-align: center; transition: 0.3s; }
        .manual-item.selected { border-color: var(--accent); background: rgba(201,169,110,0.15); }

        /* Forge & Talisman Library */
        .forge-container { position: relative; width: 320px; height: 320px; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); border-radius: 50%; border: 1px solid var(--dim); overflow: hidden; }
        .sigil-wrap { display: flex; align-items: center; justify-content: center; letter-spacing: -0.75em; color: var(--accent); filter: drop-shadow(0 0 8px rgba(201,169,110,0.4)); pointer-events: none; }
        .sigil-char { font-size: 160px; opacity: 0.6; mix-blend-mode: plus-lighter; }
        
        .talisman-item { position: relative; width: 100%; overflow: hidden; background: var(--bg); border-bottom: 1px solid var(--dim); }
        .talisman-content { position: relative; z-index: 10; background: var(--dim); padding: 30px 25px; border-radius: 15px; margin: 10px 20px; transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 1px solid rgba(201,169,110,0.1); }
        .talisman-delete { position: absolute; right: 20px; top: 10px; bottom: 10px; width: 80px; background: var(--red-dim); color: #ff9999; border-radius: 0 15px 15px 0; display: flex; align-items: center; justify-content: center; font-size: 10px; text-transform: uppercase; z-index: 1; }

        /* History */
        .stats-section { padding: 0 20px; margin-bottom: 30px; }
        .stat-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim2); margin-bottom: 15px; display: block; }
        .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 40px; }
        .grid-stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }

        .history-item { position: relative; width: 100%; overflow: hidden; background: var(--bg); border-bottom: 1px solid var(--dim); }
        .history-content { position: relative; z-index: 10; background: var(--bg); padding: 25px 20px; transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .history-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; background: var(--red-dim); color: #ff9999; display: flex; align-items: center; justify-content: center; font-size: 11px; text-transform: uppercase; z-index: 1; }

        /* Buttons */
        .btn-main { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 22px; text-transform: uppercase; letter-spacing: 0.4em; font-size: 11px; margin: 20px; cursor: pointer; border-radius: 4px; }
        .btn-main:disabled { opacity: 0.2; pointer-events: none; }
        .btn-danger { border-color: var(--red-dim); color: #ff9999; margin-top: 40px; }

        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 12px 25px; border-radius: 30px; font-size: 11px; text-transform: uppercase; z-index: 3000; opacity: 0; transition: 0.4s; pointer-events: none; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="page" id="page-home">
    <div class="home-hero">
        <div class="date-display" id="date-now">THURSDAY 19 MARCH</div>
        <div class="rotd-glyph" id="rotd-g">ᛗ</div>
        <div class="rotd-name" id="rotd-n">MANNAZ</div>
        <div class="rotd-meaning" id="rotd-m">Self, community, and the human soul</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('draw')">
        <div class="action-title">Draw Staves</div>
        <div style="font-size: 11px; color: var(--dim2); font-style: italic;">Let the Norns guide your hand</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('manual')">
        <div class="action-title">Manual Choice</div>
        <div style="font-size: 11px; color: var(--dim2); font-style: italic;">Select with conscious intent</div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:40px;">The Oracle</h2>
        <div id="draw-ui">
            <div class="reel-container" id="reel-wrap"></div>
            <button class="btn-main" id="cast-btn" onclick="startCast()">Cast the Runes</button>
        </div>
        <div id="manual-ui" style="display:none;">
            <div class="manual-grid" id="manual-grid"></div>
            <button class="btn-main" id="manual-submit" onclick="submitManual()" disabled>Select 3 Staves</button>
        </div>
        <div id="reveal-ui" style="display:none;">
            <div id="reveal-glyphs" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;"></div>
            <div id="reveal-text" style="font-size:18px; font-style:italic; line-height:1.8; color:var(--fg2); padding:0 20px; margin-bottom:40px;"></div>
            <button class="btn-main" onclick="resetReader()">Reset Session</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">Bindrune Forge</h2>
        <div class="forge-container"><div class="sigil-wrap" id="forge-canvas"></div></div>
        <div id="forge-picker" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px; padding:20px;"></div>
        <button class="btn-main" id="bind-btn" onclick="bindTalisman()">Bind to Library</button>
        <button class="btn-main" style="margin-top:-10px; border:none; color:var(--dim2); text-decoration:underline; font-size:9px;" onclick="resetForge()">Clear Forge</button>
        
        <div style="padding:40px 0; text-align:left;">
            <span class="stat-label" style="padding-left:20px;">Talisman Library (Swipe to Delete)</span>
            <div id="talisman-list"></div>
        </div>
    </div>
</div>

<div class="page" id="page-history">
    <div style="padding-top:60px;">
        <div class="stats-section">
            <span class="stat-label">Full Futhark Census</span>
            <div class="full-grid" id="full-rune-stats"></div>
        </div>
        <div class="stats-section">
            <span class="stat-label">Reading History (Swipe to Delete)</span>
            <div id="history-list"></div>
            <button class="btn-main btn-danger" onclick="purgeHistory()">Purge All Records</button>
        </div>
    </div>
</div>

<div class="page" id="page-library">
    <div id="guide-list" style="padding:60px 0;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth',l:'Wealth and creative fire. It represents prosperity and mobility.'},
        {g:'ᚢ',n:'Uruz',m:'Vitality',l:'Primal strength and physical health. Courage to face change.'},
        {g:'ᚦ',n:'Thurisaz',m:'Force',l:'Reactive power and conflict. Boundary setting and protection.'},
        {g:'ᚨ',n:'Ansuz',m:'Insight',l:'Breath of the gods. Communication and ancestral wisdom.'},
        {g:'ᚱ',n:'Raidho',m:'Direction',l:'The journey and rhythm. Justice and the soul’s destination.'},
        {g:'ᚲ',n:'Kenaz',m:'Clarity',l:'Technical skill and knowledge. The spark that brings light.'},
        {g:'ᚷ',n:'Gebo',m:'Exchange',l:'Sacred bond and harmony. A gift for a gift.'},
        {g:'ᚹ',n:'Wunjo',m:'Harmony',l:'Joy and well-being. Perfect alignment with the universe.'},
        {g:'ᚺ',n:'Hagalaz',m:'Evolution',l:'Crisis and disruption. Clearing patterns for new growth.'},
        {g:'ᚾ',n:'Naudhiz',m:'Resilience',l:'Innovation born of friction. Adaptability and overcoming limits.'},
        {g:'ᛁ',n:'Isa',m:'Stillness',l:'Stasis and concentration. Finding clarity within.'},
        {g:'ᛃ',n:'Jera',m:'Cycles',l:'Harvest and reward. Patient effort in the right season.'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance',l:'Continuity and protection. Axis of life and transitions.'},
        {g:'ᛈ',n:'Perthro',m:'Destiny',l:'Mystery and cosmic luck. Laws governing the unrevealed.'},
        {g:'ᛉ',n:'Algiz',m:'Guard',l:'Protective instinct and shield. Spiritual connection.'},
        {g:'ᛊ',n:'Sowilo',m:'Success',l:'Victory and light. Vitality that burns away shadows.'},
        {g:'ᛏ',n:'Tiwaz',m:'Honor',l:'Spear of justice. Leadership and integrity.'},
        {g:'ᛒ',n:'Berkano',m:'Growth',l:'Birch tree energy. Nurturing, healing, and renewal.'},
        {g:'ᛖ',n:'Ehwaz',m:'Synergy',l:'Trust and progress. Harmonious movement between forces.'},
        {g:'ᛗ',n:'Mannaz',m:'Identity',l:'The self and community. Realization of human consciousness.'},
        {g:'ᛚ',n:'Laguz',m:'Intuition',l:'Flow of water. Emotional depth and the subconscious mind.'},
        {g:'ᛜ',n:'Ingwaz',m:'Potential',l:'The seed. Stored potential requiring rest before birth.'},
        {g:'ᛞ',n:'Dagaz',m:'Awakening',l:'Light of dawn. Transformation through radical breakthrough.'},
        {g:'ᛟ',n:'Legacy',m:'Heritage',l:'Spiritual land and foundations. Lasting inheritances.'},
        {g:'◯',n:'Wyrd',m:'Fate',l:'The blank rune. Destiny as yet unwritten by the Norns.'}
    ];

    let forgeSet = [];
    let manualSet = [];
    let readingActive = false;
    let stats = JSON.parse(localStorage.getItem('rune_stats') || '{}');
    let history = JSON.parse(localStorage.getItem('rune_hist') || '[]');
    let talismans = JSON.parse(localStorage.getItem('rune_tali') || '[]');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelector(`[data-id="${id}"]`).classList.add('active');
        
        // PERSISTENCE FIX: Don't clear active reveal
        if(id === 'reading' && !readingActive && !document.getElementById('reveal-ui').style.display.includes('block')) {
            setReadMode('draw'); 
        }
        if(id === 'forge') initForge();
        if(id === 'history') renderStats();
        if(id === 'library') renderGuide();
    }

    function setReadMode(mode) {
        document.getElementById('draw-ui').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('manual-ui').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('reveal-ui').style.display = 'none';
        readingActive = false;
        if(mode === 'draw') {
            const wrap = document.getElementById('reel-wrap'); wrap.innerHTML = '';
            for(let i=0; i<3; i++) {
                const slot = document.createElement('div'); slot.className = 'slot';
                const reel = document.createElement('div'); reel.className = 'reel'; reel.id = `r${i}`;
                reel.style.transitionDuration = (3.2 + (i * 0.6)) + "s";
                reel.style.transitionDelay = (i * 0.15) + "s";
                for(let j=0; j<45; j++) {
                    const unit = document.createElement('div'); unit.className = 'reel-unit';
                    unit.textContent = RUNES[Math.floor(Math.random()*25)].g;
                    reel.appendChild(unit);
                }
                slot.appendChild(reel); wrap.appendChild(slot);
            }
        } else {
            const grid = document.getElementById('manual-grid'); grid.innerHTML = ''; manualSet = [];
            RUNES.forEach(r => {
                const item = document.createElement('div'); item.className = 'manual-item';
                item.textContent = r.g;
                item.onclick = () => {
                    if(manualSet.includes(r)) { manualSet = manualSet.filter(x=>x!==r); item.classList.remove('selected'); }
                    else if(manualSet.length < 3) { manualSet.push(r); item.classList.add('selected'); }
                    document.getElementById('manual-submit').disabled = manualSet.length !== 3;
                };
                grid.appendChild(item);
            });
        }
    }

    function startCast() {
        document.getElementById('cast-btn').disabled = true;
        const picks = [];
        for(let i=0; i<3; i++) {
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            const r = document.getElementById('r'+i);
            r.lastChild.textContent = win.g; 
            r.style.transform = `translateY(-${44 * 130}px)`;
        }
        setTimeout(() => processReading(picks), 4600);
    }

    function submitManual() { processReading(manualSet); }

    function processReading(runes) {
        readingActive = true;
        document.getElementById('draw-ui').style.display = 'none';
        document.getElementById('manual-ui').style.display = 'none';
        const container = document.getElementById('reveal-glyphs'); container.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '50px'; d.textContent = r.g; container.appendChild(d);
            stats[r.n] = (stats[r.n] || 0) + 1;
        });
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}).toUpperCase();
        const textStr = `The presence of ${runes[0].n} suggests a deep foundation. However, the friction of ${runes[1].n} acts as the catalyst for change, manifesting eventually as ${runes[2].n}. Trust the unfolding path.`;
        history.unshift({ date: dateStr, names: runes.map(r=>r.n), glyphs: runes.map(p=>p.g).join(' · '), text: textStr });
        localStorage.setItem('rune_hist', JSON.stringify(history.slice(0, 30)));
        document.getElementById('reveal-text').textContent = textStr;
        document.getElementById('reveal-ui').style.display = 'block';
    }

    function resetReader() { 
        readingActive = false;
        setReadMode('draw'); 
        document.getElementById('cast-btn').disabled = false; 
    }

    /* FORGE & TALISMANS */
    function initForge() {
        const p = document.getElementById('forge-picker'); if(p.children.length > 0) { renderTalismans(); return; }
        RUNES.forEach(r => {
            const b = document.createElement('div'); b.style.cssText = "background:var(--dim); padding:10px; border-radius:8px; text-align:center; font-size:20px; cursor:pointer;";
            b.textContent = r.g;
            b.onclick = () => {
                if(forgeSet.includes(r)) forgeSet = forgeSet.filter(x=>x!==r);
                else if(forgeSet.length < 4) forgeSet.push(r);
                updateForge();
            };
            p.appendChild(b);
        });
        renderTalismans();
    }

    function updateForge() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeSet.forEach(r => {
            const el = document.createElement('span'); el.className = 'sigil-char'; el.textContent = r.g;
            cv.appendChild(el);
        });
        document.getElementById('bind-btn').disabled = forgeSet.length < 2;
    }

    function resetForge() { forgeSet = []; updateForge(); }

    function bindTalisman() {
        const glyphs = forgeSet.map(r => r.g);
        const incantation = `This talisman shall provide the wearer with ${forgeSet[0].m.toLowerCase()} and the protection of ${forgeSet[1].m.toLowerCase()} to shield their spirit.`;
        talismans.unshift({ glyphs, incantation });
        localStorage.setItem('rune_tali', JSON.stringify(talismans.slice(0, 15)));
        showToast("Talisman Bound");
        renderTalismans();
        resetForge();
    }

    function renderTalismans() {
        const list = document.getElementById('talisman-list'); list.innerHTML = '';
        talismans.forEach((t, idx) => {
            const item = document.createElement('div'); item.className = 'talisman-item';
            let visual = '<div style="display:flex; justify-content:center; letter-spacing:-0.75em; color:var(--accent); margin-bottom:15px; filter:drop-shadow(0 0 5px rgba(201,169,110,0.3))">';
            t.glyphs.forEach(g => visual += `<span style="font-size:60px; opacity:0.6; mix-blend-mode:plus-lighter;">${g}</span>`);
            visual += '</div>';

            item.innerHTML = `<div class="talisman-delete" onclick="deleteTalisman(${idx})">UNBIND</div>
                <div class="talisman-content">${visual}<div style="font-size:14px; font-style:italic; line-height:1.6; color:var(--fg2);">${t.incantation}</div></div>`;
            
            let startX = 0; const content = item.querySelector('.talisman-content');
            content.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            content.addEventListener('touchmove', e => {
                let diff = e.touches[0].clientX - startX;
                if(diff < 0 && diff > -100) content.style.transform = `translateX(${diff}px)`;
            });
            content.addEventListener('touchend', e => {
                let diff = e.touches[0].clientX - startX;
                content.style.transform = diff < -50 ? 'translateX(-100px)' : 'translateX(0)';
            });
            list.appendChild(item);
        });
    }

    function deleteTalisman(idx) { talismans.splice(idx, 1); localStorage.setItem('rune_tali', JSON.stringify(talismans)); renderTalismans(); }

    /* STATS & HISTORY */
    function renderStats() {
        const census = document.getElementById('full-rune-stats'); census.innerHTML = '';
        RUNES.forEach(r => {
            census.innerHTML += `<div class="grid-stat-box"><span>${r.g}</span><span style="font-size:10px; opacity:0.4">${r.n}</span><span style="color:var(--accent); font-weight:bold;">${stats[r.n] || 0}</span></div>`;
        });
        const hList = document.getElementById('history-list'); hList.innerHTML = '';
        history.forEach((h, idx) => {
            const item = document.createElement('div'); item.className = 'history-item';
            item.innerHTML = `<div class="history-delete" onclick="deleteHistory(${idx})">Delete</div>
                <div class="history-content">
                    <div style="font-size:10px; color:var(--accent); margin-bottom:5px;">${h.date}</div>
                    <div style="font-size:20px; letter-spacing:6px; margin-bottom:10px;">${h.glyphs}</div>
                    <div style="font-size:14px; font-style:italic; opacity:0.7; line-height:1.5;">${h.text}</div>
                </div>`;
            let startX = 0; const content = item.querySelector('.history-content');
            content.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            content.addEventListener('touchmove', e => {
                let diff = e.touches[0].clientX - startX;
                if(diff < 0 && diff > -100) content.style.transform = `translateX(${diff}px)`;
            });
            content.addEventListener('touchend', e => {
                let diff = e.touches[0].clientX - startX;
                content.style.transform = diff < -50 ? 'translateX(-100px)' : 'translateX(0)';
            });
            hList.appendChild(item);
        });
    }

    function deleteHistory(idx) {
        history.splice(idx,1); localStorage.setItem('rune_hist', JSON.stringify(history)); renderStats();
    }

    function purgeHistory() {
        if(confirm("Purge all records?")) {
            history = []; stats = {};
            localStorage.removeItem('rune_hist'); localStorage.removeItem('rune_stats');
            renderStats();
        }
    }

    function renderGuide() {
        const cont = document.getElementById('guide-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-item'
            div.style.padding = '25px 20px'; div.style.borderBottom = '1px solid var(--dim)';
            div.innerHTML = `<div style="display:flex; align-items:center; gap:25px;">
                <span style="font-size:40px; color:var(--accent)">${r.g}</span>
                <div><div style="text-transform:uppercase; letter-spacing:3px; font-size:16px;">${r.n}</div><div style="font-size:12px; color:var(--dim2);">${r.m}</div></div>
            </div><div style="margin-top:15px; color:var(--fg2); line-height:1.7;">${r.l}</div>`;
            cont.appendChild(div);
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2500);
    }

    document.getElementById('date-now').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
