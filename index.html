<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iOS polish -->
<meta name="theme-color" content="#0d0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Daily Rune Reading</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:#0d0d12;
  --fg:#ede9e0;
  --accent:#c9a96e;
  --dim:#3a3830;
  --dim2:#8a8070;
  --card:#15151e;
  --fg2:#b8b4aa;
  --nav-h:80px;
}

/* LIGHT MODE */
body.light {
  --bg:#f6f4ef;
  --fg:#1a1a1a;
  --card:#ffffff;
  --dim:#d6d1c7;
  --dim2:#6b665c;
  --accent:#8c6a2f;
}

html {
  -webkit-text-size-adjust:100%;
  color-scheme:dark light;
}

body {
  background:var(--bg);
  color:var(--fg);
  font-family:'Cormorant Garamond', Georgia, serif;
  min-height:100dvh;
}

/* THEME BUTTON */
#theme-toggle {
  position:fixed;
  top:16px;
  right:16px;
  z-index:200;
  background:var(--card);
  border:1px solid var(--dim);
  border-radius:50%;
  width:42px;
  height:42px;
  font-size:18px;
  cursor:pointer;
}

/* VERSION LABEL */
#version {
  position:fixed;
  bottom:6px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:0.2em;
  color:var(--dim2);
  opacity:0.6;
  pointer-events:none;
}

/* PAGE FIX (important for iPhone overlap) */
.page {
  display:none;
  flex-direction:column;
  min-height:100dvh;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 40px);
  opacity:0;
  transition:opacity 0.25s;
}
.page.active { display:flex; }
.page.shown { opacity:1; }

/* NAV */
#nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:var(--nav-h);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

/* SIMPLE NAV STYLE */
.nav-pill {
  display:flex;
  background:var(--card);
  border-radius:40px;
  padding:6px;
  border:1px solid var(--dim);
}

.nav-btn {
  padding:10px 14px;
  border:none;
  background:none;
  cursor:pointer;
  color:var(--dim2);
}

.nav-btn.nav-active {
  color:var(--accent);
}

/* BASIC PAGE CONTENT */
.page-header {
  text-align:center;
  padding:40px 20px;
}

/* ADD EXTRA SCROLL SPACE */
.page::after {
  content:'';
  display:block;
  height:120px;
}

</style>
</head>

<body>

<!-- THEME TOGGLE -->
<button id="theme-toggle" onclick="toggleTheme()">🌙</button>

<!-- VERSION -->
<div id="version"></div>

<!-- HOME -->
<div class="page active shown" id="page-home">
  <div class="page-header">
    <h1>Daily Rune Reading</h1>
    <p id="home-date"></p>
  </div>

  <div style="text-align:center; padding:20px;">
    <div id="rotd-glyph" style="font-size:80px;"></div>
    <div id="rotd-name"></div>
    <div id="rotd-keywords"></div>
  </div>

  <div style="text-align:center;">
    <button onclick="navTo('reading')">Start Reading</button>
  </div>
</div>

<!-- READING -->
<div class="page" id="page-reading">
  <div class="page-header">
    <h1>Your Reading</h1>
    <div id="reading-date"></div>
  </div>

  <div style="text-align:center;">
    <button onclick="drawRunes()">Draw Runes</button>
    <div id="reading-output" style="margin-top:20px;"></div>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <div class="nav-pill">
    <button class="nav-btn nav-active" onclick="navTo('home')">Home</button>
    <button class="nav-btn" onclick="navTo('reading')">Reading</button>
  </div>
</div>

<script>

/* VERSION */
const VERSION = "0.1.0";
document.getElementById('version').textContent = "v" + VERSION;

/* THEME */
function toggleTheme() {
  const body = document.body;
  const isLight = body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
}

(function(){
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
})();

/* DATE */
const now = new Date();
const dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('home-date').textContent = dateStr;
document.getElementById('reading-date').textContent = dateStr;

/* RUNES */
const RUNES = [
  {g:'ᚠ',n:'Fehu',m:'Wealth'},
  {g:'ᚢ',n:'Uruz',m:'Strength'},
  {g:'ᚦ',n:'Thurisaz',m:'Challenge'},
  {g:'ᚨ',n:'Ansuz',m:'Wisdom'},
  {g:'ᚱ',n:'Raidho',m:'Journey'}
];

/* RUNE OF DAY */
const rotd = RUNES[Math.floor(Math.random()*RUNES.length)];
document.getElementById('rotd-glyph').textContent = rotd.g;
document.getElementById('rotd-name').textContent = rotd.n;
document.getElementById('rotd-keywords').textContent = rotd.m;

/* NAV */
function navTo(page){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active','shown');
  });
  const target=document.getElementById('page-'+page);
  target.classList.add('active');
  setTimeout(()=>target.classList.add('shown'),50);
}

/* DRAW */
function drawRunes(){
  const picks = [];
  for(let i=0;i<3;i++){
    picks.push(RUNES[Math.floor(Math.random()*RUNES.length)]);
  }

  document.getElementById('reading-output').innerHTML =
    picks.map(r=>`<div style="font-size:40px;">${r.g} - ${r.n}</div>`).join('');
}

</script>

</body>
</html>
