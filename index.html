<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --nav-h: 85px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; overflow-x: hidden; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 140px; opacity: 0; transition: opacity 0.4s; }
        .page.active { display: flex; }
        .page.shown { opacity: 1; }

        /* Navigation - Restored Style */
        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(26, 26, 36, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { width: 65px; height: 50px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 18px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; }
        .nav-dot { position: absolute; top: 5px; right: 18px; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: none; }

        /* Home Screen - Restored Layout */
        .home-hero { text-align: center; padding: 80px 24px 40px; }
        .date-display { font-size: 11px; letter-spacing: 0.5em; color: var(--fg); text-transform: uppercase; margin-bottom: 60px; opacity: 0.8; }
        .rotd-glyph { font-size: 110px; color: var(--fg); margin-bottom: 20px; font-weight: 300; text-shadow: 0 0 20px rgba(201,169,110,0.2); }
        .rotd-name { font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 10px; }
        .rotd-meaning { font-size: 14px; font-style: italic; color: var(--dim2); }

        /* Draw Roulette - Restored */
        .reel-container { display: flex; justify-content: center; gap: 15px; margin: 50px 0; }
        .slot { width: 90px; height: 120px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; position: relative; }
        .reel { transition: transform 3s cubic-bezier(0.15, 0, 0.05, 1); }
        .reel-unit { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--fg); }

        /* Forge - Magnetic Alignment */
        .forge-vessel { width: 300px; height: 300px; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); margin: 20px auto; border: 1px solid var(--dim); border-radius: 50%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        .forge-rune { position: absolute; font-size: 150px; color: var(--accent); opacity: 0.6; mix-blend-mode: screen; filter: drop-shadow(0 0 5px rgba(201,169,110,0.3)); pointer-events: none; }

        /* General UI Restored */
        .section-box { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; margin: 0 20px 15px; padding: 25px; transition: 0.3s; cursor: pointer; }
        .btn-main { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 20px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; margin: 20px; cursor: pointer; transition: 0.3s; }
        .btn-main:active { background: rgba(201,169,110,0.1); transform: scale(0.98); }

        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 12px 25px; border-radius: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; z-index: 3000; opacity: 0; transition: 0.4s; }

        .rune-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; }
        .grid-item { background: var(--dim); border: 1px solid transparent; border-radius: 10px; padding: 15px 5px; text-align: center; transition: 0.3s; }
        .grid-item.active { border-color: var(--accent); background: rgba(201,169,110,0.05); }

        .module { margin: 0 20px 15px; border-bottom: 1px solid var(--dim); }
        .module-trigger { padding: 20px 0; display: flex; justify-content: space-between; align-items: center; color: var(--accent); text-transform: uppercase; letter-spacing: 0.2em; font-size: 12px; }
        .module-body { display: none; padding-bottom: 20px; }
        .module-body.open { display: block; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="page" id="page-home">
    <div class="home-hero">
        <div class="date-display" id="date-now"></div>
        <div class="rotd-glyph" id="rotd-g"></div>
        <div class="rotd-name" id="rotd-n"></div>
        <div class="rotd-meaning" id="rotd-m"></div>
    </div>
    
    <div class="section-box" onclick="navTo('reading'); setReadMode('draw')">
        <div style="display:flex; align-items:center; gap:25px;">
            <span style="font-size:35px; color:var(--accent)">ᚱ</span>
            <div>
                <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px;">Draw Staves</div>
                <div style="font-size:11px; color:var(--dim2); font-style:italic;">Let the Norns guide your hand</div>
            </div>
        </div>
    </div>

    <div class="section-box" onclick="navTo('reading'); setReadMode('manual')">
        <div style="display:flex; align-items:center; gap:25px;">
            <span style="font-size:35px; color:var(--accent)">ᛟ</span>
            <div>
                <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px;">Manual Selection</div>
                <div style="font-size:11px; color:var(--dim2); font-style:italic;">Choose with intention</div>
            </div>
        </div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:40px;">The Reading</h2>
        
        <div id="draw-ui">
            <div class="reel-container">
                <div class="slot"><div class="reel" id="r0"></div></div>
                <div class="slot"><div class="reel" id="r1"></div></div>
                <div class="slot"><div class="reel" id="r2"></div></div>
            </div>
            <button class="btn-main" onclick="startCast()">Cast the Runes</button>
        </div>

        <div id="manual-ui" style="display:none;">
            <div class="rune-grid" id="manual-grid"></div>
            <button class="btn-main" id="manual-btn" onclick="submitManual()" style="opacity:0.3; pointer-events:none;">Select 3</button>
        </div>

        <div id="reveal-ui" style="display:none;">
            <div id="reveal-glyphs" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;"></div>
            <div id="reveal-text" style="font-size:18px; font-style:italic; line-height:1.8; color:var(--fg2); padding:0 20px;"></div>
            <button class="btn-main" onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">Bindrune Forge</h2>
        <div class="forge-vessel" id="forge-canvas"></div>
        <div id="forge-picker" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding:20px;"></div>
        <button class="btn-main" onclick="saveTalisman()">Save Talisman</button>
        
        <div class="module">
            <div class="module-trigger" onclick="toggleMod('lib-body')">Talisman Library <span>▼</span></div>
            <div class="module-body" id="lib-body"></div>
        </div>
    </div>
</div>

<div class="page" id="page-history">
    <div style="padding: 60px 20px 0;">
        <div class="module">
            <div class="module-trigger" onclick="toggleMod('ach-body')">Achievements <span>▼</span></div>
            <div class="module-body open" id="ach-body"></div>
        </div>
        <div class="module">
            <div class="module-trigger" onclick="toggleMod('stat-body')">Draw Frequencies <span>▼</span></div>
            <div class="module-body" id="stat-body"></div>
        </div>
    </div>
</div>

<div class="page" id="page-library"><div id="guide-list" style="padding:40px 20px;"></div></div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')">
            <div class="nav-dot" id="notif-dot"></div>
            <span class="icon">ᚻ</span><span class="txt">Stats</span>
        </button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth',l:'Creative fire and abundance. Movable wealth and the responsibility of success.'},
        {g:'ᚢ',n:'Uruz',m:'Strength',l:'Primal power of the wild ox. Untamed potential and vitality.'},
        {g:'ᚦ',n:'Thurisaz',m:'Force',l:'The thorn or giant. Reactive defense and necessary conflict.'},
        {g:'ᚨ',n:'Ansuz',m:'Wisdom',l:'Divine communication. Signals, messages, and ancestral breath.'},
        {g:'ᚱ',n:'Raidho',m:'Journey',l:'The wheel. Rationality, justice, and the rhythm of movement.'},
        {g:'ᚲ',n:'Kenaz',m:'Torch',l:'Knowledge and skill. The controlled fire of the artist.'},
        {g:'ᚷ',n:'Gebo',m:'Gift',l:'Balance in exchange. The connection between giver and receiver.'},
        {g:'ᚹ',n:'Wunjo',m:'Joy',l:'Contentment and harmony. Contentment through alignment.'},
        {g:'ᚺ',n:'Hagalaz',m:'Hail',l:'Necessary disruption. Forces that clear the way for new structures.'},
        {g:'ᚾ',n:'Naudhiz',m:'Need',l:'Innovation through friction. Hardship that sparks survival.'},
        {g:'ᛁ',n:'Isa',m:'Ice',l:'Stillness and concentration. A period of stasis and patience.'},
        {g:'ᛃ',n:'Jera',m:'Harvest',l:'Cycles of reward. The natural outcome of effort over time.'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance',l:'The Yew tree. Continuity between life, death, and spirit.'},
        {g:'ᛈ',n:'Perthro',m:'Fate',l:'Hidden laws and mystery. The dice cup of cosmic chance.'},
        {g:'ᛉ',n:'Algiz',m:'Protection',l:'Spiritual guidance and following the pure instinct of the soul.'},
        {g:'ᛊ',n:'Sowilo',m:'Sun',l:'Vitality and victory. The light that burns away doubt.'},
        {g:'ᛏ',n:'Tiwaz',m:'Justice',l:'Sacrifice for the greater good. Integrity and courage.'},
        {g:'ᛒ',n:'Berkano',m:'Growth',l:'Nurturing rebirth. The energy of a garden in bloom.'},
        {g:'ᛖ',n:'Ehwaz',m:'Trust',l:'Progress through partnership. Harmonious movement.'},
        {g:'ᛗ',n:'Mannaz',m:'Humanity',l:'The individual within the collective. Self-realization.'},
        {g:'ᛚ',n:'Laguz',m:'Flow',l:'Intuition and emotions. The fluid nature of reality.'},
        {g:'ᛜ',n:'Ingwaz',m:'Potential',l:'Rest before release. Internalized energy stored for growth.'},
        {g:'ᛞ',n:'Dagaz',m:'Dawn',l:'Breakthrough and awakening. Radical change of perspective.'},
        {g:'ᛟ',n:'Othala',m:'Heritage',l:'Ancestral land and home. What we build to leave behind.'},
        {g:'O',n:'Wyrd',m:'The Unknown',l:'The blank rune. Fate yet to be written in the cosmic void.'}
    ];

    let forgeSet = [];
    let manualSet = [];
    let stats = JSON.parse(localStorage.getItem('rune_stats') || '{}');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'shown'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const target = document.getElementById('page-' + id);
        target.classList.add('active');
        document.querySelector(`.nav-btn[data-id="${id}"]`).classList.add('active');
        setTimeout(() => target.classList.add('shown'), 50);
        if(id === 'history') { renderStats(); document.getElementById('notif-dot').style.display='none'; triggerAchieve('The Observer'); }
        if(id === 'forge') renderForge();
        if(id === 'library') renderGuide();
    }

    function toggleMod(id) { document.getElementById(id).classList.toggle('open'); }

    function showToast(msg) {
        const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    function triggerAchieve(id) {
        let u = JSON.parse(localStorage.getItem('rune_ach') || '[]');
        if(!u.includes(id)) { u.push(id); localStorage.setItem('rune_ach', JSON.stringify(u)); showToast("Achievement: " + id); document.getElementById('notif-dot').style.display='block'; }
    }

    /* READING ENGINE - Restored Roulette */
    function setReadMode(mode) {
        document.getElementById('draw-ui').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('manual-ui').style.display = mode === 'manual' ? 'block' : 'none';
        if(mode === 'manual') initManualGrid();
    }

    function startCast() {
        const picks = [];
        for(let i=0; i<3; i++) {
            const r = document.getElementById('r'+i); r.innerHTML = '';
            for(let j=0; j<30; j++) {
                const d = document.createElement('div'); d.className = 'reel-unit';
                d.textContent = RUNES[Math.floor(Math.random()*25)].g; r.appendChild(d);
            }
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            const last = document.createElement('div'); last.className = 'reel-unit'; last.textContent = win.g; r.appendChild(last);
            r.style.transition = 'none'; r.style.transform = 'translateY(0)';
            setTimeout(() => {
                r.style.transition = `transform ${2 + (i*0.5)}s cubic-bezier(0.1, 0, 0, 1)`;
                r.style.transform = `translateY(-${30 * 120}px)`;
            }, 50);
        }
        setTimeout(() => displayReveal(picks), 3500);
    }

    function initManualGrid() {
        const g = document.getElementById('manual-grid'); g.innerHTML = ''; manualSet = [];
        RUNES.forEach(r => {
            const d = document.createElement('div'); d.className = 'grid-item'; d.innerHTML = `<div style="font-size:24px">${r.g}</div><div style="font-size:8px; color:var(--dim2)">${r.n}</div>`;
            d.onclick = () => {
                if(manualSet.includes(r)) { manualSet = manualSet.filter(x=>x!==r); d.classList.remove('active'); }
                else if(manualSet.length < 3) { manualSet.push(r); d.classList.add('active'); }
                document.getElementById('manual-btn').style.opacity = manualSet.length === 3 ? '1' : '0.3';
                document.getElementById('manual-btn').style.pointerEvents = manualSet.length === 3 ? 'all' : 'none';
            };
            g.appendChild(d);
        });
    }

    function submitManual() { displayReveal(manualSet); }

    function displayReveal(runes) {
        document.getElementById('draw-ui').style.display = 'none';
        document.getElementById('manual-ui').style.display = 'none';
        const v = document.getElementById('reveal-glyphs'); v.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '45px'; d.textContent = r.g; v.appendChild(d);
            stats[r.n] = (stats[r.n] || 0) + 1;
        });
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        document.getElementById('reveal-text').textContent = `${runes[0].m}, through ${runes[1].m.toLowerCase()}, leads to ${runes[2].m.toLowerCase()}.`;
        document.getElementById('reveal-ui').style.display = 'block';
        triggerAchieve('The Seeker');
    }

    /* FORGE - Magnetic Stave Alignment */
    function renderForge() {
        const p = document.getElementById('forge-picker'); if(p.children.length > 0) return;
        RUNES.forEach(r => {
            const b = document.createElement('div'); b.style.cssText = "background:var(--dim); padding:10px; border-radius:8px; width:45px; text-align:center; font-size:20px; cursor:pointer;";
            b.textContent = r.g;
            b.onclick = () => {
                if(forgeSet.includes(r)) { forgeSet = forgeSet.filter(x=>x!==r); b.style.borderColor = 'transparent'; }
                else if(forgeSet.length < 4) { forgeSet.push(r); b.style.borderColor = 'var(--accent)'; b.style.borderStyle = 'solid'; b.style.borderWidth = '1px'; }
                updateForgeVessel();
            };
            p.appendChild(b);
        });
        updateForgeLib();
    }

    function updateForgeVessel() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeSet.forEach((r, i) => {
            const el = document.createElement('div'); el.className = 'forge-rune'; el.textContent = r.g;
            // Magnetic alignment: Vertical center is the "Stave"
            el.style.transform = `scale(1) translate(${(i-1)*5}px, 0)`;
            cv.appendChild(el);
        });
    }

    function saveTalisman() {
        if(forgeSet.length < 2) return;
        let lib = JSON.parse(localStorage.getItem('rune_lib') || '[]');
        lib.unshift({ glyphs: forgeSet.map(r=>r.g).join(''), spell: forgeSet.map(r=>r.m).join(' + ') + ' bound.' });
        localStorage.setItem('rune_lib', JSON.stringify(lib.slice(0,10)));
        showToast("Talisman Bound"); updateForgeLib(); triggerAchieve('The Smith');
    }

    function updateForgeLib() {
        const lib = JSON.parse(localStorage.getItem('rune_lib') || '[]');
        const body = document.getElementById('lib-body'); body.innerHTML = '';
        lib.forEach(item => {
            const d = document.createElement('div'); d.style.padding = '15px 0'; d.style.borderBottom = '1px solid var(--dim)';
            d.innerHTML = `<div style="font-size:24px; color:var(--accent); letter-spacing:-10px;">${item.glyphs}</div><div style="font-size:12px; font-style:italic; opacity:0.7;">${item.spell}</div>`;
            body.appendChild(d);
        });
    }

    function renderStats() {
        const body = document.getElementById('stat-body'); body.innerHTML = '';
        RUNES.forEach(r => {
            const row = document.createElement('div'); row.style.display='flex'; row.style.justifyContent='space-between'; row.style.padding='8px 0'; row.style.fontSize='12px';
            row.innerHTML = `<span>${r.g} ${r.n}</span><span style="color:var(--accent)">${stats[r.n] || 0}</span>`;
            body.appendChild(row);
        });
        const ach = document.getElementById('ach-body'); ach.innerHTML = '';
        const u = JSON.parse(localStorage.getItem('rune_ach') || '[]');
        ['The Seeker', 'The Observer', 'The Smith', 'The Sage'].forEach(id => {
            const isU = u.includes(id);
            ach.innerHTML += `<div style="padding:10px; margin-bottom:5px; background:rgba(255,255,255,0.03); border-radius:8px; opacity:${isU?1:0.3}">${id}</div>`;
        });
    }

    function renderGuide() {
        const cont = document.getElementById('guide-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const d = document.createElement('div'); d.style.marginBottom = '25px';
            d.innerHTML = `<div style="display:flex; align-items:center; gap:20px;"><span style="font-size:35px; color:var(--accent)">${r.g}</span><div><div style="text-transform:uppercase; letter-spacing:2px; font-size:14px;">${r.n}</div><div style="font-size:11px; color:var(--dim2);">${r.m}</div></div></div><div style="margin-top:10px; font-size:15px; font-style:italic; color:var(--fg2); line-height:1.6;">${r.l}</div>`;
            cont.appendChild(d);
        });
    }

    // Init Home
    const rotd = RUNES[Math.floor(Math.random()*24)];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    document.getElementById('date-now').textContent = new Date().toLocaleDateString('en-GB', {weekday: 'long', day:'numeric', month:'long'});
    navTo('home');
</script>
</body>
</html>
