<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --gold-fade: linear-gradient(to bottom, #c9a96e, #8a6d3b);
            --red-dim: #551a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; overflow-x: hidden; }

        /* Navigation */
        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(26, 26, 36, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .nav-btn { width: 65px; height: 55px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 20px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 160px; opacity: 0; }
        .page.active { display: flex; opacity: 1; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Home */
        .home-hero { text-align: center; padding: 60px 24px 40px; }
        .date-display { font-size: 11px; letter-spacing: 0.5em; color: var(--fg); text-transform: uppercase; margin-bottom: 50px; opacity: 0.8; }
        .rotd-glyph { font-size: 110px; color: var(--fg); margin-bottom: 15px; text-shadow: 0 0 30px rgba(201,169,110,0.2); }
        .rotd-name { font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 8px; }
        .rotd-meaning { font-size: 14px; font-style: italic; color: var(--dim2); margin-bottom: 40px; }

        .action-card { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin: 0 20px 15px; padding: 30px 25px; cursor: pointer; transition: transform 0.2s; }
        .action-card:active { transform: scale(0.97); }
        .action-title { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; color: var(--accent); margin-bottom: 4px; }

        /* Reader Roulette */
        .reel-container { display: flex; justify-content: center; gap: 15px; margin: 40px 0; height: 130px; }
        .slot { width: 95px; height: 130px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; position: relative; }
        .reel { transition-property: transform; transition-timing-function: cubic-bezier(0.15, 0, 0.05, 1); }
        .reel-unit { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; color: var(--fg); }

        /* Forge - The Merged Sigil Engine */
        .forge-container { position: relative; width: 320px; height: 320px; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); border-radius: 50%; border: 1px solid var(--dim); overflow: hidden; }
        .sigil-canvas { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .merged-rune-segment { position: absolute; font-size: 140px; color: var(--accent); mix-blend-mode: screen; filter: drop-shadow(0 0 10px rgba(201,169,110,0.3)); transition: all 0.5s ease; }
        
        .talisman-content { position: relative; z-index: 10; background: var(--dim); padding: 30px 25px; border-radius: 15px; margin: 10px 20px; transition: transform 0.4s; border: 1px solid rgba(201,169,110,0.1); }
        .sigil-preview-wrap { position: relative; height: 80px; width: 100%; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }

        /* History */
        .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 40px; }
        .grid-stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }

        .btn-main { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 22px; text-transform: uppercase; letter-spacing: 0.4em; font-size: 11px; margin: 20px; cursor: pointer; border-radius: 4px; }
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 12px 25px; border-radius: 30px; font-size: 11px; text-transform: uppercase; z-index: 3000; opacity: 0; transition: 0.4s; pointer-events: none; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="page" id="page-home">
    <div class="home-hero">
        <div class="date-display" id="date-now"></div>
        <div class="rotd-glyph" id="rotd-g">ᛗ</div>
        <div class="rotd-name" id="rotd-n">MANNAZ</div>
        <div class="rotd-meaning" id="rotd-m">Self, community, and the human soul</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('draw')">
        <div class="action-title">Draw Staves</div>
        <div style="font-size: 11px; color: var(--dim2); font-style: italic;">Let the Norns guide your hand</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('manual')">
        <div class="action-title">Manual Choice</div>
        <div style="font-size: 11px; color: var(--dim2); font-style: italic;">Select with conscious intent</div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:40px;">The Oracle</h2>
        <div id="draw-ui">
            <div class="reel-container" id="reel-wrap"></div>
            <button class="btn-main" id="cast-btn" onclick="startCast()">Cast the Runes</button>
        </div>
        <div id="reveal-ui" style="display:none;">
            <div id="reveal-glyphs" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;"></div>
            <div id="reveal-text" style="font-size:18px; font-style:italic; line-height:1.8; color:var(--fg2); padding:0 20px; margin-bottom:40px;"></div>
            <button class="btn-main" onclick="resetReader()">Reset Session</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">Bindrune Forge</h2>
        <div class="forge-container">
            <div class="sigil-canvas" id="forge-canvas"></div>
        </div>
        <div id="forge-picker" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px; padding:20px;"></div>
        <button class="btn-main" id="bind-btn" onclick="bindTalisman()">Bind to Library</button>
        <button class="btn-main" style="margin-top:-10px; border:none; color:var(--dim2); text-decoration:underline; font-size:9px;" onclick="resetForge()">Clear Forge</button>
        
        <div style="padding:40px 0; text-align:left;">
            <span style="font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim2); padding-left:20px;">Talisman Library</span>
            <div id="talisman-list"></div>
        </div>
    </div>
</div>

<div class="page" id="page-history">
    <div style="padding-top:60px;">
        <div style="padding:0 20px; margin-bottom:30px;">
            <span style="font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim2);">Futhark Census</span>
            <div class="full-grid" id="full-rune-stats"></div>
        </div>
        <div style="padding:0 20px;">
            <span style="font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim2);">Reading History</span>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div class="page" id="page-library">
    <div id="guide-list" style="padding:60px 0;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth',type:'stave',l:'Creative fire and abundance. Represents movable wealth and the power of creative flow. It reminds us that wealth is a tool for circulation, not hoarding.'},
        {g:'ᚢ',n:'Uruz',m:'Vitality',type:'stave',l:'Primal power and physical health. The untamed force of the ox. It symbolizes the endurance needed to face great challenges and the strength to manifest change.'},
        {g:'ᚦ',n:'Thurisaz',m:'Force',type:'branch',l:'Reactive defense and necessary conflict. The thorn or the giant. It serves as a reminder that protection often requires a sharp boundary or a targeted strike.'},
        {g:'ᚨ',n:'Ansuz',m:'Insight',type:'stave',l:'Divine breath and communication. Ancestral consciousness and wisdom. It governs the spoken word, poetry, and the transmission of higher knowledge.'},
        {g:'ᚱ',n:'Raidho',m:'Direction',type:'stave',l:'Rational action and personal rhythm. Justice and the wheel. It signifies the journey of the soul and the importance of staying in alignment with cosmic law.'},
        {g:'ᚲ',n:'Kenaz',m:'Clarity',type:'branch',l:'Knowledge and skill. Controlled fire of transformation. It is the torch of the seeker, turning raw experience into refined wisdom through application.'},
        {g:'ᚷ',n:'Gebo',m:'Exchange',type:'center',l:'Balance and generosity. Sacral bond between individuals. It represents the "gift for a gift" and the equilibrium required for any healthy relationship.'},
        {g:'ᚹ',n:'Wunjo',m:'Harmony',type:'branch',l:'Contentment and fulfillment. Joy derived from being in perfect alignment with your true self and the world around you.'},
        {g:'ᚺ',n:'Hagalaz',m:'Evolution',type:'center',l:'Crisis and disruption. The hailstone that clears the path. It represents unavoidable change that destroys the old to make room for the new.'},
        {g:'ᚾ',n:'Naudhiz',m:'Resilience',type:'center',l:'Innovation through resistance. The need-fire. It teaches us that our greatest breakthroughs often come from our most pressing limitations.'},
        {g:'ᛁ',n:'Isa',m:'Stillness',l:'Concentration and waiting. Stasis required for internal focus. It is the ice that preserves and clarifies, requiring patience before movement.'},
        {g:'ᛃ',n:'Jera',m:'Cycles',type:'center',l:'Harvest and reward. Natural timing and effort over time. It represents the wheel of the year and the patient cultivation of one’s intentions.'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance',type:'stave',l:'Longevity and continuity. The axis between life and death. It symbolizes the Yew tree, providing protection and a connection to the eternal.'},
        {g:'ᛈ',n:'Perthro',m:'Destiny',type:'branch',l:'Chance and mystery. Laws of probability and cosmic laws. It represents the dice cup of the gods and the hidden factors that shape our reality.'},
        {g:'ᛉ',n:'Algiz',m:'Guard',type:'stave',l:'Protection and guidance. Lower instinct aligned with higher intuition. It is the shield that allows us to move forward with spiritual confidence.'},
        {g:'ᛊ',n:'Sowilo',m:'Success',type:'center',l:'Vitality and clear path. Sunlight burns away doubt. It is the ultimate victory of light and the energy required to complete the work.'},
        {g:'ᛏ',n:'Tiwaz',m:'Honor',type:'stave',l:'Integrity and courage. Leadership and the spear of justice. It represents the sacrifice of the self for the benefit of the greater community.'},
        {g:'ᛒ',n:'Berkano',m:'Growth',type:'stave',l:'Fertility and healing. The energy of the birch tree. It symbolizes the nurturing power of rebirth and the cycles of creation and renewal.'},
        {g:'ᛖ',n:'Ehwaz',m:'Synergy',type:'stave',l:'Trust and cooperation. Synergy between distinct forces. It is the horse and rider moving as one toward a shared destination.'},
        {g:'ᛗ',n:'Mannaz',m:'Identity',type:'stave',l:'Humanity and shared fate. Realization of the self within the context of the whole. It is the awareness of our collective human experience.'},
        {g:'ᛚ',n:'Laguz',m:'Intuition',type:'stave',l:'Flow of deep waters. Subconscious and emotional depth. It represents the vital energy of the ocean and the navigation of the unseen.'},
        {g:'ᛜ',n:'Ingwaz',m:'Potential',type:'center',l:'Seed containing potential. Rest before expansion. It represents internal growth and the gestation of power before it is unleashed.'},
        {g:'ᛞ',n:'Dagaz',m:'Awakening',type:'center',l:'Light of dawn. Transformation through breakthrough. It is the moment of clarity when night turns into day and everything changes.'},
        {g:'ᛟ',n:'Legacy',m:'Heritage',type:'center',l:'Ancestral land and permanent foundations. It represents the wealth we inherit from our ancestors and the legacy we build for the future.'},
        {g:'◯',n:'Wyrd',m:'Fate',type:'special',l:'The void and the unknown. Destiny yet unwritten by the Norns. It represents the infinite possibility and the power of the present moment.'}
    ];

    let forgeSet = [];
    let stats = JSON.parse(localStorage.getItem('rune_stats') || '{}');
    let history = JSON.parse(localStorage.getItem('rune_hist') || '[]');
    let talismans = JSON.parse(localStorage.getItem('rune_tali') || '[]');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelector(`[data-id="${id}"]`).classList.add('active');
        if(id === 'forge') initForge();
        if(id === 'history') renderStats();
        if(id === 'library') renderGuide();
    }

    /* FORGE ENGINE - SMART MERGING */
    function initForge() {
        const p = document.getElementById('forge-picker'); if(p.children.length > 0) { renderTalismans(); return; }
        RUNES.forEach(r => {
            const b = document.createElement('div'); b.style.cssText = "background:var(--dim); padding:10px; border-radius:8px; text-align:center; font-size:20px; cursor:pointer;";
            b.textContent = r.g;
            b.onclick = () => {
                if(forgeSet.includes(r)) forgeSet = forgeSet.filter(x=>x!==r);
                else if(forgeSet.length < 5) forgeSet.push(r);
                updateForge();
            };
            p.appendChild(b);
        });
        renderTalismans();
    }

    function updateForge() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeSet.forEach((r, i) => {
            const el = document.createElement('div');
            el.className = 'merged-rune-segment';
            el.textContent = r.g;
            
            // SMART STAVE LOGIC
            // If the rune has a vertical stave, we lock it to center
            if(r.type === 'stave') {
                el.style.left = "50%";
                el.style.transform = "translateX(-50%)";
            } 
            // If it is a branching element, we offset it slightly to attach to the center spine
            else if(r.type === 'branch') {
                el.style.left = "50%";
                el.style.transform = `translateX(-40%) scale(0.9)`;
            }
            // Centered symbols (like Gebo/Dagaz) stay anchored in the middle
            else {
                el.style.left = "50%";
                el.style.top = "50%";
                el.style.transform = "translate(-50%, -50%) scale(0.85)";
            }
            
            el.style.opacity = 0.5 + (i * 0.1);
            cv.appendChild(el);
        });
        document.getElementById('bind-btn').disabled = forgeSet.length < 2;
    }

    function bindTalisman() {
        const html = document.getElementById('forge-canvas').innerHTML;
        const incantation = `By the binding of ${forgeSet.map(r=>r.n).join(' and ')}, this talisman shall grant ${forgeSet[0].m.toLowerCase()}.`;
        talismans.unshift({ html, incantation });
        localStorage.setItem('rune_tali', JSON.stringify(talismans.slice(0, 15)));
        showToast("Sigil Bound");
        renderTalismans();
        resetForge();
    }

    function renderTalismans() {
        const list = document.getElementById('talisman-list'); list.innerHTML = '';
        talismans.forEach((t, idx) => {
            const item = document.createElement('div');
            item.innerHTML = `
                <div class="talisman-content">
                    <div class="sigil-preview-wrap">${t.html}</div>
                    <div style="font-size:14px; font-style:italic; color:var(--fg2); text-align:center;">${t.incantation}</div>
                </div>`;
            // Resize for list view
            item.querySelectorAll('.merged-rune-segment').forEach(s => s.style.fontSize = "60px");
            list.appendChild(item);
        });
    }

    function resetForge() { forgeSet = []; updateForge(); }

    function startCast() {
        const picks = [];
        for(let i=0; i<3; i++) picks.push(RUNES[Math.floor(Math.random()*25)]);
        displayReveal(picks);
    }

    function displayReveal(runes) {
        document.getElementById('draw-ui').style.display = 'none';
        const v = document.getElementById('reveal-glyphs'); v.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '50px'; d.textContent = r.g; v.appendChild(d);
            stats[r.n] = (stats[r.n] || 0) + 1;
        });
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        const textStr = `${runes[0].m}, through the challenge of ${runes[1].m.toLowerCase()}, leads to ${runes[2].m.toLowerCase()}.`;
        document.getElementById('reveal-text').textContent = textStr;
        document.getElementById('reveal-ui').style.display = 'block';
    }

    function renderStats() {
        const c = document.getElementById('full-rune-stats'); c.innerHTML = '';
        RUNES.forEach(r => {
            c.innerHTML += `<div class="grid-stat-box"><span>${r.g}</span><span style="color:var(--accent);">${stats[r.n] || 0}</span></div>`;
        });
    }

    function renderGuide() {
        const cont = document.getElementById('guide-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            cont.innerHTML += `
                <div style="padding:25px 20px; border-bottom:1px solid var(--dim);">
                    <div style="display:flex; align-items:center; gap:25px;">
                        <span style="font-size:40px; color:var(--accent)">${r.g}</span>
                        <div><div style="text-transform:uppercase; letter-spacing:3px; font-size:16px;">${r.n}</div><div style="font-size:12px; color:var(--dim2);">${r.m}</div></div>
                    </div>
                    <div style="margin-top:15px; color:var(--fg2); line-height:1.7;">${r.l}</div>
                </div>`;
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2500);
    }

    document.getElementById('date-now').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
