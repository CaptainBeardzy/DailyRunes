<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --gold-fade: linear-gradient(to bottom, #c9a96e, #8a6d3b);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; overflow-x: hidden; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 140px; }
        .page.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Navigation - Original Style */
        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 1000; }
        .nav-pill { background: rgba(26, 26, 36, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .nav-btn { width: 65px; height: 50px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 18px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; }
        .nav-dot { position: absolute; top: 5px; right: 18px; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); display: none; }

        /* Forge - Improved Bindrune Logic */
        .forge-vessel { width: 320px; height: 320px; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); margin: 20px auto; border: 1px solid var(--dim); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.9); }
        .forge-rune { position: absolute; font-size: 160px; color: var(--accent); opacity: 0.6; mix-blend-mode: screen; transition: 0.4s; }
        
        /* Stats Dashboard - Visual Summary */
        .stats-hero { padding: 40px 20px 20px; }
        .summary-card { background: var(--dim); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 3px solid var(--accent); }
        .summary-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--dim2); margin-bottom: 10px; }

        /* History Swipe Logic */
        .history-item { position: relative; width: 100%; overflow: hidden; background: var(--bg); margin-bottom: 2px; height: 100px; }
        .history-content { position: relative; z-index: 2; background: var(--bg); height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 0 20px; transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); border-bottom: 1px solid var(--dim); }
        .history-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; background: #441111; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; z-index: 1; }

        /* Guide - Sleek Tap to Expand */
        .guide-item { border-bottom: 1px solid var(--dim); padding: 20px; }
        .guide-header { display: flex; align-items: center; gap: 20px; cursor: pointer; }
        .guide-details { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; font-size: 15px; color: var(--fg2); line-height: 1.6; margin-top: 15px; }
        .guide-item.open .guide-details { max-height: 300px; }

        .btn-main { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 20px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; margin: 20px; cursor: pointer; }
        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 12px 25px; border-radius: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; z-index: 3000; opacity: 0; transition: 0.4s; pointer-events: none; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="page" id="page-home">
    <div style="text-align: center; padding: 80px 24px 40px;">
        <div id="date-now" style="font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 60px;"></div>
        <div id="rotd-g" style="font-size: 110px; color: var(--fg); margin-bottom: 20px;"></div>
        <div id="rotd-n" style="font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 10px;"></div>
        <div id="rotd-m" style="font-size: 14px; font-style: italic; color: var(--dim2);"></div>
    </div>
    
    <div style="background: var(--dim); border-radius: 15px; margin: 0 20px 15px; padding: 25px;" onclick="navTo('reading'); setReadMode('draw')">
        <div style="display:flex; align-items:center; gap:25px;">
            <span style="font-size:35px; color:var(--accent)">ᚱ</span>
            <div>
                <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px;">Draw Staves</div>
                <div style="font-size:11px; color:var(--dim2); font-style:italic;">Let the Norns guide your hand</div>
            </div>
        </div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 0; text-align:center;">
        <div id="draw-ui">
            <div id="roulette-container" style="display:flex; justify-content:center; gap:15px; margin:50px 0;"></div>
            <button class="btn-main" onclick="startCast()">Cast the Runes</button>
        </div>
        <div id="reveal-ui" style="display:none;">
            <div id="reveal-glyphs" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;"></div>
            <div id="reveal-text" style="font-size:18px; font-style:italic; line-height:1.8; color:var(--fg2); padding:0 20px;"></div>
            <button class="btn-main" onclick="location.reload()">Reset</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:12px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:20px;">Bindrune Forge</h2>
        <div class="forge-vessel" id="forge-canvas"></div>
        <div id="forge-picker" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px; padding:20px;"></div>
        <button class="btn-main" onclick="saveTalisman()">Save to Talisman Library</button>
        <div id="forge-library" style="padding:20px;"></div>
    </div>
</div>

<div class="page" id="page-history">
    <div class="stats-hero">
        <div class="summary-card">
            <div class="summary-label">Latest Achievement</div>
            <div id="latest-ach" style="font-size:16px; color:var(--fg);">No achievements yet</div>
        </div>
        
        <div class="summary-card">
            <div class="summary-label">Most Frequent Staves</div>
            <div id="top-three-list"></div>
        </div>

        <div class="summary-label" style="margin-left:5px;">Past Readings</div>
        <div id="history-list" style="margin-top:10px;"></div>
    </div>
</div>

<div class="page" id="page-library">
    <div id="guide-list" style="padding:60px 0;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')">
            <div class="nav-dot" id="notif-dot"></div>
            <span class="icon">ᚻ</span><span class="txt">Stats</span>
        </button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Abundance',l:'Wealth is not just gold, but the creative fire that fuels growth. It warns against greed while encouraging the flow of energy.', type:'vertical'},
        {g:'ᚢ',n:'Uruz',m:'Vitality',l:'The primal strength of the wild ox. It represents physical health, raw potential, and the courage to face change.', type:'vertical'},
        {g:'ᚦ',n:'Thurisaz',m:'Protection',l:'The thorn that protects the rose. It is a reactive force—a defensive power that strikes only when boundaries are crossed.', type:'point'},
        {g:'ᚨ',n:'Ansuz',m:'Insight',l:'The breath of the divine. It rules communication, signals, and the wisdom passed down through ancestral lines.', type:'vertical'},
        {g:'ᚱ',n:'Raidho',m:'Direction',l:'The rhythm of the journey. It represents personal path-finding, justice, and staying in tune with the cosmic law.', type:'vertical'},
        {g:'ᚲ',n:'Kenaz',m:'Clarity',l:'The torch in the dark. It is the controlled fire of knowledge, skill, and the artistic spark of transformation.', type:'angle'},
        {g:'ᚷ',n:'Gebo',m:'Exchange',l:'A gift for a gift. It signifies the sacred bond between people and the balance required in all relationships.', type:'cross'},
        {g:'ᚹ',n:'Wunjo',m:'Harmony',l:'The peak of joy. It is the alignment of self with the universe, leading to fulfillment and peace of mind.', type:'point'},
        {g:'ᚺ',n:'Hagalaz',m:'Evolution',l:'The hailstone. It brings necessary disruption and crisis to clear away the old and make room for the new.', type:'cross'},
        {g:'ᚾ',n:'Naudhiz',m:'Resilience',l:'Innovation born from friction. It is the "need-fire" that forces us to adapt and find strength in hardship.', type:'cross'},
        {g:'ᛁ',n:'Isa',m:'Stillness',l:'The block of ice. It represents a period of stasis where outward progress stops so internal clarity can form.', type:'vertical'},
        {g:'ᛃ',n:'Jera',m:'Cycles',l:'The harvest. It rewards patience and consistent effort, reminding us that everything has its natural timing.', type:'angle'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance',l:'The Yew tree. It connects the heavens and the underworld, representing the continuity of life through death.', type:'vertical'},
        {g:'ᛈ',n:'Perthro',m:'Destiny',l:'The dice cup of the Norns. It rules the hidden laws of probability and the mysteries that govern our luck.', type:'angle'},
        {g:'ᛉ',n:'Algiz',m:'Guidance',l:'The elk-sedge. It is the higher connection to spirit and the protective instinct that keeps one safe.', type:'vertical'},
        {g:'ᛊ',n:'Sowilo',m:'Success',l:'The sun\'s rays. It provides the energy and light needed to achieve victory and burn away all shadows.', type:'angle'},
        {g:'ᛏ',n:'Tiwaz',m:'Honor',l:'The warrior\'s spear. It represents sacrifice for the greater good, leadership, and unwavering integrity.', type:'vertical'},
        {g:'ᛒ',n:'Berkano',m:'Renewal',l:'The birch tree. It is the energy of a mother’s womb—nurturing, healing, and bringing new ideas into bloom.', type:'vertical'},
        {g:'ᛖ',n:'Ehwaz',m:'Synergy',l:'The horse and rider. It signifies progress through trust, partnership, and working in tandem with others.', type:'vertical'},
        {g:'ᛗ',n:'Mannaz',m:'Identity',l:'The self within the tribe. It represents human consciousness, our shared social bonds, and personal growth.', type:'vertical'},
        {g:'ᛚ',n:'Laguz',m:'Intuition',l:'The flow of water. It rules the deep emotions, the subconscious, and the fluid nature of our reality.', type:'vertical'},
        {g:'ᛜ',n:'Ingwaz',m:'Incubation',l:'The seed. It is the stored potential that requires rest and protection before it can burst into life.', type:'cross'},
        {g:'ᛞ',n:'Dagaz',m:'Awakening',l:'The light of dawn. It is the radical breakthrough that changes your entire perspective in a single moment.', type:'cross'},
        {g:'ᛟ',n:'Legacy',m:'Heritage',l:'Ancestral land and home. It represents the lasting foundations we build to leave behind for others.', type:'angle'}
    ];

    let forgeSet = [];
    let stats = JSON.parse(localStorage.getItem('rune_stats') || '{}');
    let history = JSON.parse(localStorage.getItem('rune_hist') || '[]');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelector(`[data-id="${id}"]`).classList.add('active');
        if(id === 'history') { renderStats(); document.getElementById('notif-dot').style.display='none'; }
        if(id === 'forge') initForge();
        if(id === 'library') renderGuide();
    }

    function showToast(msg) {
        const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 3000);
    }

    /* FORGE - Improved Stave-Sync Logic */
    function initForge() {
        const p = document.getElementById('forge-picker'); if(p.children.length > 0) return;
        RUNES.forEach(r => {
            const b = document.createElement('div'); b.style.cssText = "background:var(--dim); padding:12px; border-radius:8px; text-align:center; font-size:18px; cursor:pointer;";
            b.textContent = r.g;
            b.onclick = () => {
                if(forgeSet.includes(r)) { forgeSet = forgeSet.filter(x=>x!==r); b.style.border = 'none'; }
                else if(forgeSet.length < 4) { forgeSet.push(r); b.style.border = '1px solid var(--accent)'; }
                updateForgeDisplay();
            };
            p.appendChild(b);
        });
    }

    function updateForgeDisplay() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeSet.forEach((r, i) => {
            const el = document.createElement('div'); el.className = 'forge-rune'; el.textContent = r.g;
            // The "Stave Sync" Fix: Force them to center on a shared vertical spine
            // but add slight scale/opacity variance for depth
            el.style.opacity = 0.5 + (i * 0.1);
            el.style.transform = `scale(${1 - (i*0.05)}) translate(${(i-1)*2}px, 0)`;
            cv.appendChild(el);
        });
    }

    function saveTalisman() {
        if(forgeSet.length < 2) return;
        let lib = JSON.parse(localStorage.getItem('rune_lib') || '[]');
        const spell = forgeSet.map(r => r.m).join(' + ') + ' bound for intent.';
        lib.unshift({ glyphs: forgeSet.map(r=>r.g).join(''), spell });
        localStorage.setItem('rune_lib', JSON.stringify(lib.slice(0, 10)));
        showToast("Talisman Bound");
    }

    /* STATS & HISTORY - Sticky Swipe Restore */
    function renderStats() {
        // Achievement
        const ach = JSON.parse(localStorage.getItem('rune_ach') || '[]');
        document.getElementById('latest-ach').textContent = ach.length ? ach[ach.length-1] : "The Seeker (Cast your first rune)";

        // Top Three
        const topThree = Object.entries(stats).sort((a,b)=>b[1]-a[1]).slice(0,3);
        const t3l = document.getElementById('top-three-list'); t3l.innerHTML = '';
        topThree.forEach(([name, count]) => {
            const r = RUNES.find(rx => rx.n === name);
            t3l.innerHTML += `<div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
                <span style="font-size:24px; color:var(--accent)">${r.g}</span>
                <div><div style="font-size:13px; text-transform:uppercase;">${name}</div>
                <div style="font-size:11px; color:var(--dim2)">${r.m} • Drawn ${count} times</div></div>
            </div>`;
        });

        // History Swipe
        const hList = document.getElementById('history-list'); hList.innerHTML = '';
        history.forEach((h, idx) => {
            const item = document.createElement('div'); item.className = 'history-item';
            item.innerHTML = `
                <div class="history-delete" onclick="deleteHistory(${idx})">Delete</div>
                <div class="history-content" id="h-content-${idx}">
                    <div style="font-size:10px; color:var(--accent); margin-bottom:5px;">${h.date}</div>
                    <div style="font-size:20px; letter-spacing:5px;">${h.glyphs}</div>
                    <div style="font-size:12px; font-style:italic; opacity:0.7; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${h.text}</div>
                </div>
            `;
            // Sticky Swipe Touch Logic
            let startX = 0, currentX = 0;
            const content = item.querySelector('.history-content');
            content.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
            content.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                if(currentX < 0 && currentX > -100) content.style.transform = `translateX(${currentX}px)`;
            });
            content.addEventListener('touchend', () => {
                if(currentX < -50) content.style.transform = 'translateX(-100px)';
                else content.style.transform = 'translateX(0)';
            });
            hList.appendChild(item);
        });
    }

    function deleteHistory(idx) {
        history.splice(idx, 1); localStorage.setItem('rune_hist', JSON.stringify(history));
        renderStats();
    }

    /* READING ENGINE */
    function startCast() {
        const picks = [];
        for(let i=0; i<3; i++) {
            const win = RUNES[Math.floor(Math.random()*24)]; picks.push(win);
            stats[win.n] = (stats[win.n] || 0) + 1;
        }
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        
        const date = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}).toUpperCase();
        const text = `${picks[0].m} flows into ${picks[1].m}, resulting in ${picks[2].m}.`;
        history.unshift({ date, glyphs: picks.map(p=>p.g).join(' · '), text });
        localStorage.setItem('rune_hist', JSON.stringify(history.slice(0, 20)));

        displayReveal(picks, text);
    }

    function displayReveal(runes, text) {
        document.getElementById('draw-ui').style.display = 'none';
        const v = document.getElementById('reveal-glyphs'); v.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '45px'; d.textContent = r.g; v.appendChild(d);
        });
        document.getElementById('reveal-text').textContent = text;
        document.getElementById('reveal-ui').style.display = 'block';
    }

    function renderGuide() {
        const cont = document.getElementById('guide-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-item';
            div.innerHTML = `
                <div class="guide-header" onclick="this.parentElement.classList.toggle('open')">
                    <span style="font-size:35px; color:var(--accent)">${r.g}</span>
                    <div>
                        <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px;">${r.n}</div>
                        <div style="font-size:11px; color:var(--dim2);">${r.m}</div>
                    </div>
                </div>
                <div class="guide-details">${r.l}</div>
            `;
            cont.appendChild(div);
        });
    }

    // Init Home
    const rotd = RUNES[Math.floor(Math.random()*24)];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    document.getElementById('date-now').textContent = new Date().toLocaleDateString('en-GB', {weekday: 'long', day:'numeric', month:'long'});
    navTo('home');
</script>
</body>
</html>
