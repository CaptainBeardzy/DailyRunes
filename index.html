<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bindrune Forge</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --card-bg: #1a1a24;
            --gold-primary: #c9a96e;
            --gold-light: #fefaf0;
            --gold-dark: #7a5e2d;
            --text-dim: #a0a0a0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            color: var(--gold-primary);
        }

        /* --- Forge Section --- */
        #forge-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #forge-canvas {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }

        /* --- Recast Button --- */
        #recast-btn {
            background: none;
            border: 1px solid var(--gold-dark);
            color: var(--gold-primary);
            padding: 12px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        #recast-btn:active {
            background: rgba(201, 169, 110, 0.1);
            transform: scale(0.98);
        }

        /* --- Rune Grid --- */
        #rune-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        .rune-btn {
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid transparent;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .rune-btn.active {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(201, 169, 110, 0.3);
        }

        /* --- Navigation Bar --- */
        nav {
            position: fixed;
            bottom: 30px;
            background: rgba(26, 26, 36, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex;
            padding: 10px 25px;
            gap: 25px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--gold-primary);
        }

        .nav-icon {
            font-size: 18px;
        }

        canvas { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <header>Bindrune Forge</header>

    <div id="forge-container">
        <canvas id="forge-canvas-el" width="600" height="600"></canvas>
    </div>

    <button id="recast-btn" onclick="recastForge()">✧ Rethrow the Bones</button>

    <div id="rune-grid">
        </div>

    <nav>
        <div class="nav-item"><span class="nav-icon">ᚠ</span><span>Home</span></div>
        <div class="nav-item"><span class="nav-icon">ᚱ</span><span>Read</span></div>
        <div class="nav-item active"><span class="nav-icon">ᛘ</span><span>Forge</span></div>
        <div class="nav-item"><span class="nav-icon">ᚻ</span><span>Stats</span></div>
        <div class="nav-item"><span class="nav-icon">ᛒ</span><span>Guide</span></div>
    </nav>

    <script>
        const RUNES = [
            { n: 'Fehu', g: 'ᚠ' }, { n: 'Uruz', g: 'ᚢ' }, { n: 'Thurisaz', g: 'ᚦ' },
            { n: 'Ansuz', g: 'ᚨ' }, { n: 'Raidho', g: 'ᚱ' }, { n: 'Kenaz', g: 'ᚲ' },
            { n: 'Gebo', g: 'ᚼ' }, { n: 'Wunjo', g: 'ᚹ' }, { n: 'Hagalaz', g: 'ᚻ' },
            { n: 'Nauthiz', g: 'ᚾ' }, { n: 'Isa', g: 'ᛁ' }, { n: 'Jera', g: 'ᛄ' },
            { n: 'Eihwaz', g: 'ᛇ' }, { n: 'Perthro', g: 'ᛈ' }, { n: 'Algiz', g: 'ᛉ' },
            { n: 'Sowilo', g: 'ᛊ' }, { n: 'Tiwaz', g: 'ᛏ' }, { n: 'Berkano', g: 'ᛒ' },
            { n: 'Ehwaz', g: 'ᛖ' }, { n: 'Mannaz', g: 'ᛗ' }, { n: 'Laguz', g: 'ᛚ' },
            { n: 'Ingwaz', g: 'ᛜ' }, { n: 'Dagaz', g: 'ᛞ' }, { n: 'Othala', g: 'ᛟ' }
        ];

        let forgeSet = [];
        let forgeMirrors = [];
        const FORGE_SIZE = 600;
        const FORGE_FONT = "bold 240px sans-serif"; // Using sans-serif as fallback for emoji/glyphs
        const FORGE_FS = 240;
        const RUNE_Y_NUDGE = 0.1; // Adjust based on font baseline

        function init() {
            const grid = document.getElementById('rune-grid');
            RUNES.forEach(rune => {
                const btn = document.createElement('div');
                btn.className = 'rune-btn';
                btn.innerText = rune.g;
                btn.onclick = () => toggleRune(rune, btn);
                grid.appendChild(btn);
            });
            updateForge();
        }

        function toggleRune(rune, btn) {
            const index = forgeSet.findIndex(r => r.n === rune.n);
            if (index > -1) {
                forgeSet.splice(index, 1);
                forgeMirrors.splice(index, 1);
                btn.classList.remove('active');
            } else if (forgeSet.length < 4) {
                forgeSet.push(rune);
                forgeMirrors.push(false);
                btn.classList.add('active');
            }
            updateForge();
        }

        function updateForge() {
            compositeForge();
        }

        // --- FORGE ENGINE 2.2 (Unified Shared-Stave) ---
        function compositeForge() {
            const cv = document.getElementById('forge-canvas-el');
            if (!cv) return;
            const ctx = cv.getContext('2d');
            const cx = FORGE_SIZE / 2, cy = FORGE_SIZE / 2;
            const count = forgeSet.length;

            ctx.clearRect(0, 0, FORGE_SIZE, FORGE_SIZE);
            
            // 1. Forge Background
            ctx.fillStyle = '#0d0d12';
            ctx.beginPath(); ctx.arc(cx, cy, cx, 0, Math.PI * 2); ctx.fill();
            const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, cx * 0.85);
            grd.addColorStop(0, 'rgba(201,169,110,0.15)');
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(cx, cy, cx, 0, Math.PI * 2); ctx.fill();

            if (count === 0) return;

            // 2. Prep Unified Styling
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = FORGE_FONT;

            // 3. Draw Shared-Geometry Base
            forgeSet.forEach((r, i) => {
                const mirror = forgeMirrors[i] ?? false;
                const yNudge = (i - (count - 1) / 2) * 25; 
                const scale = 0.85 - (i * 0.05); 

                ctx.save();
                ctx.translate(cx, cy + yNudge);
                ctx.scale(mirror ? -scale : scale, scale);
                
                // Cutout logic for "forged" interlocking
                if (i > 0) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 15;
                    ctx.strokeText(r.g, 0, FORGE_FS * RUNE_Y_NUDGE);
                }

                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = '#c9a96e';
                ctx.fillText(r.g, 0, FORGE_FS * RUNE_Y_NUDGE);
                ctx.restore();
            });

            // 4. Unified Metallic Finish
            ctx.save();
            ctx.globalCompositeOperation = 'source-atop';
            const metalGrd = ctx.createLinearGradient(0, 100, 0, 500);
            metalGrd.addColorStop(0, '#fefaf0'); 
            metalGrd.addColorStop(0.5, '#c9a96e'); 
            metalGrd.addColorStop(1, '#7a5e2d'); 
            ctx.fillStyle = metalGrd;
            ctx.fillRect(0, 0, FORGE_SIZE, FORGE_SIZE);

            // Inner heat glow
            ctx.globalCompositeOperation = 'lighter';
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(201,169,110,0.5)';
            forgeSet.forEach((r, i) => {
                const mirror = forgeMirrors[i] ?? false;
                const yNudge = (i - (count - 1) / 2) * 25;
                const scale = 0.85 - (i * 0.05);
                ctx.save();
                ctx.translate(cx, cy + yNudge);
                ctx.scale(mirror ? -scale : scale, scale);
                ctx.fillText(r.g, 0, FORGE_FS * RUNE_Y_NUDGE);
                ctx.restore();
            });
            ctx.restore();

            // 5. Final Vignette
            const vig = ctx.createRadialGradient(cx, cy, cx * 0.6, cx, cy, cx);
            vig.addColorStop(0, 'rgba(0,0,0,0)');
            vig.addColorStop(1, 'rgba(13,13,18,0.9)');
            ctx.fillStyle = vig;
            ctx.beginPath(); ctx.arc(cx, cy, cx, 0, Math.PI * 2); ctx.fill();
        }

        function recastForge() {
            if (forgeSet.length < 2) return;
            const cv = document.getElementById('forge-canvas-el');
            cv.style.transition = 'opacity 0.2s ease';
            cv.style.opacity = '0.3';
            
            setTimeout(() => {
                forgeMirrors = forgeSet.map(() => Math.random() > 0.5);
                forgeSet = forgeSet.sort(() => Math.random() - 0.5);
                updateForge();
                cv.style.opacity = '1';
            }, 200);
        }

        window.onload = init;
    </script>
</body>
</html>
