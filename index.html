<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Rune Reading</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0a0f; --fg:#e8e4dc; --accent:#b8a882;
  --dim:#2e2c28; --dim2:#5a5650; --card:#111118;
}
html,body {
  background:var(--bg); color:var(--fg);
  font-family:'Cormorant Garamond',Georgia,serif;
  min-height:100dvh; padding-bottom:60px;
}
header {
  text-align:center; padding:44px 24px 28px;
  border-bottom:1px solid var(--dim);
}
header h1 {
  font-size:11px; letter-spacing:0.45em; text-transform:uppercase;
  color:var(--accent); font-weight:300; margin-bottom:8px;
}
header .date-str {
  font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--dim2);
}
.section-label {
  font-size:9px; letter-spacing:0.4em; text-transform:uppercase;
  color:var(--dim2); text-align:center; padding:24px 24px 14px;
}
.selected-row {
  display:flex; align-items:center; justify-content:center;
  padding:4px 24px 8px; min-height:82px;
}
.slot { display:flex; flex-direction:column; align-items:center; gap:5px; width:86px; }
.slot-glyph {
  font-size:42px; line-height:1; color:var(--fg); min-height:50px;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(5px); transition:opacity 0.3s,transform 0.3s;
}
.slot-glyph.filled { opacity:0.9; transform:translateY(0); }
.slot-name { font-size:8px; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent); min-height:12px; text-align:center; }
.slot-sep { width:3px; height:3px; border-radius:50%; background:var(--dim2); margin:0 6px 22px; }
.clear-btn {
  display:block; margin:10px auto 0; background:none;
  border:1px solid var(--dim); color:var(--dim2);
  font-family:'Cormorant Garamond',serif; font-size:9px;
  letter-spacing:0.3em; text-transform:uppercase; padding:7px 18px; cursor:pointer;
}
.clear-btn:active { color:var(--fg); border-color:var(--dim2); }
.rune-grid {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:7px; padding:6px 14px 14px; max-width:460px; margin:0 auto;
}
.rune-btn {
  background:var(--card); border:1px solid var(--dim); border-radius:5px;
  padding:10px 4px 7px; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:4px; transition:border-color 0.15s,background 0.15s; position:relative;
}
.rune-btn:active { background:#1a1a22; }
.rune-btn.selected { border-color:var(--accent); background:#181610; }
.rune-btn.selected::after {
  content:''; position:absolute; top:4px; right:4px;
  width:4px; height:4px; border-radius:50%; background:var(--accent);
}
.rune-btn .glyph { font-size:24px; line-height:1; color:var(--fg); }
.rune-btn .name  { font-size:7.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim2); text-align:center; }
.gen-wrap { padding:6px 14px 0; max-width:460px; margin:0 auto; }
.gen-btn {
  width:100%; background:none; border:1px solid var(--accent); color:var(--accent);
  font-family:'Cormorant Garamond',serif; font-size:10px;
  letter-spacing:0.4em; text-transform:uppercase; padding:15px; cursor:pointer;
  transition:background 0.2s,color 0.2s;
}
.gen-btn:hover,.gen-btn:active { background:var(--accent); color:var(--bg); }
.gen-btn:disabled { border-color:var(--dim); color:var(--dim2); cursor:default; background:none; }
.status {
  text-align:center; font-size:10px; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--dim2); padding:16px; min-height:42px; font-style:italic;
}
.result-wrap {
  display:none; flex-direction:column; align-items:center;
  gap:16px; padding:0 14px; max-width:460px; margin:0 auto;
}
.result-wrap.visible { display:flex; }
.result-wrap img { width:100%; border-radius:4px; border:1px solid var(--dim); display:block; }
.save-hint { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--dim2); text-align:center; }
.save-btn {
  width:100%; background:none; border:1px solid var(--accent); color:var(--accent);
  font-family:'Cormorant Garamond',serif; font-size:10px;
  letter-spacing:0.3em; text-transform:uppercase; padding:14px; cursor:pointer;
  text-decoration:none; display:block; text-align:center;
  transition:background 0.2s, color 0.2s;
}
.save-btn:hover,.save-btn:active { background:var(--accent); color:var(--bg); }
#cv { display:none; }
</style>
</head>
<body>

<header>
  <h1>Daily Rune Reading</h1>
  <div class="date-str" id="hdr-date"></div>
</header>

<div class="section-label">Your Draw — Select Three</div>
<div class="selected-row">
  <div class="slot"><div class="slot-glyph" id="sg0"></div><div class="slot-name" id="sn0"></div></div>
  <div class="slot-sep"></div>
  <div class="slot"><div class="slot-glyph" id="sg1"></div><div class="slot-name" id="sn1"></div></div>
  <div class="slot-sep"></div>
  <div class="slot"><div class="slot-glyph" id="sg2"></div><div class="slot-name" id="sn2"></div></div>
</div>
<button class="clear-btn" onclick="clearAll()">Clear Selection</button>

<div class="section-label">Elder Futhark</div>
<div class="rune-grid" id="grid"></div>

<div class="section-label" style="padding-top:20px;"></div>
<div class="gen-wrap">
  <button class="gen-btn" id="gen-btn" disabled onclick="generate()">
    Generate Reading &amp; Wallpaper
  </button>
</div>
<div class="status" id="status"></div>

<div class="result-wrap" id="result">
  <div class="save-hint">Tap and hold image to save · or use button below</div>
  <img id="out-img" src="" alt="Your rune wallpaper">
  <a class="save-btn" id="dl-btn" download="rune-reading.jpg">Save Wallpaper</a>
</div>

<canvas id="cv"></canvas>

<script>
const RUNES = [
  {g:'ᚠ',n:'Fehu',    m:'Wealth, abundance, new beginnings'},
  {g:'ᚢ',n:'Uruz',    m:'Strength, vitality, primal power'},
  {g:'ᚦ',n:'Thurisaz',m:"Force, challenge, Thor's protection"},
  {g:'ᚨ',n:'Ansuz',   m:'Wisdom, communication, divine breath'},
  {g:'ᚱ',n:'Raidho',  m:'Journey, movement, right action'},
  {g:'ᚲ',n:'Kenaz',   m:'Torch, knowledge, creative fire'},
  {g:'ᚷ',n:'Gebo',    m:'Gift, generosity, partnership'},
  {g:'ᚹ',n:'Wunjo',   m:'Joy, harmony, fulfilment'},
  {g:'ᚺ',n:'Hagalaz', m:'Hail, disruption, transformation'},
  {g:'ᚾ',n:'Naudhiz', m:'Need, constraint, endurance'},
  {g:'ᛁ',n:'Isa',     m:'Ice, stillness, patience'},
  {g:'ᛃ',n:'Jera',    m:'Harvest, cycles, reward in time'},
  {g:'ᛇ',n:'Eihwaz',  m:'Yew tree, endurance, continuity'},
  {g:'ᛈ',n:'Perthro', m:'Fate, mystery, hidden things'},
  {g:'ᛉ',n:'Algiz',   m:'Protection, instinct, higher guidance'},
  {g:'ᛊ',n:'Sowilo',  m:'Sun, victory, clarity, vital energy'},
  {g:'ᛏ',n:'Tiwaz',   m:'Justice, courage, sacrifice'},
  {g:'ᛒ',n:'Berkano', m:'Birch, growth, nurturing, new life'},
  {g:'ᛖ',n:'Ehwaz',   m:'Horse, partnership, trust, progress'},
  {g:'ᛗ',n:'Mannaz',  m:'Humanity, self, community'},
  {g:'ᛚ',n:'Laguz',   m:'Water, flow, intuition, the deep'},
  {g:'ᛜ',n:'Ingwaz',  m:'Fertility, potential, inner work'},
  {g:'ᛞ',n:'Dagaz',   m:'Dawn, breakthrough, transformation'},
  {g:'ᛟ',n:'Othala',  m:'Heritage, home, what you protect'},
  {g:'○',n:'Blank',   m:'The unknowable, pure potential, fate'},
];

let selected = [];
const now = new Date();
const dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('hdr-date').textContent = dateStr;

// Build grid
const grid = document.getElementById('grid');
RUNES.forEach(r => {
  const b = document.createElement('button');
  b.className = 'rune-btn';
  b.innerHTML = `<span class="glyph">${r.g}</span><span class="name">${r.n}</span>`;
  b.addEventListener('click', () => toggle(r, b));
  grid.appendChild(b);
});

function toggle(r, btn) {
  const i = selected.findIndex(s => s.g === r.g);
  if (i > -1) { selected.splice(i,1); btn.classList.remove('selected'); }
  else {
    if (selected.length >= 3) return;
    selected.push(r); btn.classList.add('selected');
  }
  updateSlots();
}

function updateSlots() {
  for (let i = 0; i < 3; i++) {
    const ge = document.getElementById('sg'+i);
    const ne = document.getElementById('sn'+i);
    if (selected[i]) {
      ge.textContent = selected[i].g; ge.classList.add('filled'); ne.textContent = selected[i].n;
    } else {
      ge.textContent = ''; ge.classList.remove('filled'); ne.textContent = '';
    }
  }
  document.getElementById('gen-btn').disabled = selected.length < 3;
  document.getElementById('result').classList.remove('visible');
  document.getElementById('status').textContent = '';
}

function clearAll() {
  selected = [];
  document.querySelectorAll('.rune-btn.selected').forEach(b => b.classList.remove('selected'));
  updateSlots();
}

async function generate() {
  if (selected.length < 3) return;
  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  document.getElementById('result').classList.remove('visible');
  status.textContent = 'Consulting the runes…';

  let summary = '';
  try { summary = await getSummary(); }
  catch(e) { summary = 'The runes speak of a day requiring reflection, patience, and trust in the unfolding path.'; }

  status.textContent = 'Drawing your wallpaper…';
  try {
    await renderToCanvas(summary);
    status.textContent = '';
    document.getElementById('result').classList.add('visible');
    document.getElementById('result').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    status.textContent = 'Something went wrong — ' + e.message;
    console.error(e);
  }
  btn.disabled = false;
}

async function getSummary() {
  const names    = selected.map(r => r.n).join(', ');
  const meanings = selected.map(r => `${r.n} (${r.m})`).join('; ');
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{
        role:'user',
        content:`You are a thoughtful rune reader. The person has drawn three runes: ${names}.
Meanings: ${meanings}.
Write a daily reflection of exactly 2-3 sentences. Be poetic, grounded and personal in tone.
No headers, no bullet points. Keep it under 55 words total.`
      }]
    })
  });
  const data = await resp.json();
  return data.content.map(c => c.text||'').join('').trim();
}

function renderToCanvas(summary) {
  return new Promise((resolve, reject) => {
    const W = 585, H = 1266;
    const cv = document.getElementById('cv');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');

    document.fonts.ready.then(() => {
      draw(ctx, W, H, summary);
      try {
        // JPEG on a hosted URL works fine in Safari
        const dataUrl = cv.toDataURL('image/jpeg', 0.93);
        const img = document.getElementById('out-img');
        img.src = dataUrl;
        const dl = document.getElementById('dl-btn');
        dl.href = dataUrl;
        dl.download = 'rune-reading.jpg';
        resolve();
      } catch(e) { reject(e); }
    }).catch(reject);
  });
}

function draw(ctx, W, H, summary) {
  const cx = W / 2;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Radial glow
  const grd = ctx.createRadialGradient(cx, H*0.44, 0, cx, H*0.44, W*0.75);
  grd.addColorStop(0, 'rgba(184,168,130,0.05)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Date
  ctx.save();
  ctx.fillStyle = '#3a3830';
  ctx.font = '300 22px "Cormorant Garamond",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(dateStr.toUpperCase(), cx, 88);
  ctx.restore();

  // Top rule
  vertRule(ctx, cx, 110, 60);

  // Rune glyphs
  const runeY = H * 0.435;
  const sp = 120;
  const pos = [cx - sp, cx, cx + sp];

  ctx.save();
  ctx.font = '300 100px "Cormorant Garamond",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(232,228,220,0.92)';
  selected.forEach((r,i) => ctx.fillText(r.g, pos[i], runeY));
  ctx.restore();

  // Separator dots
  ctx.save();
  ctx.fillStyle = '#3a3830';
  dot(ctx, cx - sp/2, runeY - 28, 4);
  dot(ctx, cx + sp/2, runeY - 28, 4);
  ctx.restore();

  // Rune names
  const nameY = runeY + 70;
  ctx.save();
  ctx.font = '300 18px "Cormorant Garamond",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#b8a882';
  selected.forEach((r,i) => ctx.fillText(r.n.toUpperCase(), pos[i], nameY));
  ctx.restore();

  // Horizontal divider
  const divY = nameY + 36;
  ctx.save();
  ctx.strokeStyle = '#2e2c28';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 50, divY);
  ctx.lineTo(cx + 50, divY);
  ctx.stroke();
  ctx.restore();

  // Summary text
  ctx.save();
  ctx.font = 'italic 300 22px "Cormorant Garamond",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(232,228,220,0.48)';
  wrapText(ctx, summary, cx, divY + 30, W - 110, 36);
  ctx.restore();

  // Bottom rule
  vertRule(ctx, cx, H * 0.695, 60);

  // Bottom mark
  ctx.save();
  ctx.fillStyle = '#252420';
  ctx.font = '300 16px "Cormorant Garamond",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ᚠᚢᚦᚨᚱᚲ', cx, H - 70);
  ctx.restore();
}

function vertRule(ctx, cx, y, halfLen) {
  const grad = ctx.createLinearGradient(cx, y, cx, y + halfLen*2);
  grad.addColorStop(0,   'rgba(58,56,48,0)');
  grad.addColorStop(0.5, 'rgba(58,56,48,0.7)');
  grad.addColorStop(1,   'rgba(58,56,48,0)');
  ctx.save();
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, y);
  ctx.lineTo(cx, y + halfLen*2);
  ctx.stroke();
  ctx.restore();
}

function dot(ctx, x, y, r) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
}

function wrapText(ctx, text, x, y, maxWidth, lineH) {
  const words = text.split(' ');
  let line = '', ty = y;
  for (let i = 0; i < words.length; i++) {
    const test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, ty); line = words[i]; ty += lineH;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, ty);
}
</script>

</body>
</html>
