<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --fg: #ede9e0;
            --accent: #c9a96e;
            --dim: #3a3830;
            --dim2: #8a8070;
            --card: #15151e;
            --fg2: #b8b4aa;
            --nav-h: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; }

        /* --- Animations --- */
        @keyframes highlightPulse {
            0% { background: var(--card); }
            50% { background: rgba(201, 169, 110, 0.15); border-color: var(--accent); }
            100% { background: var(--card); }
        }
        .highlight-active { animation: highlightPulse 2s ease-in-out 2; border-color: var(--accent) !important; }

        /* --- Layout --- */
        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: calc(var(--nav-h) + 40px); opacity: 0; transition: opacity 0.3s; }
        .page.active { display: flex; }
        .page.shown { opacity: 1; }

        .page-header { text-align: center; padding: 60px 24px 30px; border-bottom: 1px solid var(--dim); }
        .page-header h1 { font-size: 13px; letter-spacing: 0.5em; text-transform: uppercase; color: var(--accent); font-weight: 300; }

        /* --- UI Elements --- */
        .section-label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim2); text-align: center; padding: 30px 20px 15px; }
        
        .mode-toggle { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .mode-btn { background: none; border: 1px solid var(--dim); color: var(--dim2); padding: 8px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 4px; }
        .mode-btn.active { border-color: var(--accent); color: var(--accent); }

        .action-btn { 
            width: 100%; background: none; border: 1px solid var(--accent); color: var(--accent); 
            padding: 18px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 12px;
            margin-top: 20px;
        }

        /* --- Insights & Stats --- */
        .insights-grid { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }
        .top-card { 
            background: var(--card); border: 1px solid var(--dim); border-radius: 12px; padding: 16px;
            display: flex; align-items: center; gap: 20px; cursor: pointer;
        }
        .top-glyph { font-size: 40px; width: 45px; text-align: center; }
        .top-info { flex: 1; }
        .top-name { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
        .top-meta { font-size: 11px; color: var(--dim2); font-style: italic; }
        
        .stats-list { padding: 20px 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-item { background: var(--card); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 13px; }

        /* --- History Deletion --- */
        .history-item { position: relative; background: #441111; overflow: hidden; border-bottom: 1px solid var(--dim); }
        .history-content { background: var(--bg); padding: 24px; position: relative; z-index: 2; transition: transform 0.3s; }
        .delete-reveal { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: #441111; color: #ff8888; border: none; font-size: 10px; text-transform: uppercase; z-index: 1; }

        /* --- Drawing --- */
        .reel-container { display: flex; justify-content: center; gap: 10px; margin: 40px 0; }
        .slot { width: 85px; height: 110px; background: var(--card); border: 1px solid var(--dim); border-radius: 6px; overflow: hidden; }
        .reel { display: flex; flex-direction: column; align-items: center; }
        .reel-unit { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 40px; }

        /* --- Nav --- */
        #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); display: flex; justify-content: center; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(21, 21, 30, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.2); border-radius: 40px; display: flex; padding: 5px; }
        .nav-btn { width: 65px; height: 50px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span:first-child { font-size: 18px; }
        .nav-btn span:last-child { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="page" id="page-home">
    <div class="page-header"><h1 id="date-display"></h1></div>
    <div style="text-align: center; padding: 40px 20px;">
        <div id="rotd-g" style="font-size: 80px; margin-bottom: 10px;"></div>
        <div id="rotd-n" style="font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 8px;"></div>
        <div id="rotd-m" style="font-style: italic; color: var(--dim2);"></div>
    </div>
    <div class="section-label">Begin Reading</div>
    <div style="padding: 0 16px; display: flex; flex-direction: column; gap: 12px;">
        <div class="top-card" onclick="navTo('reading'); switchMode('draw')">
            <div class="top-glyph">ᚱ</div>
            <div class="top-info"><div class="top-name">Draw Staves</div><div class="top-meta">Guided by the Norns</div></div>
        </div>
        <div class="top-card" onclick="navTo('reading'); switchMode('manual')">
            <div class="top-glyph">ᚦ</div>
            <div class="top-info"><div class="top-name">Manual Selection</div><div class="top-meta">Chosen with intent</div></div>
        </div>
    </div>
</div>

<div class="page" id="page-reading">
    <div class="page-header"><h1>The Reading</h1></div>
    <div class="mode-toggle">
        <button class="mode-btn active" id="btn-draw" onclick="switchMode('draw')">Draw</button>
        <button class="mode-btn" id="btn-manual" onclick="switchMode('manual')">Manual</button>
    </div>

    <div id="draw-area" style="padding: 0 20px;">
        <div class="reel-container">
            <div class="slot"><div class="reel" id="reel-0"></div></div>
            <div class="slot"><div class="reel" id="reel-1"></div></div>
            <div class="slot"><div class="reel" id="reel-2"></div></div>
        </div>
        <button class="action-btn" id="spin-btn" onclick="castRunes()">Cast the Runes</button>
    </div>

    <div id="manual-area" style="display:none; padding: 0 20px;">
        <div id="manual-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div>
    </div>

    <div id="reading-out" style="display:none; padding: 40px 20px; text-align: center;">
        <div id="reading-text" style="font-size: 18px; line-height: 1.8; font-style: italic; margin-bottom: 30px;"></div>
        <button class="mode-btn" onclick="generateWall()">Generate Wallpaper</button>
    </div>
</div>

<div class="page" id="page-history">
    <div class="page-header"><h1>Insights</h1></div>
    <div class="section-label">Top 3 Guides</div>
    <div id="top-insights" class="insights-grid"></div>
    
    <div class="section-label">Full Frequency</div>
    <div id="full-stats" class="stats-list"></div>

    <div class="section-label">History Journal</div>
    <div id="journal-list"></div>
</div>

<div class="page" id="page-library">
    <div class="page-header"><h1>Stave Guide</h1></div>
    <div id="guide-content" style="padding: 0 20px;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" onclick="navTo('home')"><span>ᚹ</span><span>Home</span></button>
        <button class="nav-btn" onclick="navTo('reading')"><span>ᚠ</span><span>Read</span></button>
        <button class="nav-btn" onclick="navTo('history')"><span>ᚻ</span><span>Stats</span></button>
        <button class="nav-btn" onclick="navTo('library')"><span>ᛉ</span><span>Guide</span></button>
    </div>
</div>

<canvas id="wall-cv"></canvas>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth, abundance, new beginnings'}, {g:'ᚢ',n:'Uruz',m:'Strength, vitality, primal power'},
        {g:'ᚦ',n:'Thurisaz',m:'Force, challenge, protection'}, {g:'ᚨ',n:'Ansuz',m:'Wisdom, communication, divine breath'},
        {g:'ᚱ',n:'Raidho',m:'Journey, movement, right action'}, {g:'ᚲ',n:'Kenaz',m:'Torch, knowledge, creative fire'},
        {g:'ᚷ',n:'Gebo',m:'Gift, generosity, partnership'}, {g:'ᚹ',n:'Wunjo',m:'Joy, harmony, fulfilment'},
        {g:'ᚺ',n:'Hagalaz',m:'Hail, disruption, transformation'}, {g:'ᚾ',n:'Naudhiz',m:'Need, constraint, endurance'},
        {g:'ᛁ',n:'Isa',m:'Ice, stillness, patience'}, {g:'ᛃ',n:'Jera',m:'Harvest, cycles, reward in time'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance, continuity'}, {g:'ᛈ',n:'Perthro',m:'Fate, mystery, hidden things'},
        {g:'ᛉ',n:'Algiz',m:'Protection, instinct, guidance'}, {g:'ᛊ',n:'Sowilo',m:'Sun, victory, clarity'},
        {g:'ᛏ',n:'Tiwaz',m:'Justice, courage, sacrifice'}, {g:'ᛒ',n:'Berkano',m:'Growth, nurturing, new life'},
        {g:'ᛖ',n:'Ehwaz',m:'Trust, partnership, progress'}, {g:'ᛗ',n:'Mannaz',m:'Humanity, self, community'},
        {g:'ᛚ',n:'Laguz',m:'Water, flow, intuition'}, {g:'ᛜ',n:'Ingwaz',m:'Fertility, potential, inner work'},
        {g:'ᛞ',n:'Dagaz',m:'Dawn, breakthrough, transformation'}, {g:'ᛟ',n:'Othala',m:'Heritage, home, what you protect'}
    ];

    // Audio Context
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTick() {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'shown'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const target = document.getElementById('page-' + id);
        target.classList.add('active');
        setTimeout(() => target.classList.add('shown'), 50);
        
        if(id === 'history') renderHistory();
        if(id === 'library') buildLibrary();
    }

    function switchMode(mode) {
        document.getElementById('draw-area').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('manual-area').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('btn-draw').className = 'mode-btn ' + (mode === 'draw' ? 'active' : '');
        document.getElementById('btn-manual').className = 'mode-btn ' + (mode === 'manual' ? 'active' : '');
        if(mode === 'manual') buildManualGrid();
    }

    function castRunes() {
        const picks = [];
        for(let i=0; i<3; i++) {
            const r = document.getElementById('reel-' + i);
            r.innerHTML = '';
            for(let j=0; j<20; j++) {
                const div = document.createElement('div'); div.className = 'reel-unit';
                div.textContent = RUNES[Math.floor(Math.random()*24)].g; r.appendChild(div);
            }
            const win = RUNES[Math.floor(Math.random()*24)];
            picks.push(win);
            const last = document.createElement('div'); last.className = 'reel-unit';
            last.textContent = win.g; r.appendChild(last);
            
            r.style.transition = 'none'; r.style.transform = 'translateY(0)';
            setTimeout(() => {
                r.style.transition = `transform ${2 + i}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                r.style.transform = `translateY(-${20 * 110}px)`;
            }, 50);
        }
        
        const tickInt = setInterval(playTick, 150);
        setTimeout(() => {
            clearInterval(tickInt);
            const res = `${picks[0].m}, through ${picks[1].m.toLowerCase()}, results in ${picks[2].m.toLowerCase()}.`;
            document.getElementById('reading-text').textContent = res;
            document.getElementById('reading-out').style.display = 'block';
            saveHistory(picks, res);
        }, 4000);
    }

    function jumpToRune(name) {
        navTo('library');
        setTimeout(() => {
            const el = document.getElementById('lib-' + name);
            if(el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('highlight-active');
                setTimeout(() => el.classList.remove('highlight-active'), 4000);
            }
        }, 350);
    }

    function saveHistory(runes, text) {
        let h = JSON.parse(localStorage.getItem('rune_history') || '[]');
        h.unshift({ id: Date.now(), runes, text, date: new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}) });
        localStorage.setItem('rune_history', JSON.stringify(h.slice(0, 50)));
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('rune_history') || '[]');
        const counts = {};
        h.forEach(x => x.runes.forEach(r => counts[r.n] = (counts[r.n] || 0) + 1));
        
        // Top 3
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 3);
        const topCont = document.getElementById('top-insights');
        topCont.innerHTML = '';
        sorted.forEach(([name, count]) => {
            const r = RUNES.find(x => x.n === name);
            const div = document.createElement('div'); div.className = 'top-card';
            div.onclick = () => jumpToRune(name);
            div.innerHTML = `<div class="top-glyph">${r.g}</div><div class="top-info"><div class="top-name">${r.n}</div><div class="top-meta">${count} Draws · ${r.m}</div></div>`;
            topCont.appendChild(div);
        });

        // Full Stats
        const fullCont = document.getElementById('full-stats');
        fullCont.innerHTML = '';
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'stat-item';
            div.innerHTML = `<span>${r.g} ${r.n}</span><span>${counts[r.n] || 0}</span>`;
            fullCont.appendChild(div);
        });

        // Journal
        const jCont = document.getElementById('journal-list');
        jCont.innerHTML = h.length ? '' : '<div class="section-label">No history yet</div>';
        h.forEach(item => {
            const wrap = document.createElement('div'); wrap.className = 'history-item';
            wrap.innerHTML = `
                <button class="delete-reveal" onclick="deleteReading(${item.id})">Delete</button>
                <div class="history-content">
                    <div style="font-size: 10px; color: var(--dim2); margin-bottom: 8px;">${item.date}</div>
                    <div style="font-size: 20px; letter-spacing: 12px; margin-bottom: 10px;">
                        ${item.runes.map(r => `<span onclick="event.stopPropagation(); jumpToRune('${r.n}')">${r.g}</span>`).join('')}
                    </div>
                    <div style="color: var(--fg2); line-height: 1.5;">${item.text}</div>
                </div>`;
            
            let startX;
            const content = wrap.querySelector('.history-content');
            wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; content.style.transition = 'none'; }, {passive:true});
            wrap.addEventListener('touchmove', e => {
                let diff = startX - e.touches[0].clientX;
                if(diff > 0) content.style.transform = `translateX(-${Math.min(diff, 85)}px)`;
            }, {passive:true});
            wrap.addEventListener('touchend', e => {
                content.style.transition = 'transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.1)';
                if(startX - e.changedTouches[0].clientX > 40) content.style.transform = 'translateX(-80px)';
                else content.style.transform = 'translateX(0)';
            });
            jCont.appendChild(wrap);
        });
    }

    function deleteReading(id) {
        let h = JSON.parse(localStorage.getItem('rune_history') || '[]');
        h = h.filter(x => x.id !== id);
        localStorage.setItem('rune_history', JSON.stringify(h));
        renderHistory();
    }

    function buildLibrary() {
        const cont = document.getElementById('guide-content'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'top-card'; div.id = 'lib-' + r.n;
            div.style.marginBottom = '12px';
            div.innerHTML = `<div class="top-glyph">${r.g}</div><div class="top-info"><div class="top-name">${r.n}</div><div class="top-meta">${r.m}</div></div>`;
            cont.appendChild(div);
        });
    }

    // Init Home
    const rotd = RUNES[Math.floor(Math.random()*24)];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-GB', {weekday: 'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
