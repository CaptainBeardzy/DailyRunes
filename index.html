<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #1a1a24; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --red-dim: #551a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; overflow-x: hidden; }

        #nav { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(26, 26, 36, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.15); border-radius: 50px; display: flex; padding: 8px 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .nav-btn { width: 60px; height: 55px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 18px; margin-bottom: 2px; }
        .nav-btn .txt { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: 160px; }
        .page.active { display: flex; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .home-hero { text-align: center; padding: 60px 24px 40px; }
        .date-display { font-size: 11px; letter-spacing: 0.5em; color: var(--fg); text-transform: uppercase; margin-bottom: 50px; opacity: 0.8; }
        .rotd-glyph { font-size: 110px; color: var(--fg); margin-bottom: 15px; }
        .rotd-name { font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5em; margin-bottom: 8px; }

        .action-card { background: var(--dim); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin: 0 20px 15px; padding: 30px 25px; cursor: pointer; }
        
        .reel-container { display: flex; justify-content: center; gap: 15px; margin: 40px 0; height: 130px; }
        .slot { width: 95px; height: 130px; background: var(--dim); border: 1px solid rgba(201,169,110,0.1); border-radius: 12px; overflow: hidden; }
        .reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .reel-unit { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; color: var(--fg); }

        .manual-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 20px; }
        .manual-item { background: var(--dim); border: 1px solid transparent; border-radius: 8px; padding: 15px 0; text-align: center; font-size: 20px; }
        .manual-item.selected { border-color: var(--accent); background: rgba(201,169,110,0.1); }

        .forge-container { position: relative; width: 300px; height: 300px; margin: 20px auto; background: radial-gradient(circle, #1a1a24 0%, #0d0d12 100%); border-radius: 50%; }
        .forge-rune { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 150px; color: var(--accent); opacity: 0.5; mix-blend-mode: screen; pointer-events: none; }

        .stat-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim2); margin: 30px 20px 15px; display: block; }
        .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 20px; }
        .grid-stat-box { background: var(--dim); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }

        .history-item { position: relative; overflow: hidden; background: var(--bg); border-bottom: 1px solid var(--dim); }
        .history-content { position: relative; z-index: 10; background: var(--bg); padding: 25px 20px; transition: transform 0.3s; }
        .history-delete { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--red-dim); color: #ff9999; display: flex; align-items: center; justify-content: center; font-size: 10px; text-transform: uppercase; z-index: 1; }

        .guide-item { border-bottom: 1px solid var(--dim); padding: 25px 20px; }
        .guide-desc { max-height: 0; overflow: hidden; transition: max-height 0.4s; color: var(--fg2); line-height: 1.7; }
        .guide-item.open .guide-desc { max-height: 500px; margin-top: 15px; }

        .btn-main { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 20px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 11px; margin: 20px; cursor: pointer; }
        .btn-main:disabled { opacity: 0.2; }
    </style>
</head>
<body>

<div class="page" id="page-home">
    <div class="home-hero">
        <div class="date-display" id="date-now">THURSDAY 19 MARCH</div>
        <div class="rotd-glyph" id="rotd-g">ᛗ</div>
        <div class="rotd-name" id="rotd-n">MANNAZ</div>
        <div style="font-size:14px; font-style:italic; color:var(--dim2);">Humanity, self, community</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('draw')">
        <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px; color:var(--accent)">Draw Staves</div>
        <div style="font-size:11px; color:var(--dim2); font-style:italic;">Let the Norns guide your hand</div>
    </div>
    <div class="action-card" onclick="navTo('reading'); setReadMode('manual')">
        <div style="text-transform:uppercase; letter-spacing:2px; font-size:14px; color:var(--accent)">Manual Selection</div>
        <div style="font-size:11px; color:var(--dim2); font-style:italic;">Choose with conscious intent</div>
    </div>
</div>

<div class="page" id="page-reading">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:11px; letter-spacing:0.5em; text-transform:uppercase; color:var(--accent); margin-bottom:40px;">The Oracle</h2>
        <div id="draw-ui">
            <div class="reel-container" id="reel-wrap"></div>
            <button class="btn-main" id="cast-btn" onclick="startCast()">Cast the Runes</button>
        </div>
        <div id="manual-ui" style="display:none;">
            <div class="manual-grid" id="manual-grid"></div>
            <button class="btn-main" id="manual-submit" onclick="submitManual()" disabled>Select 3 Staves</button>
        </div>
        <div id="reveal-ui" style="display:none;">
            <div id="reveal-glyphs" style="display:flex; justify-content:center; gap:20px; margin-bottom:40px;"></div>
            <div id="reveal-text" style="font-size:17px; font-style:italic; line-height:1.8; color:var(--fg2); padding:0 20px; margin-bottom:40px;"></div>
            <button class="btn-main" onclick="resetReader()">Reset Session</button>
        </div>
    </div>
</div>

<div class="page" id="page-forge">
    <div style="padding: 60px 20px 0; text-align:center;">
        <h2 style="font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:var(--accent);">Bindrune Forge</h2>
        <div class="forge-container" id="forge-canvas"></div>
        <div id="forge-picker" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px; padding:20px;"></div>
        <button class="btn-main" onclick="forgeSet = []; updateForge();">Clear Forge</button>
    </div>
</div>

<div class="page" id="page-history">
    <div style="padding-top:60px;">
        <span class="stat-label">Full Futhark Census</span>
        <div class="full-grid" id="full-rune-stats"></div>
        <span class="stat-label">Past Readings (Swipe to Delete)</span>
        <div id="history-list"></div>
    </div>
</div>

<div class="page" id="page-library">
    <div id="guide-list" style="padding:60px 0;"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚱ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth',l:'Wealth and creative fire. It represents prosperity, mobility, and the energy required to maintain success. It warns that wealth is a flow, not a hoard.'},
        {g:'ᚢ',n:'Uruz',m:'Vitality',l:'The primal strength of the wild ox. Represents physical health, raw potential, and the courage to face inevitable change or growth.'},
        {g:'ᚦ',n:'Thurisaz',m:'Force',l:'The thorn or giant. A reactive power of defense and conflict. It is a boundary-setter that warns of danger while providing the force to resist it.'},
        {g:'ᚨ',n:'Ansuz',m:'Insight',l:'The breath of the gods. Rules communication, signals, and ancestral wisdom. It suggests a time to listen to omens and higher voices.'},
        {g:'ᚱ',n:'Raidho',m:'Direction',l:'The wheel and the journey. Represents rhythm, justice, and the rational movement of the soul towards its intended destination.'},
        {g:'ᚲ',n:'Kenaz',m:'Clarity',l:'The controlled fire of the torch. It represents technical skill, knowledge, and the artistic spark that brings light to dark places.'},
        {g:'ᚷ',n:'Gebo',m:'Exchange',l:'A gift for a gift. Signifies the sacred bond between individuals and the harmony required in any equal partnership or sacrifice.'},
        {g:'ᚹ',n:'Wunjo',m:'Harmony',l:'The peak of joy and well-being. It represents the moment when one\'s internal will is perfectly aligned with the external universe.'},
        {g:'ᚺ',n:'Hagalaz',m:'Evolution',l:'The hailstone. Necessary disruption and crisis. It clears away stagnant patterns to allow for a new, stronger formation.'},
        {g:'ᚾ',n:'Naudhiz',m:'Resilience',l:'Innovation born of friction. The "need-fire" that forces us to adapt, find strength in hardship, and overcome limits.'},
        {g:'ᛁ',n:'Isa',m:'Stillness',l:'The ice block. A period of total stasis where outward progress is frozen so that internal clarity and concentration can form.'},
        {g:'ᛃ',n:'Jera',m:'Cycles',l:'The harvest and natural reward. It reminds us that patient effort in the right season leads to inevitable and fruitful results.'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance',l:'The Yew tree. It connects the vertical axis of the world, representing continuity, protection, and the ability to endure life\'s transitions.'},
        {g:'ᛈ',n:'Perthro',m:'Destiny',l:'The dice cup of the Norns. Rules the hidden laws of probability, cosmic luck, and the mysteries that govern what is yet to be revealed.'},
        {g:'ᛉ',n:'Algiz',m:'Guard',l:'The elk-sedge or shield. It is the protective instinct and higher spirit connection that shields one from physical and spiritual harm.'},
        {g:'ᛊ',n:'Sowilo',m:'Success',l:'The rays of the sun. Vitality, victory, and the light that burns away shadows. It provides the energy needed to complete any task.'},
        {g:'ᛏ',n:'Tiwaz',m:'Honor',l:'The warrior\'s spear. It represents sacrifice for the greater good, leadership, integrity, and the courage to act with justice.'},
        {g:'ᛒ',n:'Berkano',m:'Growth',l:'The birch tree. The energy of the womb—nurturing, healing, and bringing new life or creative ideas into physical bloom.'},
        {g:'ᛖ',n:'Ehwaz',m:'Synergy',l:'The horse and rider. Progress achieved through mutual trust, partnership, and the harmonious movement of two distinct forces.'},
        {g:'ᛗ',n:'Identity',m:'Mannaz',l:'The individual within the tribe. It represents human consciousness, social bonds, and the realization of one\'s true self.'},
        {g:'ᛚ',n:'Laguz',m:'Intuition',l:'The flow of water. Rules the deep emotions, the subconscious mind, and the fluid, ever-changing nature of our perceived reality.'},
        {g:'ᛜ',n:'Ingwaz',m:'Potential',l:'The seed. Represents stored potential and the need for a period of rest and protection before an idea can burst into life.'},
        {g:'ᛞ',n:'Dagaz',m:'Awakening',l:'The light of dawn. A radical breakthrough where a total transformation of perspective leads to absolute clarity.'},
        {g:'ᛟ',n:'Legacy',m:'Heritage',l:'Ancestral home and spiritual land. Represents the foundations we build and the lasting inheritances we leave for the future.'},
        {g:'◯',n:'Wyrd',m:'Fate',l:'The Blank Rune. It represents the unknowable, the absolute void, and the destiny that has not yet been written by the Norns.'}
    ];

    let forgeSet = [];
    let manualSet = [];
    let stats = JSON.parse(localStorage.getItem('rune_stats') || '{}');
    let history = JSON.parse(localStorage.getItem('rune_hist') || '[]');

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelector(`[data-id="${id}"]`).classList.add('active');
        if(id === 'reading') setReadMode('draw');
        if(id === 'forge') initForge();
        if(id === 'history') renderStats();
        if(id === 'library') renderGuide();
    }

    function setReadMode(mode) {
        document.getElementById('draw-ui').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('manual-ui').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('reveal-ui').style.display = 'none';
        if(mode === 'draw') {
            const wrap = document.getElementById('reel-wrap'); wrap.innerHTML = '';
            for(let i=0; i<3; i++) {
                const slot = document.createElement('div'); slot.className = 'slot';
                const reel = document.createElement('div'); reel.className = 'reel'; reel.id = `r${i}`;
                for(let j=0; j<40; j++) {
                    const unit = document.createElement('div'); unit.className = 'reel-unit';
                    unit.textContent = RUNES[Math.floor(Math.random()*25)].g;
                    reel.appendChild(unit);
                }
                slot.appendChild(reel); wrap.appendChild(slot);
            }
        } else {
            const grid = document.getElementById('manual-grid'); grid.innerHTML = ''; manualSet = [];
            RUNES.forEach(r => {
                const item = document.createElement('div'); item.className = 'manual-item';
                item.textContent = r.g;
                item.onclick = () => {
                    if(manualSet.includes(r)) { manualSet = manualSet.filter(x=>x!==r); item.classList.remove('selected'); }
                    else if(manualSet.length < 3) { manualSet.push(r); item.classList.add('selected'); }
                    document.getElementById('manual-submit').disabled = manualSet.length !== 3;
                };
                grid.appendChild(item);
            });
        }
    }

    function startCast() {
        document.getElementById('cast-btn').disabled = true;
        const picks = [];
        for(let i=0; i<3; i++) {
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            const r = document.getElementById('r'+i);
            r.lastChild.textContent = win.g; 
            r.style.transform = `translateY(-${39 * 130}px)`;
        }
        setTimeout(() => processReading(picks), 3600);
    }

    function submitManual() { processReading(manualSet); }

    function processReading(runes) {
        document.getElementById('draw-ui').style.display = 'none';
        document.getElementById('manual-ui').style.display = 'none';
        const container = document.getElementById('reveal-glyphs'); container.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.style.fontSize = '45px'; d.textContent = r.g; container.appendChild(d);
            stats[r.n] = (stats[r.n] || 0) + 1;
        });
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        const dateStr = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}).toUpperCase();
        const textStr = `The presence of ${runes[0].n} (${runes[0].m}) suggests a foundation established, while the friction of ${runes[1].n} (${runes[1].m}) acts as the catalyst for change, eventually manifesting in the clarity of ${runes[2].n} (${runes[2].m}). Trust the unfolding process.`;
        history.unshift({ date: dateStr, names: runes.map(r=>r.n), glyphs: runes.map(p=>p.g).join(' · '), text: textStr });
        localStorage.setItem('rune_hist', JSON.stringify(history.slice(0, 30)));
        document.getElementById('reveal-text').textContent = textStr;
        document.getElementById('reveal-ui').style.display = 'block';
    }

    function resetReader() { setReadMode('draw'); document.getElementById('cast-btn').disabled = false; }

    function initForge() {
        const p = document.getElementById('forge-picker'); if(p.children.length > 0) return;
        RUNES.forEach(r => {
            const b = document.createElement('div'); b.style.cssText = "background:var(--dim); padding:10px; border-radius:8px; text-align:center; font-size:20px;";
            b.textContent = r.g;
            b.onclick = () => {
                if(forgeSet.includes(r)) forgeSet = forgeSet.filter(x=>x!==r);
                else if(forgeSet.length < 4) forgeSet.push(r);
                updateForge();
            };
            p.appendChild(b);
        });
    }

    function updateForge() {
        const cv = document.getElementById('forge-canvas'); cv.innerHTML = '';
        forgeSet.forEach((r, i) => {
            const el = document.createElement('div'); el.className = 'forge-rune'; el.textContent = r.g;
            el.style.transform = `translate(-50%, -50%) scale(${1 - (i*0.05)})`;
            el.style.opacity = 0.3 + (i * 0.2);
            cv.appendChild(el);
        });
    }

    function renderStats() {
        const census = document.getElementById('full-rune-stats'); census.innerHTML = '';
        RUNES.forEach(r => {
            const count = stats[r.n] || 0;
            census.innerHTML += `<div class="grid-stat-box"><span>${r.g}</span><span style="font-size:10px; opacity:0.4">${r.n}</span><span style="color:var(--accent); font-weight:bold;">${count}</span></div>`;
        });

        const hList = document.getElementById('history-list'); hList.innerHTML = '';
        history.forEach((h, idx) => {
            const item = document.createElement('div'); item.className = 'history-item';
            item.innerHTML = `<div class="history-delete" onclick="deleteHistory(${idx})">Delete</div>
                <div class="history-content">
                    <div style="font-size:10px; color:var(--accent); margin-bottom:5px;">${h.date}</div>
                    <div style="font-size:20px; letter-spacing:6px; margin-bottom:8px;">${h.glyphs}</div>
                    <div style="font-size:13px; font-style:italic; opacity:0.7; line-height:1.4;">${h.text}</div>
                </div>`;
            let startX = 0; const content = item.querySelector('.history-content');
            content.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            content.addEventListener('touchmove', e => {
                let diff = e.touches[0].clientX - startX;
                if(diff < 0 && diff > -100) content.style.transform = `translateX(${diff}px)`;
            });
            content.addEventListener('touchend', e => {
                let diff = e.touches[0].clientX - startX;
                content.style.transform = diff < -40 ? 'translateX(-80px)' : 'translateX(0)';
            });
            hList.appendChild(item);
        });
    }

    function deleteHistory(idx) {
        const item = history[idx];
        // Linked Stat Deletion Logic
        item.names.forEach(name => {
            if(stats[name] > 0) stats[name]--;
        });
        history.splice(idx,1);
        localStorage.setItem('rune_hist', JSON.stringify(history));
        localStorage.setItem('rune_stats', JSON.stringify(stats));
        renderStats();
    }

    function renderGuide() {
        const cont = document.getElementById('guide-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-item';
            div.innerHTML = `<div style="display:flex; align-items:center; gap:25px;" onclick="this.parentElement.classList.toggle('open')">
                <span style="font-size:38px; color:var(--accent)">${r.g}</span>
                <div><div style="text-transform:uppercase; letter-spacing:2px; font-size:15px;">${r.n}</div><div style="font-size:12px; color:var(--dim2);">${r.m}</div></div>
            </div><div class="guide-desc">${r.l}</div>`;
            cont.appendChild(div);
        });
    }

    document.getElementById('date-now').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
