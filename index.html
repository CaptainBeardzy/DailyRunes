<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rune Guide & Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12; --fg: #ede9e0; --accent: #c9a96e;
            --dim: #3a3830; --dim2: #8a8070; --card: #15151e;
            --fg2: #b8b4aa; --nav-h: 80px; --delete: #441111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--fg); font-family: 'Cormorant Garamond', serif; overscroll-behavior: none; }

        .page { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: calc(var(--nav-h) + 60px); opacity: 0; transition: opacity 0.3s; }
        .page.active { display: flex; }
        .page.shown { opacity: 1; }

        .page-header { text-align: center; padding: 60px 24px 30px; border-bottom: 1px solid var(--dim); }
        .page-header h1 { font-size: 13px; letter-spacing: 0.5em; text-transform: uppercase; color: var(--accent); font-weight: 300; }
        .section-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim2); text-align: center; padding: 30px 20px 15px; }

        /* Navigation */
        #nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); display: flex; justify-content: center; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-pill { background: rgba(21, 21, 30, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(201,169,110,0.2); border-radius: 40px; display: flex; padding: 5px; }
        .nav-btn { width: 60px; height: 52px; background: none; border: none; color: var(--dim2); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn .icon { font-size: 18px; }
        .nav-btn .txt { font-size: 7px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

        /* Bindrune Forge */
        .forge-canvas { width: 300px; height: 300px; background: var(--card); margin: 20px auto; border: 1px solid var(--dim); border-radius: 50%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .forge-rune { position: absolute; font-size: 120px; transition: 0.3s cubic-bezier(0.1, 0, 0.1, 1); mix-blend-mode: screen; color: var(--accent); opacity: 0.8; }
        .forge-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px; }
        .forge-btn { background: var(--card); border: 1px solid var(--dim); padding: 10px; font-size: 18px; border-radius: 4px; color: var(--fg2); }
        .forge-btn.active { border-color: var(--accent); color: var(--accent); }

        /* Achievements */
        .achieve-grid { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .achieve-item { background: var(--card); border: 1px solid var(--dim); padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; opacity: 0.4; transition: 0.3s; }
        .achieve-item.unlocked { opacity: 1; border-color: var(--accent); }
        .achieve-icon { font-size: 24px; color: var(--accent); width: 30px; text-align: center; }
        .achieve-info h4 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
        .achieve-info p { font-size: 11px; color: var(--dim2); }

        /* General Utilities */
        .top-card { background: var(--card); border: 1px solid var(--dim); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 20px; margin: 0 16px 12px; }
        .action-btn { width: calc(100% - 40px); background: none; border: 1px solid var(--accent); color: var(--accent); padding: 18px; text-transform: uppercase; letter-spacing: 0.3em; font-size: 12px; margin: 20px; cursor: pointer; }
        .reel-container { display: flex; justify-content: center; gap: 12px; margin: 40px 0; }
        .slot { width: 85px; height: 115px; background: var(--card); border: 1px solid var(--dim); border-radius: 6px; overflow: hidden; }
        .reel-unit { height: 115px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
        .result-runes { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .result-rune-card { background: var(--card); border: 1px solid var(--dim); width: 90px; padding: 20px 0; border-radius: 8px; text-align: center; }
        .result-rune-card .glyph { font-size: 36px; display: block; color: var(--fg); }
        .result-rune-card .name { font-size: 9px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; margin-top: 8px; }
        .lore-box { display: none; padding-top: 15px; font-size: 16px; color: var(--fg2); font-style: italic; }
        .lore-box.open { display: block; }
        .guide-entry { border-bottom: 1px solid var(--dim); padding: 24px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="page" id="page-home">
    <div class="page-header"><h1 id="home-date"></h1></div>
    <div style="text-align: center; padding: 50px 24px;">
        <div id="rotd-g" style="font-size: 100px; margin-bottom: 10px;"></div>
        <div id="rotd-n" style="font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4em;"></div>
        <div id="rotd-m" style="font-style: italic; color: var(--dim2); margin-top: 10px;"></div>
    </div>
    <div class="section-label">Consult the Oracle</div>
    <div class="top-card" onclick="navTo('reading')">
        <div style="font-size: 30px;">ᚠ</div>
        <div><div style="text-transform: uppercase; color: var(--accent); font-size: 14px;">Cast Runes</div><div style="font-size: 11px; color: var(--dim2);">Draw or Manual Selection</div></div>
    </div>
    <div class="top-card" onclick="navTo('forge')">
        <div style="font-size: 30px;">ᛉ</div>
        <div><div style="text-transform: uppercase; color: var(--accent); font-size: 14px;">Bindrune Forge</div><div style="font-size: 11px; color: var(--dim2);">Create custom talismans</div></div>
    </div>
</div>

<div class="page" id="page-reading">
    <div class="page-header"><h1>The Reading</h1></div>
    <div id="read-modes" class="section-label" style="display:flex; justify-content:center; gap:20px; cursor:pointer;">
        <span onclick="switchReadMode('draw')" id="tab-draw" style="color:var(--accent)">DRAW</span>
        <span onclick="switchReadMode('manual')" id="tab-manual" style="color:var(--dim2)">MANUAL</span>
    </div>

    <div id="area-draw">
        <div class="reel-container">
            <div class="slot"><div class="reel" id="r0"></div></div>
            <div class="slot"><div class="reel" id="r1"></div></div>
            <div class="slot"><div class="reel" id="r2"></div></div>
        </div>
        <button class="action-btn" onclick="startCast()">Cast the Runes</button>
    </div>

    <div id="area-manual" style="display:none;">
        <div id="manual-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:20px;"></div>
        <button class="action-btn" id="manual-submit" onclick="submitManual()" style="opacity:0.3; pointer-events:none;">Select 3</button>
    </div>

    <div id="reading-reveal" style="display:none; padding: 40px 24px; text-align: center;">
        <div id="reveal-visuals" class="result-runes"></div>
        <div id="read-text" style="font-size: 20px; line-height: 1.8; font-style: italic; color: var(--fg2); margin-bottom: 30px;"></div>
        <button class="action-btn" onclick="location.reload()">Reset</button>
    </div>
</div>

<div class="page" id="page-forge">
    <div class="page-header"><h1>Bindrune Forge</h1></div>
    <div class="forge-canvas" id="forge-canvas"></div>
    <div class="section-label">Select Components</div>
    <div class="forge-controls" id="forge-pickers"></div>
    <div class="section-label">Auto-Smart Layout</div>
    <div style="display:flex; justify-content:center; gap:10px; padding:0 20px;">
        <button class="forge-btn" style="flex:1; font-size:12px;" onclick="arrangeForge('center')">Center Stack</button>
        <button class="forge-btn" style="flex:1; font-size:12px;" onclick="arrangeForge('cross')">Solar Cross</button>
    </div>
    <button class="action-btn" onclick="checkAchieve('Blacksmith')">Finalize Talisman</button>
</div>

<div class="page" id="page-history">
    <div class="page-header"><h1>Achievements</h1></div>
    <div class="achieve-grid" id="achieve-list"></div>
    <div class="section-label">Statistics</div>
    <div id="top-insights"></div>
</div>

<div class="page" id="page-library">
    <div class="page-header"><h1>Stave Guide</h1></div>
    <div id="lib-list"></div>
</div>

<div id="nav">
    <div class="nav-pill">
        <button class="nav-btn active" data-id="home" onclick="navTo('home')"><span class="icon">ᚹ</span><span class="txt">Home</span></button>
        <button class="nav-btn" data-id="reading" onclick="navTo('reading')"><span class="icon">ᚠ</span><span class="txt">Read</span></button>
        <button class="nav-btn" data-id="forge" onclick="navTo('forge')"><span class="icon">ᛉ</span><span class="txt">Forge</span></button>
        <button class="nav-btn" data-id="history" onclick="navTo('history')"><span class="icon">ᚻ</span><span class="txt">Stats</span></button>
        <button class="nav-btn" data-id="library" onclick="navTo('library')"><span class="icon">ᛒ</span><span class="txt">Guide</span></button>
    </div>
</div>

<script>
    const RUNES = [
        {g:'ᚠ',n:'Fehu',m:'Wealth, abundance, new beginnings', l:'Fehu represents movable wealth and the creative fire that sparks action.'},
        {g:'ᚢ',n:'Uruz',m:'Strength, vitality, primal power', l:'The wild ox. It represents primal strength and untamed potential.'},
        {g:'ᚦ',n:'Thurisaz',m:'Force, challenge, protection', l:'The thorn or the giant. A reactive force of defense and conflict.'},
        {g:'ᚨ',n:'Ansuz',m:'Wisdom, communication, divine breath', l:'The mouth of the divine. Represents messages and ancestral wisdom.'},
        {g:'ᚱ',n:'Raidho',m:'Journey, movement, right action', l:'The wheel. It signifies rationality and the rhythm of the journey.'},
        {g:'ᚲ',n:'Kenaz',m:'Torch, knowledge, creative fire', l:'The beacon. Enlightenment and the controlled fire of the artist.'},
        {g:'ᚷ',n:'Gebo',m:'Gift, generosity, partnership', l:'Honor, exchange, and the vital balance of giving and receiving.'},
        {g:'ᚹ',n:'Wunjo',m:'Joy, harmony, fulfilment', l:'Contentment and the removal of sorrows through alignment.'},
        {g:'ᚺ',n:'Hagalaz',m:'Hail, disruption, transformation', l:'Destructive forces outside control that clear the way for new growth.'},
        {g:'ᚾ',n:'Naudhiz',m:'Need, constraint, endurance', l:'The friction of necessity providing the spark for innovation.'},
        {g:'ᛁ',n:'Isa',m:'Ice, stillness, patience', l:'A period of stasis requiring inner focus and waiting.'},
        {g:'ᛃ',n:'Jera',m:'Harvest, cycles, reward', l:'The natural and just outcome of effort over time.'},
        {g:'ᛇ',n:'Eihwaz',m:'Endurance, continuity, the Yew', l:'Connection between life and death and the vertical axis.'},
        {g:'ᛈ',n:'Perthro',m:'Fate, mystery, hidden laws', l:'The dice cup. Represents chance and the laws of probability.'},
        {g:'ᛉ',n:'Algiz',m:'Protection, instinct, guidance', l:'Higher spiritual protection and following soul instinct.'},
        {g:'ᛊ',n:'Sowilo',m:'Sun, victory, clarity', l:'Solar power and vitality that reveals the path forward.'},
        {g:'ᛏ',n:'Tiwaz',m:'Justice, courage, sacrifice', l:'Integrity and self-sacrifice for the greater good.'},
        {g:'ᛒ',n:'Berkano',m:'Growth, nurturing, new life', l:'Rebirth and the nurturing energy of a mother.'},
        {g:'ᛖ',n:'Ehwaz',m:'Trust, partnership, progress', l:'Harmonious relationship creating steady movement.'},
        {g:'ᛗ',n:'Mannaz',m:'Humanity, self, community', l:'Self-realization and our connection to the collective.'},
        {g:'ᛚ',n:'Laguz',m:'Water, flow, intuition', l:'The deep ocean. Emotions and the collective unconscious.'},
        {g:'ᛜ',n:'Ingwaz',m:'Fertility, potential, inner rest', l:'Energy stored up before an explosive release of growth.'},
        {g:'ᛞ',n:'Dagaz',m:'Dawn, breakthrough, awakening', l:'Daylight. A radical change of perspective and truth.'},
        {g:'ᛟ',n:'Othala',m:'Heritage, home, protection', l:'Ancestral land and what we leave behind for others.'},
        {g:'O',n:'Wyrd (Blank)',m:'The Unknown, Fate', l:'The cosmic void and the absolute power of the unknown.'}
    ];

    const ACHIEVEMENTS = [
        {id:'FirstDraw', n:'The Seeker', d:'Cast your first reading.', icon:'ᛃ'},
        {id:'StatTrack', n:'The Observer', d:'Open the Stats page 5 times.', icon:'ᚻ'},
        {id:'Blacksmith', n:'The Forge-Master', d:'Create your first bindrune.', icon:'ᛉ'},
        {id:'Historian', n:'The Sage', d:'Read 10 full stave descriptions.', icon:'ᛒ'}
    ];

    let forgeLayers = [];
    let manualPicks = [];

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'shown'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const target = document.getElementById('page-' + id);
        target.classList.add('active');
        document.querySelector(`.nav-btn[data-id="${id}"]`).classList.add('active');
        setTimeout(() => target.classList.add('shown'), 50);
        if(id === 'history') renderHistory();
        if(id === 'forge') initForge();
        if(id === 'library') buildLibrary();
    }

    function switchReadMode(mode) {
        document.getElementById('area-draw').style.display = mode === 'draw' ? 'block' : 'none';
        document.getElementById('area-manual').style.display = mode === 'manual' ? 'block' : 'none';
        document.getElementById('tab-draw').style.color = mode === 'draw' ? 'var(--accent)' : 'var(--dim2)';
        document.getElementById('tab-manual').style.color = mode === 'manual' ? 'var(--accent)' : 'var(--dim2)';
        if(mode === 'manual') buildManualGrid();
    }

    // --- Forge Logic ---
    function initForge() {
        const picker = document.getElementById('forge-pickers');
        if(picker.children.length > 0) return;
        RUNES.forEach((r, idx) => {
            const btn = document.createElement('button');
            btn.className = 'forge-btn'; btn.textContent = r.g;
            btn.onclick = () => toggleForgeRune(r, btn);
            picker.appendChild(btn);
        });
    }

    function toggleForgeRune(rune, btn) {
        const existingIdx = forgeLayers.findIndex(l => l.n === rune.n);
        if(existingIdx > -1) {
            forgeLayers.splice(existingIdx, 1);
            btn.classList.remove('active');
        } else if(forgeLayers.length < 4) {
            forgeLayers.push(rune);
            btn.classList.add('active');
        }
        updateForgeCanvas();
    }

    function updateForgeCanvas() {
        const cv = document.getElementById('forge-canvas');
        cv.innerHTML = '';
        forgeLayers.forEach((r, i) => {
            const el = document.createElement('div');
            el.className = 'forge-rune'; el.textContent = r.g;
            cv.appendChild(el);
        });
        arrangeForge('center');
    }

    function arrangeForge(style) {
        const els = document.querySelectorAll('.forge-rune');
        els.forEach((el, i) => {
            if(style === 'center') {
                el.style.transform = `translate(0,0) rotate(0deg) scale(1)`;
            } else if(style === 'cross') {
                const rot = i * 90;
                el.style.transform = `rotate(${rot}deg) translateY(-20px)`;
            }
        });
    }

    // --- Achievements Logic ---
    function checkAchieve(id) {
        let unlocked = JSON.parse(localStorage.getItem('achieve_data') || '[]');
        if(!unlocked.includes(id)) {
            unlocked.push(id);
            localStorage.setItem('achieve_data', JSON.stringify(unlocked));
            alert("Achievement Unlocked: " + id);
        }
    }

    function renderHistory() {
        const unlocked = JSON.parse(localStorage.getItem('achieve_data') || '[]');
        const cont = document.getElementById('achieve-list');
        cont.innerHTML = '';
        ACHIEVEMENTS.forEach(a => {
            const isU = unlocked.includes(a.id);
            const div = document.createElement('div');
            div.className = `achieve-item ${isU ? 'unlocked' : ''}`;
            div.innerHTML = `<div class="achieve-icon">${a.icon}</div><div class="achieve-info"><h4>${a.n}</h4><p>${a.d}</p></div>`;
            cont.appendChild(div);
        });
    }

    // --- Reading Engine ---
    function buildManualGrid() {
        const grid = document.getElementById('manual-grid'); grid.innerHTML = ''; manualPicks = [];
        RUNES.forEach(r => {
            const btn = document.createElement('div');
            btn.style.cssText = "background:var(--card); border:1px solid var(--dim); padding:10px; text-align:center; border-radius:4px;";
            btn.innerHTML = `<div style="font-size:20px">${r.g}</div><div style="font-size:8px; color:var(--dim2)">${r.n}</div>`;
            btn.onclick = () => {
                if(manualPicks.includes(r)) {
                    manualPicks = manualPicks.filter(x => x !== r);
                    btn.style.borderColor = 'var(--dim)';
                } else if(manualPicks.length < 3) {
                    manualPicks.push(r);
                    btn.style.borderColor = 'var(--accent)';
                }
                const sub = document.getElementById('manual-submit');
                sub.style.opacity = manualPicks.length === 3 ? '1' : '0.3';
                sub.style.pointerEvents = manualPicks.length === 3 ? 'all' : 'none';
                sub.textContent = manualPicks.length === 3 ? 'Cast Intention' : manualPicks.length + '/3 Selected';
            };
            grid.appendChild(btn);
        });
    }

    function submitManual() { finishReading(manualPicks); }

    function startCast() {
        const picks = [];
        for(let i=0; i<3; i++) {
            const r = document.getElementById('r'+i);
            r.innerHTML = '';
            for(let j=0; j<20; j++) {
                const d = document.createElement('div'); d.className = 'reel-unit';
                d.textContent = RUNES[Math.floor(Math.random()*25)].g; r.appendChild(d);
            }
            const win = RUNES[Math.floor(Math.random()*25)]; picks.push(win);
            const last = document.createElement('div'); last.className = 'reel-unit';
            last.textContent = win.g; r.appendChild(last);
            r.style.transition = 'none'; r.style.transform = 'translateY(0)';
            setTimeout(() => {
                r.style.transition = `transform ${2 + (i*0.5)}s cubic-bezier(0.1, 0, 0.1, 1)`;
                r.style.transform = `translateY(-${20 * 115}px)`;
            }, 50);
        }
        setTimeout(() => finishReading(picks), 3500);
    }

    function finishReading(runes) {
        document.getElementById('area-draw').style.display = 'none';
        document.getElementById('area-manual').style.display = 'none';
        document.getElementById('read-modes').style.display = 'none';
        const v = document.getElementById('reveal-visuals'); v.innerHTML = '';
        runes.forEach(r => {
            const d = document.createElement('div'); d.className = 'result-rune-card';
            d.innerHTML = `<span class="glyph">${r.g}</span><span class="name">${r.n}</span>`;
            v.appendChild(d);
        });
        document.getElementById('read-text').textContent = `${runes[0].m}, through ${runes[1].m.toLowerCase()}, leads to ${runes[2].m.toLowerCase()}.`;
        document.getElementById('reading-reveal').style.display = 'block';
        checkAchieve('FirstDraw');
    }

    function buildLibrary() {
        const cont = document.getElementById('lib-list'); if(cont.innerHTML) return;
        RUNES.forEach(r => {
            const div = document.createElement('div'); div.className = 'guide-entry';
            div.innerHTML = `<div style="display:flex; align-items:center; gap:20px;"><div style="font-size:36px; width:40px;">${r.g}</div><div><div style="color:var(--accent); text-transform:uppercase; font-size:14px;">${r.n}</div><div style="font-size:11px; color:var(--dim2);">${r.m}</div></div></div><div class="lore-box" id="lore-${r.n}">${r.l}</div>`;
            div.onclick = () => {
                document.getElementById('lore-'+r.n).classList.toggle('open');
                checkAchieve('Historian');
            };
            cont.appendChild(div);
        });
    }

    // Init Home
    const rotd = RUNES[Math.floor(Math.random()*24)];
    document.getElementById('rotd-g').textContent = rotd.g;
    document.getElementById('rotd-n').textContent = rotd.n;
    document.getElementById('rotd-m').textContent = rotd.m;
    document.getElementById('home-date').textContent = new Date().toLocaleDateString('en-GB', {weekday: 'long', day:'numeric', month:'long'}).toUpperCase();
    navTo('home');
</script>
</body>
</html>
